<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>African Safari: 3-Day Ranger Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --safari-green: #556b2f;
    --safari-orange: #e67e22;
    --safari-khaki: #c3b091;
    --danger: #c0392b;
    --text: #2c3e50;
    --bg: #fdf5e6;
  }

  body { font-family: 'Lato', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
  .header { background: var(--safari-green); color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; border-bottom: 5px solid var(--safari-orange); }
  
  .stats-bar { display: flex; justify-content: space-around; background: #fff; width: 100%; padding: 10px 0; border-bottom: 2px solid #ddd; font-weight: bold; }
  .stat-item { display: flex; align-items: center; gap: 5px; }

  .progress-bar { width: 100%; height: 8px; background: #ddd; }
  .progress-fill { height: 100%; background: var(--safari-orange); width: 0%; transition: 0.5s; }

  .game-container { max-width: 800px; width: 90%; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 400px; }
  .choice-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

  .choice-btn { 
    padding: 18px; border: 2px solid #eee; border-radius: 8px; background: white; 
    cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--safari-green); background: #f9f1e7; transform: translateX(5px); }
  .choice-btn:disabled { opacity: 0.8; cursor: not-allowed; }
  
  .day-tag { color: var(--safari-orange); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px; display: block; }

  .feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; border-left: 5px solid var(--safari-orange); font-size: 1.05rem; }
  .fb-2 { border-left-color: var(--safari-green); background-color: #f0f9eb; }
  .fb-1 { border-left-color: var(--safari-orange); background-color: #fff9f0; }
  .fb-0 { border-left-color: var(--danger); background-color: #fdf2f2; }

  .btn-next { display: none; margin-top: 20px; padding: 15px 30px; background: var(--safari-green); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }

  #landingPage {
    position: fixed; inset: 0; z-index: 100;
    background: var(--safari-green);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px;
  }

  .landing-inner { max-width: 680px; width: 100%; text-align: center; color: white; }
  .landing-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 10px; color: var(--safari-khaki); }
  .landing-btn { padding: 17px 48px; background: var(--safari-orange); color: white; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
</style>
</head>
<body>

    <p>Welcome! You are the head ranger for a 3-day expedition.</p>
    <p>Keep your guests safe and happy to earn <b>Safari Points</b>!</p>
    <button class="landing-btn" onclick="startGame()">Begin Expedition →</button>
  </div>
</div>

<div class="header">
  <h1>🦁 3-Day African Safari</h1>
</div>

<div class="stats-bar">
  <div class="stat-item">⭐ Safari Points: <span id="scoreDisplay">0</span></div>
  <div class="stat-item">📅 Progress: <span id="stepCounter">1 / 14</span></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="feedback" id="feedbackBox"></div>
  <button class="btn-next" id="nextBtn" onclick="nextStep()">Continue Journey →</button>
</div>

];

const bands = [
  { min: 0, max: 10, title: "Safari Scout", color: "#e67e22", text: "You are learning! Next time, think more about guest safety and comfort." },
  { min: 11, max: 22, title: "Professional Ranger", color: "#2980b9", text: "Good job! You know how to run a great safari. Your guests had a wonderful time." },
  { min: 23, max: 28, title: "Legend of the Savannah", color: "#27ae60", text: "Incredible! You are the perfect guide. Every guest wants to travel with you!" }
];

let score = 0;
let currentGameSteps = [];
let currentStepIndex = 0;

/**
 * Fisher-Yates Shuffle Function[cite: 2]
 */
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  score = 0;
  currentStepIndex = 0;
  
  // Choose 1 scenario from each of the 12 chronological slots[cite: 2]
  currentGameSteps = scenarioPool.map(slot => {
    return {...slot[Math.floor(Math.random() * slot.length)]};
  });

  // Insert emergencies at logical intervals[cite: 2]
  currentGameSteps.splice(4, 0, emergencies[0]); // After slot 4
  currentGameSteps.splice(9, 0, emergencies[1]); // After slot 8 + 1st emergency
  
  document.getElementById("landingPage").style.display = "none";
  updateStats();
  renderStep();
}

function updateStats() {
  document.getElementById("scoreDisplay").innerText = score;
  document.getElementById("stepCounter").innerText = `${currentStepIndex + 1} / 14`;
  const progress = ((currentStepIndex) / 14) * 100;
  document.getElementById("progressFill").style.width = progress + "%";
}

function renderStep() {
  const data = currentGameSteps[currentStepIndex];
  document.getElementById("dayLabel").innerText = `Day ${data.day}`;
  document.getElementById("stepTitle").innerText = data.title;
  document.getElementById("stepDesc").innerHTML = data.desc;
  
  const list = document.getElementById("choiceList");
  list.innerHTML = "";
  
  // Shuffle options so the best answer isn't always in the same place[cite: 2]
  const shuffledChoices = shuffleArray([...data.choices]);
  
  shuffledChoices.forEach((c) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = c.text;
    btn.onclick = () => selectChoice(c);
    list.appendChild(btn);
  });
  
  document.getElementById("feedbackBox").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}

function selectChoice(choice) {
  const fb = document.getElementById("feedbackBox");
  score += choice.pts;
  updateStats();
  
  fb.innerHTML = `⭐ +${choice.pts} Points<br>${choice.fb}`;
  fb.className = `feedback fb-${choice.pts}`;
  fb.style.display = "block";
  
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
  document.getElementById("nextBtn").style.display = "block";
}

function nextStep() {
  currentStepIndex++;
  if (currentStepIndex < currentGameSteps.length) {
    renderStep();
  } else {
    renderFinalScreen();
  }
}

function renderFinalScreen() {
  const band = bands.find(b => score >= b.min && score <= b.max) || bands[0];
  document.getElementById("progressFill").style.width = "100%";
  
  document.getElementById("gameWindow").innerHTML = `
    <h2 style="color:${band.color}">${band.title}</h2>
    <p>Final Score: <b>${score} / 28</b></p>
    <p>${band.text}</p>
    <hr style="margin:20px 0; border:0; border-top:1px solid #ddd">
    <button class="landing-btn" style="width:100%" onclick="location.reload()">New Expedition</button>
  `;
}
</script>
</body>
</html>
