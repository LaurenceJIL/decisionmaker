<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Manhattan Heights: Loft Manager Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Slab:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --taxi-yellow: #f7b731;
        --asphalt: #2d3436;
        --brick: #ae322d;
        --steel: #dfe6e9;
        --success: #26de81;
        --error: #eb4d4b;
        --text: #2d3436;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--steel);
        color: var(--text);
        line-height: 1.6;
    }

    header {
        background: var(--asphalt);
        color: white;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 6px solid var(--taxi-yellow);
        position: sticky; top: 0; z-index: 1000;
    }

    .tally-container { text-align: right; border-left: 2px solid #555; padding-left: 1.5rem; }
    .tally-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--taxi-yellow); }
    .tally-score { font-size: 1.8rem; font-family: 'Oswald', sans-serif; }

    .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

    .card {
        background: white;
        padding: 3rem;
        border-radius: 4px;
        box-shadow: 10px 10px 0px var(--asphalt);
        display: none;
        border: 2px solid var(--asphalt);
    }
    .card.active { display: block; animation: slideIn 0.3s ease-out; }

    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    h1, h2 { font-family: 'Oswald', sans-serif; text-transform: uppercase; color: var(--asphalt); }
    p { font-family: 'Roboto Slab', serif; margin-bottom: 1.5rem; }

    .choices-grid { display: grid; gap: 1rem; margin: 2rem 0; }
    .choice-btn {
        background: #fff;
        border: 2px solid #ddd;
        padding: 1.2rem;
        cursor: pointer;
        transition: 0.2s;
        text-align: left;
        font-size: 1rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--taxi-yellow); background: #fff9e6; }
    .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; text-decoration: line-through; }

    .feedback-area {
        margin-top: 2rem;
        padding: 2rem;
        display: none;
        background: #f1f2f6;
        border-left: 10px solid var(--asphalt);
    }
    .fb-best { border-left-color: var(--success); }
    .fb-poor { border-left-color: #f7b731; }
    .fb-worst { border-left-color: var(--error); animation: tilt 0.3s infinite; }

    @keyframes tilt{0%{transform:rotate(0deg)}25%{transform:rotate(1deg)}75%{transform:rotate(-1deg)}100%{transform:rotate(0deg)}}

    .points-badge {
        display: inline-block;
        padding: 5px 15px;
        color: white;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 1rem;
        background: var(--asphalt);
    }

    .next-btn {
        margin-top: 2rem;
        background: var(--asphalt);
        color: white;
        border: none;
        padding: 1.2rem;
        cursor: pointer;
        font-weight: 700;
        display: none;
        width: 100%;
        text-transform: uppercase;
    }

    .emergency-tag {
        background: var(--brick);
        color: white;
        padding: 5px 15px;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 1rem;
    }
</style>
</head>
<body>

<header>
    <div>
        <h2 style="color: white; margin: 0;">THE MANHATTAN HEIGHTS</h2>
        <span style="font-size: 0.8rem; color: var(--taxi-yellow);">LUXURY SERVICED LOFTS - NYC</span>
    </div>
    <div class="tally-container">
        <div class="tally-label">Street Cred</div>
        <div class="tally-score" id="scoreDisplay">4.0 ⭐</div>
    </div>
</header>

<div class="container">
    <div class="card active" id="screen-start">
        <h1>Shift Start: Manhattan</h1>
        <p>Manage your SoHo lofts. You start with a **4.0 Star Rating**[cite: 1, 3].</p>
        <p>Max score is 5.0. Avoid poor decisions, or you will be forced to choose again[cite: 1].</p>
        <button class="next-btn" style="display:block;" onclick="startGame()">Punch In</button>
    </div>

    <div class="card" id="screen-game">
        <div id="status-container"></div>
        <h2 id="step-title"></h2>
        <p id="step-desc" style="border-bottom: 1px solid #eee; padding-bottom: 1rem;"></p>
        <div class="choices-grid" id="choices-container"></div>
        
        <div class="feedback-area" id="feedback-box">
            <span id="points-reveal" class="points-badge"></span>
            <div id="feedback-content" style="font-style: italic;"></div>
        </div>
        
        <button class="next-btn" id="btn-next">Next Shift Phase</button>
    </div>

    <div class="card" id="screen-final">
        <h1>Shift Review</h1>
        <div id="final-stats"></div>
        <div id="band-content" style="margin-top: 2rem; padding: 2rem; border: 4px solid var(--asphalt);"></div>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Clock In Again</button>
    </div>
</div>

<script>
const steps = {
    d1: {
        title: "Decision 1: The Gridlock Arrival",
        desc: "A guest arrives in a rage after being stuck in traffic for 90 minutes. They are blaming you for the tunnel closure.",
        choices: [
            { text: "Validate their frustration, offer a double espresso, and use a 'connection' for a better dinner table.", type: "best", fb: "Perfect! You joined their side and became an ally rather than a target." },
            { text: "Offer them a 10% discount on their room and handle the check-in swiftly.", type: "avg", fb: "The 'throw money at it' approach. Effective, but a little impersonal." },
            { text: "Point out that they should have taken the Subway to arrive on time.", type: "poor", fb: "Technically correct, but annoying. Logic doesn't soothe a frustrated guest." },
            { text: "Tell them 'Hey, that’s New York, baby!' and walk away.", type: "worst", fb: "Rude and stereotypical. You've killed the brand image. Choose again!" }
        ],
        next: "d2"
    },
    d2: {
        title: "Decision 2: The Coffee Crisis",
        desc: "A guest is horrified that you don't offer 'artisanal oat milk lattes' in the lobby at 6 AM.",
        choices: [
            { text: "Rebrand the room coffee as a 'Curated Nespresso Experience' and order a barista delivery.", type: "best", fb: "Masterful spin! Using sophisticated language turns a lack of service into a perk." },
            { text: "Direct them to the great bodega on the corner for a 'mean' regular coffee.", type: "avg", fb: "Charming and authentic, though some luxury guests might fear the 'bodega cat'." },
            { text: "Apologize and promise to buy a milk frother for them later today.", type: "poor", fb: "Reactive and makes the loft look unprepared for high-end requests." },
            { text: "Ask them why they are so 'sensitive' about milk at 6 in the morning.", type: "worst", fb: "Confrontational. Never judge a guest's preferences. Choose again!" }
        ],
        next: "d5"
    },
    d5: {
        title: "Decision 5: The Jackhammer Jitters",
        desc: "Construction starts at 7 AM right outside a guest's window.",
        choices: [
            { text: "Provide noise-canceling headphones and a voucher for a partner spa.", type: "best", fb: "Classy! You compensated for the noise with a high-end distraction." },
            { text: "Try to bribe the construction crew to stop working for an hour.", type: "avg", fb: "Very 'Old School' NYC. Shows hustle, but it's not sustainable." },
            { text: "Tell them construction is the 'heartbeat of the city' and offer earplugs.", type: "poor", fb: "Poetic but unhelpful. Cheap earplugs don't match luxury prices." },
            { text: "Tell them to call 311 and complain because it's not your problem.", type: "worst", fb: "Lazy. In NYC, 'not my problem' means 'not my job'. Choose again!" }
        ],
        next: "d10"
    },
    d10: {
        title: "Decision 10: The Empire State Exit",
        desc: "The season is over. How do you ensure your guests return next year?",
        choices: [
            { text: "Give a 'New York Survival Kit' with high-end chocolate and a MetroCard.", type: "best", fb: "Brilliant! The kit ensures they have a reason to come back and explore." },
            { text: "Ask them to follow your Instagram for 'VIP-only' loft updates.", type: "avg", fb: "Modern and smart. It keeps your brand in their mind year-round." },
            { text: "Tell them 'Don't be a stranger' and wave as the taxi pulls away.", type: "poor", fb: "Forgettable. In a city with 10,000 beds, you need to be more memorable." },
            { text: "Hand them a list of things they 'did wrong' during their stay.", type: "worst", fb: "Insane. You've burned the bridge at the very last second. Choose again!" }
        ],
        next: "final"
    }
};

let score = 4.0;
let currentStepId = "d1";

function startGame() {
    score = 4.0;
    currentStepId = "d1";
    updateScoreDisplay();
    showScreen("game");
    renderStep();
}

function updateScoreDisplay() {
    document.getElementById('scoreDisplay').innerText = score.toFixed(1) + " ⭐";
}

function showScreen(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

function renderStep() {
    const data = steps[currentStepId];
    const container = document.getElementById('choices-container');
    document.getElementById('step-title').innerText = data.title;
    document.getElementById('step-desc').innerText = data.desc;
    container.innerHTML = "";
    document.getElementById('feedback-box').style.display = "none";
    document.getElementById('btn-next').style.display = "none";

    data.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = "choice-btn";
        btn.id = "opt-" + index;
        btn.innerText = choice.text;
        btn.onclick = () => handleChoice(choice, index);
        container.appendChild(btn);
    });
}

function handleChoice(choice, btnIndex) {
    const ptReveal = document.getElementById('points-reveal');
    const fbBox = document.getElementById('feedback-box');

    if (choice.type === "worst") {
        score = Math.max(0, score - 0.4);
        ptReveal.innerText = "-0.4 Stars";
        fbBox.className = "feedback-area fb-worst";
        document.getElementById("opt-" + btnIndex).disabled = true;
    } else {
        if (choice.type === "best") {
            score = Math.min(5.0, score + 0.1);
            ptReveal.innerText = "+0.1 Stars";
            fbBox.className = "feedback-area fb-best";
        } else if (choice.type === "avg") {
            ptReveal.innerText = "No Change";
            fbBox.className = "feedback-area fb-avg";
        } else if (choice.type === "poor") {
            score = Math.max(0, score - 0.2);
            ptReveal.innerText = "-0.2 Stars";
            fbBox.className = "feedback-area fb-poor";
        }
        
        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        document.getElementById('btn-next').style.display = "block";
    }

    document.getElementById('feedback-content').innerText = choice.fb;
    fbBox.style.display = "block";
    updateScoreDisplay();

    document.getElementById('btn-next').onclick = () => {
        currentStepId = steps[currentStepId].next;
        if (currentStepId === "final") showFinal(); else renderStep();
    };
}

function showFinal() {
    showScreen("final");
    document.getElementById('final-stats').innerHTML = `<h2 style="text-align:center">Final Rating: ${score.toFixed(1)} / 5.0 ⭐</h2>`;
    const bc = document.getElementById('band-content');
    
    if (score >= 4.8) {
        bc.innerHTML = `<h2 style="color:var(--success); text-align:center;">The King of Gotham</h2><p style="text-align:center;">Absolute Legend! You mastered the city.</p>`;
    } else if (score >= 3.8) {
        bc.innerHTML = `<h2 style="color:var(--taxi-yellow); text-align:center;">The SoHo Socialite</h2><p style="text-align:center;">Not bad, Kid! You know the streets.</p>`;
    } else {
        bc.innerHTML = `<h2 style="color:var(--error); text-align:center;">The Banned Manager</h2><p style="text-align:center;">You’ve been run out of town.</p>`;
    }
}
</script>
</body>
</html>
