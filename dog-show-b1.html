<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grand Dog Show: B1 Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #1e3a5f; --blue-mid: #345e91; --gold: #d4af37;
    --cream: #fdfaf5; --red: #b22222; --text: #2c3e50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background-color: var(--cream); color: var(--text); line-height: 1.6; }
  
  /* ── CONSOLIDATED RATING HEADER ── */
  .header { background: var(--blue-dark); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  .header-content { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .rating-display { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--gold); }
  .paw-visual { color: var(--gold); font-size: 1.4rem; letter-spacing: 3px; }
  .score-num { font-weight: bold; margin-left: 10px; color: white; }

  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  .screen { display: none; }
  .screen.active { display: block; }
  
  .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--blue-mid); }
  .emergency-card { border-top-color: var(--red); background: #fffafa; }
  .label-emergency { color: var(--red); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; display: block; margin-bottom: 5px; }

  h2 { font-family: 'Playfair Display', serif; margin-bottom: 15px; color: var(--blue-dark); }
  .description { font-size: 1.1rem; margin-bottom: 25px; }
  .choice-list { display: grid; gap: 12px; }
  .choice-btn { background: white; border: 2px solid #eee; padding: 16px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
  .choice-btn:hover { border-color: var(--blue-mid); background: #f0f4f8; }

  .feedback { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; animation: fadeIn 0.4s; }
  .fb-best { background: #e8f5e9; border-left: 5px solid #2e7d32; }
  .fb-good { background: #f1f8e9; border-left: 5px solid #8bc34a; }
  .fb-neutral { background: #fff8e1; border-left: 5px solid #ffc107; }
  .fb-poor { background: #ffebee; border-left: 5px solid var(--red); }

  .btn-action { background: var(--blue-dark); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 1.4rem;">The Grand Dog Show</h1>
    <div class="rating-display">
      <span id="pawVisual" class="paw-visual"></span>
      <span id="pawNum" class="score-num">3.0</span>
    </div>
  </div>
</header>

<div class="container">
  <section id="screen-start" class="screen active">
    <div class="card" style="text-align: center;">
      <h2>The Championship Begins</h2>
      <p class="description">You are competing in the national dog show. You start with a <b>3.0 paw rating</b>. Every choice matters. If your rating drops to 0, you are disqualified! Good luck.</p>
      <button class="btn-action" onclick="startGame()">Enter the Ring</button>
    </div>
  </section>

  <section id="screen-game" class="screen">
    <div id="gameCard" class="card">
      <span id="emLabel" class="label-emergency" style="display:none">⚠️ Emergency Situation</span>
      <h2 id="stepTitle">Title</h2>
      <p id="stepDesc" class="description"></p>
      <div id="choiceList" class="choice-list"></div>
      <div id="feedbackBox" class="feedback">
        <p id="fbText"></p>
        <button id="nextBtn" class="btn-action">Continue</button>
      </div>
    </div>
  </section>

  <section id="screen-over" class="screen">
    <div class="card" style="text-align: center; border-top-color: var(--red);">
      <h2>Game Over</h2>
      <p id="overMessage" class="description"></p>
      <button class="btn-action" onclick="location.reload()">Try Again</button>
    </div>
  </section>

  <section id="screen-final" class="screen">
    <div class="card" style="text-align: center;">
      <h2>Show Conclusion</h2>
      <p id="finalMessage" class="description"></p>
      <button class="btn-action" onclick="location.reload()">Start New Season</button>
    </div>
  </section>
</div>

<script>
let rating = 3.0;
let currentIdx = 0;

const steps = [
  { title: "1. The Morning Brush", desc: "It is 7:00 AM on show day. How do you prepare your dog's coat?", choices: [
    { text: "Spend an hour using a special shine brush and conditioning spray.", pts: 0.2, fb: "Your dog's coat looks incredibly shiny! The judges will notice this." },
    { text: "Give a thorough brush with a standard grooming tool.", pts: 0.1, fb: "Good job. The dog looks neat and tidy." },
    { text: "A quick 5-minute brush to remove the loose hair.", pts: 0, fb: "Acceptable, but the coat could be much better." },
    { text: "Don't brush at all; the dog looks fine from yesterday.", pts: -0.5, fb: "Terrible choice! Your dog looks messy and unkept. Try a different approach." }
  ]},
  { title: "2. Entering the Building", desc: "There are hundreds of dogs barking and making noise. How do you lead your dog inside?", choices: [
    { text: "Keep a short lead and use calm, quiet commands.", pts: 0.2, fb: "Perfect. Your dog stays focused on you despite the noise." },
    { text: "Walk normally and talk to other owners.", pts: 0.1, fb: "The dog is a bit distracted, but you make it inside safely." },
    { text: "Let the dog walk ahead of you on a long lead.", pts: 0, fb: "Your dog is pulling a lot. This doesn't look professional." },
    { text: "Drag the dog through the door quickly.", pts: -0.5, fb: "Your dog is now stressed and scared. You must be more gentle. Try again." }
  ]},
  { isEmergency: true, title: "EMERGENCY: The Chihuahua Chaos", desc: "Suddenly, a group of 24 Chihuahuas escapes their crates! They are running everywhere and fighting. One runs toward your dog!", choices: [
    { text: "Stay calm, pick up your dog or block the path, and move to a quiet corner.", pts: 0, fb: "Well handled. You kept your dog safe from the chaos." },
    { text: "Try to kick the Chihuahuas away from your dog.", pts: -10, fb: "<b>DISQUALIFIED!</b> You cannot use violence at a dog show. Game Over." },
    { text: "Start shouting loudly for help.", pts: -10, fb: "<b>DISQUALIFIED!</b> Your shouting caused a panic and made the dogs fight more. Game Over." },
    { text: "Release your dog's lead so they can run away.", pts: -10, fb: "<b>DISQUALIFIED!</b> Never let go of your dog in a crowded building. Game Over." }
  ]},
  { title: "3. The Judge's Exam", desc: "The judge is checking your dog's teeth and muscles. What should your dog do?", choices: [
    { text: "Stand perfectly still and look directly forward.", pts: 0.2, fb: "Excellent discipline! The judge is very impressed." },
    { text: "Stand still but look around the room.", pts: 0.1, fb: "Good, though the judge prefers more focus." },
    { text: "Wag its tail and try to lick the judge's hand.", pts: 0, fb: "Friendly, but not professional behavior for a show." },
    { text: "Growl softly at the judge.", pts: -0.5, fb: "Dangerous! A show dog must never show aggression. Try again." }
  ]},
  { title: "4. Walking the Line", desc: "It's your turn to walk your dog in a straight line for the judge.", choices: [
    { text: "Walk at a consistent pace with the dog's head up.", pts: 0.2, fb: "A beautiful movement. You and your dog look like a team." },
    { text: "Walk at a steady pace, but the dog is looking at the floor.", pts: 0.1, fb: "The movement is good, but the posture could be better." },
    { text: "Walk very slowly and look at your dog the whole time.", pts: 0, fb: "You look nervous, which makes the dog walk awkwardly." },
    { text: "Run as fast as you can to show energy.", pts: -0.5, fb: "You left the dog behind! This looks chaotic. Try again." }
  ]},
  { title: "5. Lunch Break", desc: "Your dog is hungry after the morning session. What do you feed them?", choices: [
    { text: "A small portion of their usual high-quality dry food.", pts: 0.2, fb: "Perfect. This keeps their energy stable without making them sick." },
    { text: "A few pieces of plain, boiled chicken.", pts: 0.1, fb: "A nice treat, though a full meal might be better." },
    { text: "Only fresh water for now.", pts: 0, fb: "The dog is still hungry, but it's better than an upset stomach." },
    { text: "A burger from the snack bar.", pts: -0.5, fb: "Very unhealthy! Human food can make dogs sick before the final. Try again." }
  ]},
  { title: "6. Dealing with Heat", desc: "The building is getting very hot. Your dog is panting.", choices: [
    { text: "Use a cooling mat and provide fresh, cool water.", pts: 0.2, fb: "Great care. Your dog looks much more comfortable now." },
    { text: "Move to a shaded area near an open window.", pts: 0.1, fb: "This helps, but it is still quite warm." },
    { text: "Use a small hand fan to blow air on the dog.", pts: 0, fb: "It's a nice gesture, but not very effective for a large dog." },
    { text: "Pour a bucket of ice water over the dog's back.", pts: -0.5, fb: "Too extreme! This could shock the dog's system. Try again." }
  ]},
  { title: "7. The Distraction", desc: "Another dog nearby starts barking loudly during your pose.", choices: [
    { text: "Use a quiet command to keep your dog's attention on you.", pts: 0.2, fb: "Fantastic focus. You ignored the distraction completely." },
    { text: "Give your dog a small treat to keep them quiet.", pts: 0.1, fb: "Effective, though some judges dislike using treats in the ring." },
    { text: "Ignore both dogs and hope for the best.", pts: 0, fb: "Your dog started to bark back, which lost you some points." },
    { text: "Yell at the other owner to shut their dog up.", pts: -0.5, fb: "Unprofessional! You must control your own behavior. Try again." }
  ]},
  { isEmergency: true, title: "EMERGENCY: The Broken Lead", desc: "As you run, your leather lead snaps! Your dog is free in the ring!", choices: [
    { text: "Immediately call your dog and grab their collar firmly.", pts: 0, fb: "Fast thinking! You prevented a disaster." },
    { text: "Chase the dog around the ring shouting.", pts: -10, fb: "<b>DISQUALIFIED!</b> You caused a huge scene and the dog wouldn't come back. Game Over." },
    { text: "Sit down and start crying.", pts: -10, fb: "<b>DISQUALIFIED!</b> You must take action to secure your animal. Game Over." },
    { text: "Hope the judge catches the dog for you.", pts: -10, fb: "<b>DISQUALIFIED!</b> The dog is your responsibility. Game Over." }
  ]},
  { title: "8. The Stack (Posing)", desc: "The judge asks for a 'Stack' (a still pose). How do you position the legs?", choices: [
    { text: "Adjust each leg perfectly so the dog looks balanced.", pts: 0.2, fb: "The dog looks like a statue. Absolutely flawless stack." },
    { text: "Let the dog stand naturally but move the front paws.", pts: 0.1, fb: "Not bad, but the back legs are a bit too close together." },
    { text: "Just tell the dog to 'Stay' where it is.", pts: 0, fb: "The dog is standing, but the pose doesn't show its best features." },
    { text: "Push the dog's back down so it sits.", pts: -0.5, fb: "Wrong! A show dog should be standing, not sitting. Try again." }
  ]},
  { title: "9. Water Break", desc: "You need to give your dog water before the final round.", choices: [
    { text: "Use your own clean travel bowl and bottled water.", pts: 0.2, fb: "The safest way to keep your dog hydrated and healthy." },
    { text: "Use the tap water from the bathroom.", pts: 0.1, fb: "Fine, though some dogs don't like the taste of city water." },
    { text: "Let your dog drink from a shared bowl on the floor.", pts: 0, fb: "Risky! Shared bowls can spread germs and illnesses." },
    { text: "Let the dog lick condensation off the walls.", pts: -0.5, fb: "Disgusting and dangerous. Your dog needs real water. Try again." }
  ]},
  { title: "10. The Final Walk", desc: "This is the big moment. The lights are bright.", choices: [
    { text: "Keep your head up, smile, and walk with confidence.", pts: 0.2, fb: "You look like a winner! Your confidence travels down the lead to the dog." },
    { text: "Walk carefully and watch your dog's feet.", pts: 0.1, fb: "A bit cautious, but you didn't make any mistakes." },
    { text: "Walk quickly while looking at the crowd.", pts: 0, fb: "You are distracted, and your dog is starting to wander." },
    { text: "Trip over your own feet and drop the lead.", pts: -0.5, fb: "A clumsy mistake! You must stay focused. Try again." }
  ]},
  { title: "11. Meeting the Public", desc: "A child asks to pet your dog after the round.", choices: [
    { text: "Ask the child to pet the dog gently under the chin.", pts: 0.2, fb: "Perfect. This is the safest way for a dog to meet a stranger." },
    { text: "Say yes, but keep a very tight grip on the lead.", pts: 0.1, fb: "Safe, but the dog feels your tension." },
    { text: "Let the child hug the dog's neck.", pts: 0, fb: "Risky. Many dogs do not like being hugged by strangers." },
    { text: "Tell the child to go away rudely.", pts: -0.5, fb: "Mean! You are an ambassador for the sport. Be polite. Try again." }
  ]},
  { title: "12. The Results", desc: "The winners are being announced. How do you behave?", choices: [
    { text: "Stand quietly and congratulate the winners sincerely.", pts: 0.2, fb: "True sportsmanship. Everyone respects you." },
    { text: "Stand quietly and wait for your number.", pts: 0.1, fb: "Polite and professional." },
    { text: "Check your phone while the judge is speaking.", pts: 0, fb: "A bit disrespectful to the event." },
    { text: "Start complaining loudly that the judge is wrong.", pts: -0.5, fb: "Awful behavior! You might be banned next year. Try again." }
  ]}
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function updateHeader() {
  rating = Math.min(5, Math.max(0, rating));
  document.getElementById('pawNum').innerText = rating.toFixed(1);
  const visual = document.getElementById('pawVisual');
  visual.innerHTML = '';
  
  // Requirement: Max 5 paws rating
  for (let i = 1; i <= 5; i++) {
    visual.innerHTML += (i <= Math.floor(rating)) ? '🐾' : '☆';
  }

  if (rating <= 0) endGame("Your rating dropped to zero. You have been disqualified from the show.");
}

function startGame() {
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  renderStep();
}

function renderStep() {
  const data = steps[currentIdx];
  const card = document.getElementById('gameCard');
  const emLabel = document.getElementById('emLabel');
  
  card.className = data.isEmergency ? 'card emergency-card' : 'card';
  emLabel.style.display = data.isEmergency ? 'block' : 'none';
  
  document.getElementById('stepTitle').innerText = data.title;
  document.getElementById('stepDesc').innerText = data.desc;
  document.getElementById('feedbackBox').style.display = 'none';
  
  const list = document.getElementById('choiceList');
  list.innerHTML = '';
  list.style.display = 'grid';

  // Copy choices and shuffle them (Fisher-Yates)
  let displayChoices = [...data.choices];
  shuffle(displayChoices);

  displayChoices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerText = c.text;
    btn.onclick = () => handleChoice(c);
    list.appendChild(btn);
  });
}

function handleChoice(choice) {
  const isEmergency = steps[currentIdx].isEmergency;
  
  // Logic: Worst choice loses 0.5 and forces re-choose. Emergency bad choice is Game Over.
  if (choice.pts <= -5) {
    endGame(choice.fb);
    return;
  }

  if (choice.pts === -0.5) {
    rating -= 0.5;
    updateHeader();
    showFeedback(choice.fb, "fb-poor", false);
    return;
  }

  // Best/Good/Average logic
  if (!isEmergency) {
    rating += choice.pts;
  }
  updateHeader();
  
  let type = "fb-neutral";
  if (choice.pts === 0.2) type = "fb-best";
  if (choice.pts === 0.1) type = "fb-good";
  
  showFeedback(choice.fb, type, true);
}

function showFeedback(text, className, canContinue) {
  document.getElementById('choiceList').style.display = 'none';
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block';
  fb.className = `feedback ${className}`;
  document.getElementById('fbText').innerHTML = `<b>${className === "fb-poor" ? "Incorrect" : "Result"}:</b> ${text}`;
  
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.innerText = canContinue ? "Continue →" : "Try Again";
  nextBtn.onclick = () => {
    if (canContinue) {
      currentIdx++;
      if (currentIdx < steps.length) renderStep();
      else showWin();
    } else {
      renderStep();
    }
  };
}

function endGame(msg) {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-over').classList.add('active');
  document.getElementById('overMessage').innerText = msg;
}

function showWin() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-final').classList.add('active');
  
  // 50-60 words positive feedback[cite: 2]
  const feedback = "Congratulations! Your performance throughout the competition was absolutely outstanding. Because of your patient training and smart choices, your dog performed with grace and confidence in every round. You managed difficult emergencies and kept your dog happy and healthy. You are a true professional and a credit to the sport of dog showing. Well done!";
  
  document.getElementById('finalMessage').innerText = feedback;
}

updateHeader();
</script>
</body>
</html>
