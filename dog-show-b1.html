const X = ({className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>;

const allSteps = [
  {id:"v1",major:1,title:"Step 1: Venue Selection",icon:MapPin,majorTitle:"Venue & Infrastructure",question:"You're choosing between four venues for your 2,000-dog show. Which do you book?",options:[{text:"A city conference centre: indoor halls, near public transport, but no outdoor exercise space and no vehicle access for grooming vans",points:2,feedback:"The transport links help but the lack of outdoor space is a serious welfare gap. Dogs need secure exercise areas and handlers need vehicle access for heavy equipment. Urban venues rarely work well for large shows."},{text:"A large agricultural showground with weatherproof indoor rings, outdoor exercise paddocks, direct vehicle access, and ample parking",points:5,feedback:"The classic choice for good reason. Every practical need is met: welfare-safe outdoor space, all-weather judging, easy logistics for exhibitors travelling with multiple dogs and equipment."},{text:"A private estate with scenic grounds, indoor marquees, and a prestige backdrop — but limited parking and no permanent infrastructure",points:3,feedback:"Attractive in photos but logistically fragile. Temporary power, no permanent plumbing, and limited parking create serious problems at scale. Better suited to boutique shows under 500 dogs."},{text:"A sports stadium with large indoor arena, outdoor car parks repurposed as exercise areas, and good road links but no dedicated grooming facilities",points:2,feedback:"Repurposed car parks are not adequate exercise or welfare areas, and the absence of grooming facilities means handlers must manage in their cars. The road links are a plus but don't outweigh the gaps."}]},
  {id:"v2",major:1,title:"Step 2: Weather Contingency",icon:MapPin,majorTitle:"Venue & Infrastructure",question:"Two weeks before the show, forecasts predict heavy rain all day. What do you arrange?",options:[{text:"Hire extra marquees for grooming and trade areas, lay rubber matting on grass walkways, and brief all ring stewards on wet-weather ring management",points:5,feedback:"Proactive and comprehensive. Covered grooming space is essential in wet weather, matting prevents dangerous slipping, and briefed stewards can manage the inevitable ring-side congestion calmly."},{text:"Email exhibitors advising them to bring waterproofs and waterproof crate covers, and leave all other arrangements unchanged",points:1,feedback:"Putting the entire burden on exhibitors is poor organisation. Dogs don't groom well in open rain, equipment is damaged, and rings become unsafe without matting. Exhibitors expect you to have anticipated this."},{text:"Monitor forecasts daily and prepare a communications plan to update exhibitors, while arranging standby portable shelters that can be deployed within four hours",points:4,feedback:"Good communications instinct and the standby plan shows foresight. It falls slightly short of the best response because the shelters are reactive rather than already confirmed and in place."},{text:"Cover only the main judging rings with additional marquees and accept that grooming and trade areas will be exposed",points:2,feedback:"Protecting ring quality is right, but leaving grooming areas uncovered means dogs arrive at the ring wet and stressed. Exhibitors who can't groom properly will blame the organiser, not the weather."}]},
  {id:"c1",major:2,title:"Step 3: Competition Structure",icon:Users,majorTitle:"Show Classes & Scheduling",question:"Which competition structure will you adopt for the show?",options:[{text:"Agility, obedience, and fun dog games only — no formal breed judging, maximum spectator appeal",points:1,feedback:"Very crowd-friendly but alienates the conformation community who form the backbone of the dog show world. A show without breed classes lacks the credibility to attract serious exhibitors or KC recognition."},{text:"Conformation breed classes from puppy to veteran, Best in Show, an obedience trial, agility heats, and a junior handler class",points:5,feedback:"The complete package. Something for every level of participant, from first-time puppy handler to seasoned professional. Maximises entries and gives spectators variety throughout the day."},{text:"Breed classes and Best in Show only — traditional, respected, and straightforward to schedule",points:3,feedback:"Solid and credible, but a missed opportunity. Agility and obedience attract a younger, broader exhibiting community and give spectators far more to watch between breed assessments."},{text:"Open Best in Show only — any dog, any breed, no qualifying rounds, low entry barrier",points:1,feedback:"Attractive in principle but unworkable in practice. Jumping straight to Best in Show without breed and group judging is amateurish and will be rejected by experienced exhibitors and the Kennel Club alike."}]},
  {id:"c2",major:2,title:"Step 4: Ring Timetabling",icon:Users,majorTitle:"Show Classes & Scheduling",question:"You have 14 breed rings running on the same day. How do you build the timetable?",options:[{text:"Start all 14 rings simultaneously at 9am — simplest for stewards and exhibitors to understand",points:1,feedback:"Convenient on paper but a disaster in practice. Many exhibitors show multiple breeds. Simultaneous starts guarantee clashes, missed classes, and appeals to the show secretary. This is a hallmark of poor planning."},{text:"Stagger start times across breed groups so exhibitors showing in more than one breed can move between rings without clashing",points:5,feedback:"Standard practice at every well-run show. Multi-breed exhibitors plan their whole day around the timetable. Staggered starts show you understand how exhibitors actually use the show."},{text:"Run all large breeds in the morning and small breeds in the afternoon to keep ring sizes manageable throughout the day",points:3,feedback:"A sensible broad approach that reduces some clashes, but it doesn't account for exhibitors who show across size groups. Staggered scheduling within groups would still be needed to eliminate all conflicts."},{text:"Publish a draft timetable four weeks out and invite breed clubs to flag scheduling conflicts before the final version is released",points:4,feedback:"Collaborative and thorough. Breed clubs know their members' showing habits better than any organiser. The consultation process is excellent — combining this with staggered start times would make it the complete solution."}]},
  {id:"c3",major:2,title:"Step 5: Entry Oversubscription",icon:Users,majorTitle:"Show Classes & Scheduling",question:"Entries close and you have 2,600 dogs — 600 over your venue's safe capacity. What do you do?",options:[{text:"Close entries at 2,000, refund the 600 excess with a personal apology letter, and open a waiting list in case of cancellations",points:5,feedback:"The principled choice. Protecting welfare and safety must come before revenue. A personal apology with a prompt, accurate refund maintains goodwill and shows the organisation values people over numbers."},{text:"Accept all 2,600, use every available space including car park areas for additional rings, and trust it will be manageable on the day",points:1,feedback:"Overcrowding at this scale creates serious welfare and safety risks for dogs and people. Emergency services cannot operate effectively in an overfull showground. This decision could end careers and invite regulatory action."},{text:"Accept all 2,600 but limit benching — exhibitors without a bench space must keep dogs in their vehicles between classes",points:0,feedback:"Dogs in vehicles risk overheating even in mild weather. Exhibitors without secure staging areas cannot safely prepare their dogs. This likely breaches animal welfare codes and invites prosecution."},{text:"Negotiate with an adjacent facility to run an overflow satellite show for the six largest breed groups, with shared judging panels rotating between sites",points:4,feedback:"Creative problem-solving that keeps all entries intact. The logistics of rotating judges between two sites are genuinely complex and communication must be flawless, but it's a far better outcome than turning 600 exhibitors away."}]},
  {id:"j1",major:3,title:"Step 6: Assembling the Judging Panel",icon:Award,majorTitle:"Judging Panel",question:"How will you select and appoint your judges?",options:[{text:"Kennel Club approved all-rounders for group judging, breed specialists for individual breed classes, and separate qualified judges for obedience and agility",points:5,feedback:"Best practice. KC approval guarantees credibility, breed specialists bring the deep knowledge serious exhibitors respect, and using separate judges for performance disciplines ensures proper expertise throughout."},{text:"Invite one high-profile celebrity dog lover to judge Best in Show — the publicity value will outweigh any criticism from traditionalists",points:1,feedback:"Celebrity judges attract media attention but destroy credibility with experienced exhibitors. Breeders who have invested years in their dogs will not enter a show where assessment depends on fame rather than qualification."},{text:"Use experienced breed club members to judge their own breeds — community knowledge, lower costs, and strong local buy-in",points:2,feedback:"Well-intentioned but risky. Breed club members judging their own community raises obvious conflict of interest concerns. KC approval is not optional at a licensed show — every judge must hold the correct qualifications."},{text:"Source internationally recognised overseas judges for all groups — prestige, fresh perspectives, and genuine excitement for the exhibiting community",points:4,feedback:"International judges generate real excitement and add prestige. The higher travel and accommodation costs are justified if the budget allows. The only risk is over-reliance on prestige at the expense of accessible, credible local expertise."}]},
  {id:"j2",major:3,title:"Step 7: Judge Withdraws 48 Hours Out",icon:Award,majorTitle:"Judging Panel",question:"Your Terrier group specialist withdraws with illness two days before the show. How do you respond?",options:[{text:"Immediately contact your KC-approved reserve judge list, brief the confirmed replacement fully on logistics and expectations, and notify affected exhibitors within 24 hours",points:5,feedback:"Every well-organised show maintains a reserve panel for exactly this moment. Speed, clear briefing, and prompt communication to exhibitors are the three things that turn a crisis into a minor footnote."},{text:"Merge Terrier classes into the Working group ring and ask that judge to cover both, acknowledging the additional workload in a public statement",points:3,feedback:"A pragmatic fix if no reserve is available. The merged workload is significant and the judge must be properly consulted and compensated. Exhibitors will understand if the communication is honest and timely."},{text:"Ask the most experienced Terrier exhibitor present at the show to step in as judge — they know the breeds better than most",points:1,feedback:"Completely unacceptable. An unvetted, unqualified judge appointed on the day invalidates all results and exposes the show to formal challenges. KC licensing requires all judges to be pre-approved."},{text:"Cancel Terrier classes entirely, issue full refunds to affected exhibitors with a clear written explanation, and offer them priority entry at next year's show",points:4,feedback:"Disappointing but responsible if no qualified reserve can be found in time. Prompt refunds and a priority offer for next year show respect for exhibitors and protect the show's long-term reputation."}]},
  {id:"j3",major:3,title:"Step 8: Conflict of Interest Complaint",icon:Award,majorTitle:"Judging Panel",question:"An exhibitor formally complains that a judge awarded Best in Group to a dog they co-bred. How do you respond?",options:[{text:"Ask the judge privately whether they disclosed the co-breeding relationship before appointment and make a ruling based on their answer",points:2,feedback:"A private, undocumented conversation is wholly inadequate for a formal allegation. The process must be transparent, recorded, and conducted by an independent party — not the organiser alone."},{text:"Suspend the result immediately, refer to your appointed independent appeals committee, and notify both parties in writing within two hours",points:5,feedback:"Exactly right. A documented, impartial process protects the complainant, the judge, and the show's integrity. Speed of written response signals that you take procedural fairness seriously."},{text:"Dismiss the complaint — the judge is experienced, the result was well-received in the ring, and reopening it will cause more disruption than it resolves",points:1,feedback:"Dismissing a legitimate conflict of interest allegation without any investigation is both unfair and dangerous. It leaves the show exposed to regulatory action and signals to all exhibitors that complaints are ignored."},{text:"Void the entire group result and arrange a re-judge with a different judge before the end of the day",points:4,feedback:"Decisive action that prioritises fairness. Re-judging an entire group is logistically demanding and may feel harsh to correctly placed exhibitors, but it demonstrates zero tolerance for procedural breaches."}]},
  {id:"e1",major:"E1",title:"🚨 EMERGENCY: Dog Fight in Ring 3",icon:AlertTriangle,majorTitle:"Emergency Situation 1",isEmergency:true,question:"During Best in Group judging, a German Shepherd and an Akita engage in a serious fight. Spectators are crowding the ring. One handler has a hand injury. What is your immediate response?",options:[{text:"Announce the incident over the main PA system and ask all spectators to remain calm and move away from Ring 3",points:2,feedback:"Public PA announcements in a crisis cause panic and crowd surges toward the incident rather than away from it. Targeted radio communication to trained personnel is always faster and more controlled."},{text:"Deploy security and trained dog handlers via radio to separate the dogs, call the vet and first aider simultaneously, suspend nearby ring activity, and establish a 10-metre exclusion zone — all without a public announcement",points:5,feedback:"A complete, professional crisis response. Pre-assigned roles, controlled communication, simultaneous welfare cover for both dogs and the injured handler, and crowd management — all without causing wider panic. Preparation made this possible."},{text:"Step in personally to separate the dogs quickly and restore calm before the situation escalates further",points:1,feedback:"Intervening physically in a serious dog fight without specialist training risks severe injury to you and may escalate the fight. This is a job for trained security and experienced dog handlers working as a team."},{text:"Close the entire show immediately and begin a full evacuation of all exhibitors and dogs from the showground",points:0,feedback:"⛔ SHOW CLOSURE. Evacuating thousands of dogs simultaneously from a showground in response to a single fight creates catastrophically greater safety risks than the original incident. Regulatory bodies will question your fitness to organise future events. The show is over.",isShutdown:true}]},
  {id:"w1",major:4,title:"Step 9: Core Welfare Infrastructure",icon:Heart,majorTitle:"Dog Welfare",question:"What welfare provisions will you put in place across the showground?",options:[{text:"Water stations throughout the site and a notice at each entrance directing exhibitors to the nearest veterinary practice in town",points:1,feedback:"Wholly inadequate. Directing an exhibitor with a distressed or injured dog to drive to a town vet during a busy show is impractical and potentially life-threatening. On-site veterinary cover is a legal and ethical requirement."},{text:"On-site vet, shaded rest areas, water stations at every ring, clean relief areas, a written lost dog protocol, and heat monitoring with defined thresholds for intervention",points:5,feedback:"Comprehensive and correct. Every element serves a specific welfare function, and the written protocol means staff act consistently rather than improvising. Visible veterinary presence alone significantly reassures exhibitors."},{text:"A qualified vet on standby at a welfare tent, water stations in the main rings only, and a welfare officer carrying a radio for the duration of the show",points:3,feedback:"The vet and welfare officer are the right foundations. Water stations need to extend beyond the main rings — dogs in trade areas, grooming zones, and exercise paddocks need access too. A lost dog procedure should also be formalised."},{text:"First aid facilities for people, a welfare information leaflet in the exhibitor pack, and a welfare telephone number staffed during show hours",points:2,feedback:"Human first aid and information are useful, but this provision is built around responding to problems rather than preventing them. No on-site vet, no active welfare monitoring, and no infrastructure for dogs in distress."}]},
  {id:"w2",major:4,title:"Step 10: Extreme Heat on Show Day",icon:Heart,majorTitle:"Dog Welfare",question:"Temperatures reach 31°C by midday, well above the forecast. What action do you take?",options:[{text:"Post a welfare advisory on the show's social media channels and trust exhibitors — who know their own dogs best — to make responsible decisions",points:2,feedback:"Social media advisories reach only those actively checking their phones. Passive communication is insufficient when dogs are at active risk of heat stroke. The organiser must take direct, visible action on site."},{text:"Cancel the afternoon session entirely and issue partial refunds, prioritising brachycephalic and double-coated breed classes into the cooler morning",points:4,feedback:"A bold decision that puts welfare first. Scheduling vulnerable breeds into the morning is excellent breed-specific thinking. The disruption is significant but defensible — exhibitors who understand the risks will respect the call."},{text:"Continue the show unchanged — exhibitors accepted the weather risk when they entered and are responsible for their own dogs",points:1,feedback:"Irresponsible and legally exposed. At 31°C, dogs — especially flat-faced breeds — face serious heat stroke risk. Continuing without intervention is a welfare failure and opens the organiser to prosecution."},{text:"Shorten judging sessions to 40 minutes with mandatory breaks, deploy misting fans at ring entrances, expand the cool-down zone, and broadcast welfare guidance over the PA every 30 minutes",points:5,feedback:"Excellent on-site crisis management. Reducing ring time, providing active cooling, and repeated PA welfare messaging work together to protect dogs while keeping the show running. This is duty of care in action."}]},
  {id:"w3",major:4,title:"Step 11: Dog Collapses in the Ring",icon:Heart,majorTitle:"Dog Welfare",question:"A Bulldog collapses mid-assessment in Ring 7. The handler is distressed. What happens next?",options:[{text:"The ring steward pauses judging, radios the on-site vet, moves the dog to a shaded welfare area, and a trained welfare volunteer supports the handler — all without a public PA announcement",points:5,feedback:"Textbook emergency welfare response. Every role is pre-assigned, communication is controlled, and both the dog and the distressed handler are actively supported. Written protocols made this response automatic rather than improvised."},{text:"The ring steward calls for a vet over the public PA and continues assessing the remaining dogs while waiting for assistance to arrive",points:1,feedback:"Continuing to judge while a dog is visibly in distress is both callous and chaotic. A public PA call creates alarm and a crowd surge. Judging must pause immediately and radio communication should be used."},{text:"Ask the handler to carry the dog to the welfare tent while the ring steward marks their place and holds their position in the judging order",points:2,feedback:"A distressed handler should not be left to manage an ill dog alone while also navigating a crowded showground. The welfare volunteer exists precisely to assist in this moment — the handler should not have to act unaccompanied."},{text:"Suspend Ring 7, radio the vet, send a welfare volunteer to accompany the handler and dog to the welfare area, and calmly reassure nearby exhibitors before resuming",points:4,feedback:"A strong response. The only refinement is having the protocol fully pre-written so stewards act instinctively without needing to make real-time decisions. Pre-assigned roles eliminate hesitation under pressure."}]},
  {id:"a1",major:5,title:"Step 12: Welcoming First-Time Exhibitors",icon:Shield,majorTitle:"Newcomer Welcome",question:"How will you make the show genuinely accessible to first-time exhibitors?",options:[{text:"A dedicated beginners' ring running parallel to the main show, staffed by experienced handlers volunteering as guides throughout the day",points:4,feedback:"Excellent practical support. A parallel ring gives nervous newcomers a low-pressure first experience. Combining this with pre-show information and a novelty class open to crossbreeds would complete the welcome package."},{text:"No special provisions — every experienced exhibitor learned through trial and error, and the same process builds resilience in newcomers",points:1,feedback:"Short-sighted. First-time exhibitors who feel lost and embarrassed rarely return. Those who feel welcomed and supported become loyal, long-term participants. The sport's future depends on bringing new people in effectively."},{text:"A pre-show online webinar, a first-timer briefing note in the entry confirmation, ring stewards trained to identify and quietly assist nervous newcomers, and a novelty class open to all breeds including crossbreeds",points:5,feedback:"Every barrier addressed, every type of dog included. The webinar reaches anxious newcomers before they arrive, the briefing sets expectations, trained stewards provide in-the-moment support, and the novelty class signals everyone belongs."},{text:"A dedicated first-timer helpdesk near the entrance, open from 8am, with printed guides and a map of the showground",points:3,feedback:"A visible, helpful resource that gives newcomers a clear first point of contact. It's reactive rather than proactive — the best welcome reaches people before they arrive and supports them once they're in the ring."}]},
  {id:"a2",major:5,title:"Step 13: Newcomer Error in the Ring",icon:Shield,majorTitle:"Newcomer Welcome",question:"A visibly nervous first-time exhibitor presents their dog incorrectly — wrong stance, ignoring the judge's hand signals. The ring is watching. How does the ring steward respond?",options:[{text:"The steward announces to the ring that the new exhibitor needs a moment and asks everyone to be patient while they receive guidance",points:2,feedback:"The intention is kind but the execution is humiliating. Drawing the entire ring's attention to someone's mistake is the opposite of discreet support. A good steward resolves this quietly and invisibly."},{text:"The steward ignores the error — it is the judge's ring and the judge will correct the handler if they choose to",points:1,feedback:"Abdication of responsibility. The steward's role is precisely to prevent handler errors from reaching the judge. Judges should be free to assess dogs, not manage procedural mistakes."},{text:"The steward quietly steps alongside the handler, gently repositions the dog, gives brief encouragement, and allows the assessment to continue without drawing any wider attention",points:5,feedback:"Perfect stewardship. Quiet, discreet support preserves the handler's dignity, fixes the issue, and keeps the ring flowing. This is exactly what well-trained ring stewards are there to do."},{text:"The steward briefly excuses the handler from the ring, explains the correct procedure outside, and invites them back in to present their dog again",points:4,feedback:"Considerate and educational. Stepping outside preserves some dignity and ensures the handler genuinely understands before re-entering. The minor interruption to ring flow is a fair trade for a better outcome."}]},
  {id:"e2",major:"E2",title:"🚨 EMERGENCY: Viral Media Incident",icon:AlertTriangle,majorTitle:"Emergency Situation 2",isEmergency:true,question:"An unaccredited journalist posts a misleading clip of a handler appearing to jerk a dog's lead. It goes viral within the hour. Your show is trending online. What do you do?",options:[{text:"Issue a written statement within 30 minutes confirming your welfare officer is reviewing the footage, describing your full on-site welfare provisions, and inviting the journalist for an accredited guided tour of the showground",points:5,feedback:"Media-savvy crisis management. Speed, transparency, and an offer of constructive engagement disarms the story far more effectively than defensiveness. Inviting the journalist in rather than pushing them out is counter-intuitive but highly effective."},{text:"Instruct all staff and stewards to prevent further filming on site and confiscate phones from anyone seen recording in the rings",points:0,feedback:"⛔ SHOW CLOSURE. Attempting to confiscate personal devices is illegal, immediately escalates the story, and will result in confrontations across the showground. The resulting chaos will force you to close the event. Regulators will follow. The show is over.",isShutdown:true},{text:"Ignore the social media activity and focus on running the show — online controversies fade quickly when there is no response to amplify them",points:1,feedback:"Social media crises do not fade when ignored — they escalate, especially when a journalist is actively pursuing the story. Silence reads as guilt and surrenders your ability to shape the narrative entirely."},{text:"Post a general welfare statement on the show's social channels and quietly ask the handler involved to avoid further ring appearances for the rest of the day",points:3,feedback:"The welfare statement is valuable and fast. Removing the handler without investigation may be unfair if the clip was genuinely misleading. The journalist angle and the wider media narrative are not addressed."}]},
  {id:"b1",major:6,title:"Step 14: Budget Allocation",icon:DollarSign,majorTitle:"Budget Management",question:"How will you allocate your £30,000 show budget across five categories?",options:[{text:"Venue & infrastructure 35%, judges & officials 25%, welfare & safety 15%, prizes & trophies 10%, marketing 15%",points:5,feedback:"Well-calibrated. Venue and judging form the foundation of any quality show. Welfare is ring-fenced at a meaningful level. Marketing spend is sufficient without crowding out the operational essentials."},{text:"Marketing & promotion 50%, venue 25%, judges 15%, prizes 5%, welfare 5%",points:1,feedback:"Marketing is only valuable if the show itself delivers. Heavy promotional spending before securing quality infrastructure means selling an experience you haven't yet built. The welfare allocation at 5% is dangerously low."},{text:"Equal 20% across all five categories — democratic, predictable, and easy to defend to stakeholders",points:2,feedback:"Equal splits feel fair but are strategically naive. Venue and judging deserve more investment than marketing; welfare must be ring-fenced rather than competing equally with trophies. Allocation should reflect priority, not equality."},{text:"Prizes & trophies 40%, venue 30%, judges 20%, welfare 5%, marketing 5%",points:1,feedback:"Spectacular prizes attract attention but if the infrastructure is underfunded and welfare provision is minimal, exhibitors won't return regardless of the silverware. Product always has to precede promotion."}]},
  {id:"b2",major:6,title:"Step 15: Mid-Planning Budget Overrun",icon:DollarSign,majorTitle:"Budget Management",question:"Six weeks before the show, your venue invoices £4,000 more than quoted due to infrastructure charges. What do you do?",options:[{text:"Cut the welfare budget to cover the overrun — it has the most flexibility and the core welfare provisions can still function at a slightly reduced level",points:1,feedback:"Never cut welfare to balance books. This is ethically wrong, potentially illegal, and exposes the show to serious liability. The welfare line must be protected regardless of budget pressure elsewhere."},{text:"Absorb the overrun personally and plan to recover it from next year's entry fees once the show proves its commercial potential",points:2,feedback:"Personal financial exposure without a clear written recovery plan is inadvisable. Relying on next year's fees assumes future success and creates budget pressure on the following show before it has even been planned."},{text:"Approach the main sponsor with a transparent briefing on the overrun and a formal request for emergency additional funding",points:4,feedback:"Legitimate and professional. Sponsors respect honesty and clear communication. The risk is that a last-minute ask may strain the relationship if the sponsor feels the original proposal was inaccurate. Document everything carefully."},{text:"Reduce trophies to functional rather than prestige items, trim the marketing budget modestly, and approach two additional trade stand holders with an early-bird fee offer to generate new income",points:5,feedback:"Smart multi-source recovery. Reducing trophy ambition and trimming marketing are low-impact cuts; generating new income from trade stands turns a problem into an opportunity. No welfare or judging quality is sacrificed."}]},
  {id:"b3",major:6,title:"Step 16: Sponsorship Offer",icon:DollarSign,majorTitle:"Budget Management",question:"A premium pet food brand offers £5,000 for exclusive branding rights across all rings and the right to address exhibitors over the PA during Best in Show. Do you accept?",options:[{text:"Accept the £5,000 in full and grant all requested rights — they are a paying sponsor and deserve meaningful visibility at the event's peak moment",points:2,feedback:"A commercial partner's desire for visibility must be balanced against the exhibitor experience. Handing over the PA during Best in Show puts your show's most prestigious moment in the hands of an advertiser. Serious exhibitors will resent it."},{text:"Decline the offer entirely — commercial sponsorship of competitive classes creates the appearance of bias and undermines the show's credibility",points:3,feedback:"A principled stance, but perhaps too rigid. Well-structured sponsorship is standard at every major dog show worldwide. The issue is always in the terms, not the principle. Negotiation would serve you better than refusal."},{text:"Counter-offer: accept the £5,000 but restrict branding rights to the trade village and a brief pre-show PA mention only — no access during judging or Best in Show",points:5,feedback:"Excellent commercial negotiation. You secure the financial benefit while protecting the integrity of the competitive programme. Sponsors handled professionally on first contact often become loyal long-term partners."},{text:"Accept the sponsorship but quietly tell ring managers to minimise the brand's presence in the rings regardless of the contract terms",points:1,feedback:"Accepting money while planning to breach the contract is dishonest and exposes you to legal action. If the terms aren't acceptable, negotiate openly before signing — not after."}]},
  {id:"x1",major:7,title:"Step 17: Spectator Experience",icon:Star,majorTitle:"Show Experience",question:"Beyond the competition rings, what will make your show a memorable day for everyone?",options:[{text:"Competition rings only — keeping the focus purely professional signals that this is a serious event, not a public entertainment",points:1,feedback:"Respected by hardcore enthusiasts but leaves spectators bored between rings and misses the community atmosphere that elevates a great show. The experience around the ring matters as much as the ring itself."},{text:"A large music and food festival alongside the show, with dogs as the theme rather than the centrepiece — maximum public footfall and ticket revenue",points:2,feedback:"Strong public engagement but risks feeling more like a festival than a dog show. Exhibitors who have paid entry fees and travelled far with their dogs will feel the competition is secondary to commercial entertainment."},{text:"Breed information boards at each ring, a trade village, a dog photography studio, a kids' handling demonstration, and a Rescue Dog of the Year award at the closing ceremony",points:5,feedback:"You've thought of everyone. Breed boards educate casual visitors, trade stands serve exhibitors, the photography studio creates shareable moments, the kids' demo inspires the next generation, and the rescue award gives the show genuine heart."},{text:"An expanded trade fair, a grooming competition running alongside breed classes, and an evening social for exhibitors and judges after the show closes",points:4,feedback:"Strong on community and exhibitor experience. The grooming competition is a real crowd-pleaser. Adding some public-facing education would broaden the show's appeal beyond the exhibiting community."}]},
  {id:"x2",major:7,title:"Step 18: Closing Ceremony",icon:Star,majorTitle:"Show Experience",question:"How will you close the show and send everyone home?",options:[{text:"Announce Best in Show, thank the judges briefly on the PA, and let exhibitors leave when they're ready — everyone is tired and wants to get home",points:2,feedback:"Abrupt and forgettable. The closing ceremony is the emotional memory of the day. A rushed exit with no acknowledgement of officials and volunteers wastes all the goodwill you've built over the previous eight hours."},{text:"A formal Best in Show presentation, a Rescue Dog of the Year special award, public thanks to judges, officials and volunteers over the PA, and a staggered 15-minute exit by ring to prevent car park gridlock",points:5,feedback:"Ceremonial, celebratory, and logistically smart. The rescue award sends everyone home with the show's values resonating. Staggered exit is the operational detail that separates experienced organisers from first-timers."},{text:"Skip the ceremony and email all results and winner photographs to exhibitors tonight — faster, more professional, and avoids a chaotic end-of-day crowd",points:1,feedback:"Deeply underwhelming. Winning Best in Show should be a moment an exhibitor remembers for years. An email cannot replicate the atmosphere of a well-run closing presentation. The ceremony is not optional."},{text:"Invite exhibitors, judges, and officials to a post-show reception to celebrate and give informal feedback on the day — a community moment that helps plan next year's show",points:4,feedback:"A lovely touch that builds lasting community and yields invaluable informal feedback. Requires advance catering planning and a separate budget line, but the investment in relationships pays long dividends for future events."}]},
];

const SCORE_QUESTIONS = allSteps.filter(s => !s.isEmergency);
const MAX_RAW = SCORE_QUESTIONS.length * 5;
const scaleScore = raw => Math.round((raw / MAX_RAW) * 100);

const pointColor = p => p===5?"text-green-700":p===4?"text-blue-700":p===3?"text-yellow-700":p>=1?"text-orange-600":"text-red-700";
const pointBorderStyle = p => p===5?{borderColor:"#4ade80",background:"#f0fdf4"}:p===4?{borderColor:"#60a5fa",background:"#eff6ff"}:p===3?{borderColor:"#facc15",background:"#fefce8"}:p>=1?{borderColor:"#fb923c",background:"#fff7ed"}:{borderColor:"#ef4444",background:"#fef2f2"};
const pointLabel = p => p===5?"Excellent!":p===4?"Good":p===3?"Acceptable":p>=1?"Poor choice":"Serious error";

function App() {
  const [stepIdx, setStepIdx] = useState(0);
  const [rawScore, setRawScore] = useState(0);
  const [history, setHistory] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [shutdown, setShutdown] = useState(false);
  const [done, setDone] = useState(false);

  const step = allSteps[stepIdx];
  const displayScore = scaleScore(rawScore);

  const handleSelect = idx => {
    if (chosen !== null) return;
    const opt = step.options[idx];
    setChosen(idx);
    if (opt.isShutdown) { setShutdown(true); setHistory(h=>[...h,{step,opt}]); return; }
    if (!step.isEmergency) setRawScore(s=>s+opt.points);
    setHistory(h=>[...h,{step,opt}]);
  };

  const handleNext = () => {
    if (shutdown) return;
    if (stepIdx < allSteps.length-1) { setStepIdx(i=>i+1); setChosen(null); }
    else setDone(true);
  };

  const restart = () => { setStepIdx(0); setRawScore(0); setHistory([]); setChosen(null); setShutdown(false); setDone(false); };

  if (shutdown) {
    const last = history[history.length-1];
    return (
      <div style={{minHeight:"100vh",background:"#7f1d1d",display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
        <div style={{maxWidth:"42rem",width:"100%",background:"#fff",borderRadius:"1rem",boxShadow:"0 25px 50px -12px rgba(0,0,0,.25)",overflow:"hidden"}}>
          <div style={{background:"#dc2626",padding:"1.5rem",textAlign:"center"}}>
            <div style={{fontSize:"4rem",marginBottom:".5rem"}}>⚠️</div>
            <h2 style={{fontSize:"1.875rem",fontWeight:900,color:"#fff"}}>SHOW CLOSED</h2>
            <p style={{color:"#fee2e2",marginTop:".25rem"}}>Your event has been terminated</p>
          </div>
          <div style={{padding:"2rem"}}>
            <div style={{background:"#fef2f2",border:"2px solid #ef4444",borderRadius:".75rem",padding:"1.25rem",marginBottom:"1.5rem"}}>
              <p style={{fontWeight:"bold",color:"#b91c1c",marginBottom:".5rem"}}>✗ Decision at: {last.step.title}</p>
              <p style={{color:"#374151",fontStyle:"italic",marginBottom:".75rem"}}>"{last.opt.text}"</p>
              <p style={{color:"#991b1b",fontWeight:500}}>{last.opt.feedback}</p>
            </div>
            <p style={{color:"#4b5563",marginBottom:"1.5rem",textAlign:"center"}}>You reached question {stepIdx+1} of {allSteps.length} with a score of <strong>{displayScore}/100</strong> before the show was shut down.</p>
            <button onClick={restart} style={{width:"100%",background:"#dc2626",color:"#fff",padding:".75rem",borderRadius:".75rem",fontWeight:"bold",fontSize:"1.125rem",cursor:"pointer"}}>🔄 Try Again</button>
          </div>
        </div>
      </div>
    );
  }

  if (done) {
    const pct = displayScore/100;
    const result = pct>=.85?{title:"🏆 Best in Show — Supreme Champion!",color:"#15803d",bg:"linear-gradient(135deg,#f0fdf4,#d1fae5)",msg:"A flawlessly run show. Your welfare standards were exemplary, judging was credible, and every decision showed deep respect for the dogs and the people who love them. Exhibitors are already saving next year's date."}
      :pct>=.70?{title:"🥈 Reserve Best in Show — Excellent Effort",color:"#1d4ed8",bg:"linear-gradient(135deg,#eff6ff,#e0f2fe)",msg:"A genuinely impressive show that earned warm praise from most exhibitors. A few judgement calls cost you points, but the foundations are strong. Refine your emergency protocols and you could be supreme next year."}
      :pct>=.50?{title:"🎀 Highly Commended — Room to Grow",color:"#a16207",bg:"linear-gradient(135deg,#fefce8,#fde68a)",msg:"The show had its moments but left some exhibitors frustrated. Review your welfare provisions and emergency responses in particular — those decisions carry the most real-world weight."}
      :{title:"❌ Not Placed — Back to Training",color:"#b91c1c",bg:"linear-gradient(135deg,#fef2f2,#ffe4e6)",msg:"The show fell well short of expectations. Poor welfare decisions and inadequate emergency responses did serious reputational damage. Study the Kennel Club guidelines thoroughly before attempting your next event."};
    return (
      <div style={{minHeight:"100vh",background:result.bg,padding:"1.5rem"}}>
        <div style={{maxWidth:"48rem",margin:"0 auto",background:"#fff",borderRadius:"1rem",boxShadow:"0 20px 25px -5px rgba(0,0,0,.1)",padding:"2rem"}}>
          <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
            <div style={{fontSize:"3rem",marginBottom:".5rem"}}>🐕</div>
            <h2 style={{fontSize:"1.875rem",fontWeight:"bold",marginBottom:".75rem",color:result.color}}>{result.title}</h2>
            <div style={{fontSize:"4.5rem",fontWeight:900,color:"#7c3aed",marginBottom:".25rem"}}>{displayScore}<span style={{fontSize:"1.875rem",color:"#9ca3af"}}>/100</span></div>
            <div style={{width:"100%",background:"#e5e7eb",borderRadius:"9999px",height:".625rem",marginBottom:"1rem"}}>
              <div style={{background:"#8b5cf6",height:".625rem",borderRadius:"9999px",width:`${displayScore}%`,transition:"width .5s"}}/>
            </div>
            <p style={{color:"#374151",lineHeight:1.625}}>{result.msg}</p>
          </div>
          <div style={{marginBottom:"2rem"}}>
            <h3 style={{fontSize:"1.25rem",fontWeight:600,color:"#1f2937",marginBottom:".75rem"}}>Your Decision Log:</h3>
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {history.map((h,i)=>(
                <div key={i} style={{background:"#f9fafb",borderRadius:".75rem",padding:".75rem",display:"flex",gap:".75rem",alignItems:"flex-start"}}>
                  <div style={{flexShrink:0,marginTop:"2px"}}>📌</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:600,color:"#374151",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".05em"}}>{h.step.title}</p>
                    <p style={{fontSize:".875rem",color:"#1f2937",marginTop:"2px",fontStyle:"italic"}}>"{h.opt.text}"</p>
                    <p style={{fontSize:".75rem",fontWeight:"bold",marginTop:"2px",color:h.opt.isShutdown?"#b91c1c":h.opt.points>=4?"#15803d":h.opt.points>=3?"#a16207":"#ea580c"}}>
                      {h.opt.isShutdown?"⛔ SHUTDOWN":pointLabel(h.opt.points)}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={restart} style={{width:"100%",background:"#7c3aed",color:"#fff",padding:".75rem",borderRadius:".75rem",fontWeight:"bold",fontSize:"1.125rem",cursor:"pointer"}}>🐾 Organise Another Show</button>
        </div>
      </div>
    );
  }

  const progress = (stepIdx/allSteps.length)*100;
  const isEmerg = step.isEmergency;

  return (
    <div style={{minHeight:"100vh",background:isEmerg?"linear-gradient(135deg,#fef2f2,#fff7ed)":"linear-gradient(135deg,#faf5ff,#ede9fe)",padding:"1.5rem"}}>
      <div style={{maxWidth:"48rem",margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"1.25rem"}}>
          <div style={{fontSize:"2rem",marginBottom:".25rem"}}>{isEmerg?"🚨":"🐕"}</div>
          <h1 style={{fontSize:"1.5rem",fontWeight:"bold",color:"#111827"}}>Dog Show Organiser Challenge</h1>
          <div style={{marginTop:".75rem",width:"100%",background:"#e5e7eb",borderRadius:"9999px",height:".625rem"}}>
            <div style={{background:"#8b5cf6",height:".625rem",borderRadius:"9999px",width:`${progress}%`,transition:"width .3s"}}/>
          </div>
          <p style={{fontSize:".875rem",color:"#9ca3af",marginTop:".25rem"}}>Question {stepIdx+1} of {allSteps.length} · Score: {displayScore}/100</p>
        </div>

        <div style={{background:"#fff",borderRadius:"1rem",boxShadow:"0 20px 25px -5px rgba(0,0,0,.1)",overflow:"hidden",outline:isEmerg?"4px solid #f87171":"none"}}>
          <div style={{padding:".75rem 1.5rem",fontSize:".875rem",fontWeight:600,background:isEmerg?"#dc2626":"#ede9fe",color:isEmerg?"#fff":"#6d28d9"}}>
            {step.majorTitle}
          </div>
          <div style={{padding:"1.75rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:".75rem",marginBottom:"1.25rem"}}>
              <div style={{padding:".75rem",borderRadius:".75rem",background:isEmerg?"#fef2f2":"#ede9fe",flexShrink:0}}>
                <step.icon className={`w-6 h-6 ${isEmerg?"text-red-600":"text-purple-600"}`} />
              </div>
              <h2 style={{fontSize:"1.25rem",fontWeight:"bold",color:"#111827"}}>{step.title}</h2>
            </div>
            <p style={{color:"#1f2937",fontWeight:500,marginBottom:"1.25rem",lineHeight:1.625}}>{step.question}</p>
            <div style={{display:"flex",flexDirection:"column",gap:".75rem"}}>
              {step.options.map((opt,idx)=>{
                const isChosen = chosen===idx;
                const isDisabled = chosen!==null && !isChosen;
                let btnStyle = {width:"100%",textAlign:"left",padding:"1rem",borderRadius:".75rem",border:"2px solid",cursor:"pointer",transition:"all .2s",background:"#fff",borderColor:"#e5e7eb"};
                if (isChosen) { const s=opt.isShutdown?{borderColor:"#dc2626",background:"#fef2f2"}:pointBorderStyle(opt.points); btnStyle={...btnStyle,...s}; }
                else if (isDisabled) { btnStyle={...btnStyle,borderColor:"#f3f4f6",background:"#f9fafb",opacity:.4,cursor:"not-allowed"}; }
                return (
                  <button key={idx} onClick={()=>handleSelect(idx)} disabled={chosen!==null} style={btnStyle}>
                    <p style={{color:"#1f2937",fontSize:".875rem",fontWeight:500,lineHeight:1.625,margin:0}}>{opt.text}</p>
                  </button>
                );
              })}
            </div>
            {chosen!==null && !shutdown && (
              <div style={{marginTop:"1.25rem",padding:"1.25rem",borderRadius:".75rem",border:"2px solid",...pointBorderStyle(step.options[chosen].points)}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:".75rem"}}>
                  <div style={{flexShrink:0,marginTop:"2px",fontSize:"1.1rem"}}>✓</div>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:"bold",fontSize:".875rem",marginBottom:".25rem"}} className={pointColor(step.options[chosen].points)}>
                      {pointLabel(step.options[chosen].points)}{!step.isEmergency&&` · ${step.options[chosen].points}/5 pts`}
                    </p>
                    <p style={{color:"#374151",fontSize:".875rem",lineHeight:1.625,margin:0}}>{step.options[chosen].feedback}</p>
                  </div>
                </div>
                <button onClick={handleNext} style={{marginTop:"1rem",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem",padding:".625rem",borderRadius:".75rem",fontWeight:600,color:"#fff",background:isEmerg?"#dc2626":"#7c3aed",cursor:"pointer",fontSize:"1rem"}}>
                  {stepIdx<allSteps.length-1?"Continue":"See Final Results"} →
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
