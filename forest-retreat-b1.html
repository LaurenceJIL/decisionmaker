<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ethereal Grove: Guardian's Mandate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pine: #1B3022; --moss: #4F772D; --mist: #ECF3F9;
            --gold: #D4AF37; --earth: #3E2723; --blood: #8B0000;
            --bark: #5D4037; --leaf: #90A955;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--pine);
            background-image: linear-gradient(rgba(27, 48, 34, 0.8), rgba(27, 48, 34, 0.8)), 
                              url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2560');
            background-size: cover; background-attachment: fixed;
            font-family: 'Lora', serif; color: var(--mist);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        #landing-page, #game-wrapper { max-width: 850px; width: 100%; text-align: center; margin: auto; }
        #game-wrapper { display: none; flex-direction: column; }
        .intro-card, .card {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            border: 1px solid var(--moss); padding: 40px; border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .card { background: #fdfdfd; color: var(--earth); text-align: left; }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold); margin-bottom: 20px; }
        .dashboard {
            display: flex; justify-content: space-between; background: rgba(0,0,0,0.6);
            padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--gold);
        }
        .dash-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--leaf); text-transform: uppercase; }
        .dash-value { font-family: 'EB Garamond', serif; font-size: 1.8rem; color: var(--gold); }
        .era-indicator { color: var(--moss); font-family: 'Cinzel', serif; font-weight: 900; margin-bottom: 10px; display: block; }
        .scenario-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 30px; color: #2c3e50; }
        .choices { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .choice-btn {
            background: #fff; border: 1px solid #ddd; padding: 18px; text-align: left;
            cursor: pointer; font-family: 'Lora', serif; font-size: 1rem; transition: 0.2s;
            border-left: 5px solid transparent; color: var(--earth);
        }
        .choice-btn:hover { border-left: 5px solid var(--moss); background: #f0f7f0; transform: translateX(5px); }
        .feedback-body { font-size: 1.1rem; line-height: 1.6; font-style: italic; margin-bottom: 20px; padding: 15px; border-left: 4px solid var(--gold); background: #f4f4f4; }
        .next-btn { background: var(--pine); color: white; border: none; padding: 15px 30px; font-family: 'Cinzel', serif; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .next-btn:hover { background: var(--moss); }
        .emergency { border: 4px solid var(--blood) !important; }
    </style>
</head>
<body>

<div id="landing-page">
    <h1>The Ethereal Grove</h1>
    <div class="intro-card">
        <p style="margin-bottom: 25px;">Welcome, Guardian. Your journey begins at the Foundations of the sanctuary. Your choices will determine if the Grove flourishes as a beacon of light or fades into a hollow memory.</p>
        <button class="next-btn" onclick="startGame()">Accept the Mandate</button>
    </div>
</div>

<div id="game-wrapper">
    <div class="dashboard">
        <div class="dash-item"><div class="dash-label">Integrity</div><div class="dash-value" id="score-val">0</div></div>
        <div class="dash-item"><div class="dash-label">Phase</div><div class="dash-value" id="phase-val">1/14</div></div>
    </div>
    <div id="game-container"></div>
</div>

<script>
/**
 * DATA POOLS
 */
const eraA = [
    { s: "Golden Eagles are nesting on your meditation hall site. Moving the hall will delay the opening and increase costs significantly.", c: [
        {txt: "Relocate the building site immediately to preserve the eagles' ancestral nesting grounds.", p: 3, fb: "The forest breathes easily. Your sacrifice has aligned your spirit with the ecosystem."},
        {txt: "Redesign the building with a non-invasive viewing gallery that avoids the nesting flight path.", p: 2, fb: "A clever middle ground. The construction was difficult, but the eagles remained undisturbed."},
        {txt: "Delay construction until the nesting season ends, using the time to finalize standard permits.", p: 1, fb: "You avoided harm, but your hesitation has signaled a bureaucratic leadership style to your staff."},
        {txt: "Proceed with the original site construction immediately; assume the birds will naturally relocate.", p: -1, fb: "The forest feels colder. You prioritized your timeline over the grove's existing life."}
    ]},
    { s: "Local villagers claim this land was stolen from their ancestors. They ask for revenue shares to fund a new village school.", c: [
        {txt: "Establish a formal revenue-sharing partnership and provide free wellness programs for village children.", p: 3, fb: "Ancestral protection now guards the Grove. The villagers are now your greatest allies."},
        {txt: "Hire the villagers as primary staff at premium wages and source all retreat food from their local farms.", p: 2, fb: "Economic integration has stabilized the foundation, though land claims still whisper in the night."},
        {txt: "Offer a one-time substantial financial donation to the school fund in exchange for a legal waiver.", p: 1, fb: "The debt is legally settled, but the relationship feels clinical and spiritually hollow."},
        {txt: "Refer the matter to your legal team, relying on modern title deeds which are legally binding.", p: -1, fb: "You chose law over spirit. The community now views the Grove as an invading force."}
    ]}
];

// Fill Era A to 4 items for the demo logic
for(let i=3; i<=4; i++) {
    eraA.push({
        s: `Foundations Challenge ${i}: A decision regarding the sanctuary's initial infrastructure and water rights.`,
        c: [
            {txt: "Implement a zero-impact water recycling system that returns all usage to the local aquifer.", p: 3, fb: "The water table remains pristine. Your technical foresight is matched by your ethics."},
            {txt: "Source water from the secondary spring, leaving the main ancient spring untouched.", p: 2, fb: "A responsible choice that protects the forest's most sacred resource."},
            {txt: "Dig a standard deep-well to meet guest demands without affecting surface water levels.", p: 1, fb: "Practical and effective, though it lacks the 'sacred' care promised in your mandate."},
            {txt: "Maximize spring extraction to power the luxury waterfalls promised in your marketing materials.", p: -1, fb: "The gully is drying. You have traded the forest's lifeblood for aesthetic luxury."}
        ]
    });
}

const eraB = []; // Growth
for(let i=1; i<=4; i++) {
    eraB.push({
        s: `Expansion Challenge ${i}: Investors want to clear part of the old-growth forest to build high-end villas.`,
        c: [
            {txt: "Refuse the expansion and increase prices to maintain a low human footprint on the land.", p: 3, fb: "Scarcity has created legendary status. The trees stand tall, and your integrity is world-renowned."},
            {txt: "Build 'Tree-Pod' villas that suspend from the canopy, requiring zero tree removal.", p: 2, fb: "Innovative and respectful. The guests love the unique experience, though maintenance is high."},
            {txt: "Expand onto the nearby rocky plateau where the soil is poor, keeping the forest interior intact.", p: 1, fb: "A practical expansion. You saved the trees, but the new guests feel slightly disconnected."},
            {txt: "Clear the requested forest section to build the villas, promising to plant new saplings nearby.", p: -1, fb: "The forest's canopy is broken. You traded ancient life for a bigger balance sheet."}
        ]
    });
}

const eraC = []; // Legacy
for(let i=1; i<=4; i++) {
    eraC.push({
        s: `Legacy Challenge ${i}: A multinational corporation offers to buy the Grove and turn it into a global brand.`,
        c: [
            {txt: "Transfer the land title to a permanent non-profit trust governed by a council of spiritual practitioners.", p: 3, fb: "You leave as a legend. The Grove is no longer a business, but a permanent world monument."},
            {txt: "Appoint a hand-picked successor who has demonstrated twenty years of devotion to the original mission.", p: 2, fb: "The flame is passed. The Grove's future is stable, even if its global influence remains small."},
            {txt: "Sell a minority stake to the group to fund a global foundation while retaining strict site control.", p: 1, fb: "The Grove is safe for now, but commercial pressure will likely erode your vision over time."},
            {txt: "Finalize the sale to the highest bidder to secure your financial legacy and 'retire' the brand.", p: -1, fb: "You sold the soul of the forest for a payout. The Grove is now just another luxury logo."}
        ]
    });
}

const emergencies = [
    { s: "⚠️ EMERGENCY: A catastrophic wildfire is approaching. You have less than an hour to evacuate staff and guests.", c: [
        {txt: "Abandon all physical assets and lead a manual evacuation through the ancient stone tunnels.", p: 2, fb: "Decisive leadership saved every life. The Grove will be rebuilt on the bedrock of absolute trust."},
        {txt: "Delay the evacuation to secure the rare art collection and ancient library archives.", p: -100, fb: "DISASTER. The delay was fatal. You face criminal negligence for the lives lost to the flames."}
    ]},
    { s: "⚠️ EMERGENCY: A journalist discovers a financial error from Year 1 and threatens an expose unless paid a bribe.", c: [
        {txt: "Publish the financial error yourself immediately and open all ledgers for public inspection.", p: 2, fb: "Radical transparency won the day. Public trust in the Grove has reached an all-time high."},
        {txt: "Authorize a quiet payment to bury the story and protect the Grove's reputation.", p: -100, fb: "BANKRUPTCY. The bribe was recorded. The scandal led to the permanent seizure of the Grove."}
    ]}
];

/**
 * GAME ENGINE
 */
let score = 0, currentStep = 0, gameStack = [], currentChoices = [];

function startGame() {
    document.getElementById('landing-page').style.display = 'none';
    document.getElementById('game-wrapper').style.display = 'flex';
    
    // Stack: 4A -> Emer1 -> 4B -> Emer2 -> 4C
    gameStack = [...eraA, emergencies[0], ...eraB, emergencies[1], ...eraC];
    renderStep();
}

function renderStep() {
    const data = gameStack[currentStep];
    if(!data) return showResults();

    const container = document.getElementById('game-container');
    const isEmerg = data.s.includes('⚠️');
    
    document.getElementById('score-val').innerText = score;
    document.getElementById('phase-val').innerText = `${currentStep + 1}/14`;
    
    // Safety store of choices for this step
    currentChoices = [...data.c];

    container.innerHTML = `
        <div class="card ${isEmerg ? 'emergency' : ''}">
            <span class="era-indicator">${isEmerg ? 'CRITICAL EVENT' : 'GUARDIAN DECISION'}</span>
            <p class="scenario-text">${data.s}</p>
            <div class="choices" id="choice-list"></div>
        </div>
    `;

    // Create buttons using index to avoid "jamming"
    currentChoices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice.txt;
        btn.onclick = () => handleChoice(index);
        document.getElementById('choice-list').appendChild(btn);
    });
}

function handleChoice(index) {
    const choice = currentChoices[index];
    
    if (choice.p <= -50) {
        document.getElementById('game-container').innerHTML = `
            <div class="card emergency"><h2>MANDATE TERMINATED</h2>
            <div class="feedback-body">${choice.fb}</div>
            <button class="next-btn" onclick="location.reload()">Return to the Earth</button></div>`;
        return;
    }
    if (choice.p === -1) {
        document.getElementById('game-container').innerHTML = `
            <div class="card"><h2 style="color:var(--blood)">ETHICAL DISSONANCE</h2>
            <div class="feedback-body">${choice.fb}</div>
            <button class="next-btn" onclick="renderStep()">Seek a Different Path</button></div>`;
        return;
    }

    score += choice.p;
    document.getElementById('game-container').innerHTML = `
        <div class="card"><h2>The Forest Responds</h2>
        <div class="feedback-body">${choice.fb}</div>
        <p style="margin-bottom:20px; font-weight:bold; color:var(--gold)">Spirit Integrity: +${choice.p}</p>
        <button class="next-btn" onclick="nextStep()">Continue the Walk</button></div>`;
}

function nextStep() { currentStep++; renderStep(); }

function showResults() {
    const rank = score >= 30 ? "The Eternal Guardian" : (score >= 18 ? "The Wise Steward" : "The Fading Echo");
    document.getElementById('game-container').innerHTML = `
        <div class="card" style="text-align:center"><h1>Cycle Complete</h1>
        <div style="font-size:4rem; color:var(--gold); margin:20px 0;">${score}</div>
        <h2>${rank}</h2><button class="next-btn" style="margin-top:20px" onclick="location.reload()">Begin a New Rite</button></div>`;
}
</script>
</body>
</html>
