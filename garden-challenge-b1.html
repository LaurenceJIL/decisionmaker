<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Spring Garden Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #2d5a27;
    --green-mid: #4a8c3f;
    --green-light: #7dba6f;
    --earth: #8b5e3c;
    --cream: #faf7f0;
    --gold: #c9a84c;
    --red: #c0392b;
    --text: #1a2e1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background-color: var(--cream);
    color: var(--text);
    line-height: 1.6;
  }

  /* ── EMOJI SCORING HEADER ── */
  .site-header {
    background: var(--green-dark);
    color: white;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .header-content {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title-row h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
  }

  .score-badge {
    font-weight: bold;
    color: var(--gold);
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .emoji-line {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    min-height: 35px;
    background: rgba(0,0,0,0.2);
    padding: 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .garden-emoji {
    font-size: 1.5rem;
    animation: grow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes grow {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  /* ── GAME CARDS ── */
  .container {
    max-width: 800px;
    margin: 30px auto;
    padding: 0 20px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    border-bottom: 5px solid var(--green-mid);
  }

  h2 { font-family: 'Playfair Display', serif; margin-bottom: 15px; color: var(--green-dark); }
  .description { font-size: 1.1rem; margin-bottom: 25px; }

  .choice-list { display: grid; gap: 12px; }

  .choice-btn {
    background: white;
    border: 2px solid #eee;
    padding: 15px 20px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 1rem;
    transition: 0.2s;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--green-light);
    background: #f9fff9;
  }

  .feedback {
    margin-top: 25px;
    padding: 20px;
    border-radius: 10px;
    display: none;
    animation: fadeIn 0.5s;
  }

  .fb-good { background: #eefbee; border: 1px solid var(--green-mid); color: #1e461e; }
  .fb-neutral { background: #fffdf2; border: 1px solid var(--gold); color: #5c4d1a; }
  .fb-poor { background: #fff5f5; border: 1px solid var(--red); color: #611a1a; }

  .btn-next {
    background: var(--green-dark);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-content">
    <div class="title-row">
      <h1>🌸 My Spring Garden</h1>
      <div class="score-badge">Garden Points: <span id="numScore">0</span></div>
    </div>
    <div class="emoji-line" id="emojiLine">
      <!-- Garden items appear here as you gain points -->
    </div>
  </div>
</header>

<div class="container">
  <!-- START SCREEN -->
  <section id="screen-start" class="screen active">
    <div class="card" style="text-align: center;">
      <h2>Welcome to the Garden!</h2>
      <p class="description">Winter is over and spring is finally here. It is time to start your garden! Can you make the best choices to help your plants grow and keep the bees happy?</p>
      <button class="btn-next" onclick="startGame()">Start Gardening</button>
    </div>
  </section>

  <!-- GAME SCREEN -->
  <section id="screen-game" class="screen">
    <div class="card">
      <h2 id="stepTitle">Title</h2>
      <p class="description" id="stepDesc">Description</p>
      <div class="choice-list" id="choiceList"></div>

      <div id="feedbackBox" class="feedback">
        <h3 id="fbTitle">Result</h3>
        <p id="fbText" style="margin: 10px 0;"></p>
        <button class="btn-next" id="nextBtn">Continue →</button>
      </div>
    </div>
  </section>

  <!-- FINAL SCREEN -->
  <section id="screen-final" class="screen">
    <div class="card" style="text-align: center;">
      <h2>Garden Season Finished!</h2>
      <p class="description" id="finalMessage"></p>
      <button class="btn-next" onclick="location.reload()">Try Again</button>
    </div>
  </section>
</div>

<script>
const gardenItems = ["🌱", "🌿", "🍀", "🍃", "🌸", "🌼", "🌻", "🌺", "🌹", "🌷", "🐝", "🦋", "🍄", "🌳", "🧺", "🐦", "🍎", "🥕", "🍓", "🧤", "🚿"];

const steps = [
  {
    title: "Step 1: Getting Ready",
    desc: "The weather is getting warmer, but the ground is still a bit cold. What is the first thing you should do?",
    choices: [
      { text: "Clean and sharpen your garden tools.", pts: 3, type: "good", fb: "<b>Great!</b> Clean tools are very important. They help you work better and keep your plants healthy." },
      { text: "Plant your tomato seeds outside in the garden immediately.", pts: 0, type: "poor", fb: "<b>Oh no!</b> It is still too cold for tomatoes. They will freeze and die during the night." },
      { text: "Buy some pretty flowers from a shop to put in the garden.", pts: 1, type: "neutral", fb: "<b>Nice!</b> It makes the garden look pretty, but you have more important work to do first." }
    ]
  },
  {
    title: "Step 2: Planting Seeds",
    desc: "You have a packet of sunflower seeds. What is the best way to plant them?",
    choices: [
      { text: "Plant them in small pots inside near a sunny window.", pts: 3, type: "good", fb: "<b>Perfect!</b> The seeds are warm and safe inside. They will grow strong before they go outside." },
      { text: "Throw the seeds on the grass and hope they grow.", pts: 0, type: "poor", fb: "<b>Unlucky!</b> The birds saw you throw the seeds. They ate almost all of them for lunch." },
      { text: "Wait one month before you do anything with the seeds.", pts: 1, type: "neutral", fb: "<b>Safe...</b> but if you wait too long, you might miss the best time for growing." }
    ]
  },
  {
    title: "Step 3: Helping the Soil",
    desc: "Plants need food to grow big and strong. What should you add to the earth?",
    choices: [
      { text: "Add natural compost or manure to the soil.", pts: 3, type: "good", fb: "<b>Excellent!</b> This makes the soil rich and healthy. Your plants will love it." },
      { text: "Do nothing. The soil looks fine to me.", pts: 1, type: "neutral", fb: "<b>Okay...</b> The plants will grow, but they won't be very big or healthy." },
      { text: "Use a lot of strong chemicals to kill all the weeds first.", pts: -2, type: "poor", fb: "<b>Careful!</b> Strong chemicals can hurt the good bugs and the soil. It is better to use natural things." }
    ]
  },
  {
    title: "Step 4: A Cold Night",
    desc: "The news says it will be very cold tonight! Your young plants are outside. What do you do?",
    choices: [
      { text: "Cover the small plants with a garden cloth or an old sheet.", pts: 3, type: "good", fb: "<b>Good job!</b> The cloth keeps the plants warm enough to survive the cold night." },
      { text: "Give them a lot of very cold water before you go to bed.", pts: 0, type: "poor", fb: "<b>Oh dear!</b> Cold water makes the plants even colder. This was not a good idea." },
      { text: "Go to sleep and don't worry about the weather.", pts: -1, type: "poor", fb: "<b>Oh no!</b> You forgot to protect your plants. Some of them died in the ice." }
    ]
  }
];

let score = 0;
let currentIdx = 0;

function startGame() {
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  renderStep();
}

function updateScore() {
  document.getElementById('numScore').innerText = score;
  const line = document.getElementById('emojiLine');
  line.innerHTML = '';
  
  // Requirement: show emojis for points gained
  const displayCount = Math.max(0, score);
  for (let i = 0; i < displayCount; i++) {
    const span = document.createElement('span');
    span.className = 'garden-emoji';
    span.innerText = gardenItems[i % gardenItems.length];
    line.appendChild(span);
  }
}

function renderStep() {
  const data = steps[currentIdx];
  document.getElementById('stepTitle').innerText = data.title;
  document.getElementById('stepDesc').innerText = data.desc;
  document.getElementById('feedbackBox').style.display = 'none';
  
  const list = document.getElementById('choiceList');
  list.innerHTML = '';
  list.style.display = 'grid';

  data.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerText = choice.text;
    btn.onclick = () => handleChoice(choice);
    list.appendChild(btn);
  });
}

function handleChoice(choice) {
  score += choice.pts;
  updateScore();
  
  document.getElementById('choiceList').style.display = 'none';
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block';
  fb.className = `feedback fb-${choice.type}`;
  
  document.getElementById('fbTitle').innerText = 
    choice.type === "good" ? "Great Choice!" : 
    choice.type === "neutral" ? "Not Bad" : "Wait!";
    
  document.getElementById('fbText').innerHTML = choice.fb;
  
  document.getElementById('nextBtn').onclick = () => {
    currentIdx++;
    if (currentIdx < steps.length) {
      renderStep();
    } else {
      showFinal();
    }
  };
}

function showFinal() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-final').classList.add('active');
  
  let msg = "";
  if (score >= 10) {
    msg = "You are a Master Gardener! Your garden looks beautiful and all your plants are safe.";
  } else if (score >= 5) {
    msg = "Well done! You have a nice garden. You made some good choices.";
  } else {
    msg = "The garden had a difficult time. Next season, remember to check the weather and help your soil more.";
  }
  document.getElementById('finalMessage').innerText = msg;
}
</script>

</body>
</html>
