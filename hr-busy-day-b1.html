<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Busy Day in HR — English in the Workplace</title>
<meta name="description" content="An interactive English language exercise for B2 learners. Play the role of an HR Manager at a computer hardware components manufacturer and make professional decisions throughout a demanding working day.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;--surface:#FFFFFF;--surface2:#F0EDE6;--surface3:#E8E4DC;
  --ink:#1C1B17;--ink2:#5C5A52;--ink3:#9C9A90;
  --rule:rgba(28,27,23,0.10);--rule2:rgba(28,27,23,0.18);
  --green-bg:#E8F3DA;--green-bd:#8BBD50;--green-tx:#254A09;
  --amber-bg:#FAF0DC;--amber-bd:#E8A020;--amber-tx:#5E3808;
  --red-bg:#FAE8E8;--red-bd:#E08080;--red-tx:#6B1A1A;
  --fatal-bd:#CC3333;--fatal-tx:#4A1010;
  --blue-bg:#E4EEF8;--blue-bd:#6EA8D8;--blue-tx:#0A3D6E;
  --teal-bg:#E0F0EE;--teal-bd:#5ABDB4;--teal-tx:#0D4B48;
  --r:12px;--rs:8px;--rxl:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.05);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
.shell{max-width:720px;margin:0 auto;padding:2.5rem 1.25rem 5rem}
.masthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--rule)}
.masthead-title{font-family:'Lora',Georgia,serif;font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-0.01em}
.masthead-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.level-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;background:var(--blue-bg);color:var(--blue-tx);border:1px solid var(--blue-bd);border-radius:20px;padding:4px 12px;letter-spacing:0.04em;flex-shrink:0}
.card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--rxl);box-shadow:var(--shadow);overflow:hidden}
.card-bar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--rule);background:var(--surface);gap:1rem}
.char-name{font-size:15px;font-weight:500;color:var(--ink)}
.char-role{font-size:12px;color:var(--ink2);margin-top:1px}
.bar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.progress-track{display:flex;gap:5px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;background:var(--surface3);border:1px solid var(--rule2);transition:background .35s,border-color .35s;flex-shrink:0}
.dot.done{background:#7AB33A;border-color:#5D9020}
.dot.active{background:#3D82CC;border-color:#2666AA}
.dot.emg{background:#CC4040;border-color:#AA2222}
.score-chip{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd);border-radius:20px;padding:4px 14px;min-width:64px;text-align:center;transition:all .25s}
.card-body{padding:1.5rem;animation:slideIn .22s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.time-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:.6rem}
.emg-banner{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red-tx);font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.emg-dot{width:18px;height:18px;flex-shrink:0;background:var(--red-tx);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.vocab-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:1.1rem}
.vocab-label{font-size:12px;color:var(--ink3);flex-shrink:0}
.vpill{font-family:'DM Mono',monospace;font-size:11px;background:var(--blue-bg);color:var(--blue-tx);border:1px solid var(--blue-bd);border-radius:20px;padding:2px 9px}
.scenario{font-size:15px;line-height:1.78;color:var(--ink);margin-bottom:1.5rem}
.scenario strong{font-weight:500}
.scenario em{font-style:italic;color:var(--ink2)}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem}
.opt{width:100%;text-align:left;padding:14px 16px;background:var(--surface);border:1px solid var(--rule2);border-radius:var(--rs);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);line-height:1.6;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;transition:background .14s,border-color .14s,transform .1s}
.opt:hover:not(:disabled){background:var(--surface2);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.opt:active:not(:disabled){transform:translateY(0)}
.opt:disabled{cursor:default;transform:none;box-shadow:none}
.opt.sel-g{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx)}
.opt.sel-o{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}
.opt.sel-p{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}
.opt.sel-s{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}
.opt.sel-f{background:var(--red-bg);border-color:var(--fatal-bd);color:var(--fatal-tx)}
.opt-text{flex:1}
.ptag{flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:3px;opacity:0;transition:opacity .2s}
.ptag.vis{opacity:1}
.pt3{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
.pt2{background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}
.pt1,.pt0{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
.fbox{border-radius:var(--rs);font-size:14px;line-height:1.7;padding:14px 16px;margin-bottom:1.25rem;display:none;animation:fadeIn .25s ease}
.fbox.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fb-g{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green-tx)}
.fb-o{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber-tx)}
.fb-p{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-tx)}
.fb-f{background:var(--red-bg);border:2px solid var(--fatal-bd);color:var(--fatal-tx)}
.nxt-wrap{display:flex;justify-content:flex-end}
.nxt{padding:10px 22px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .14s,transform .1s;display:none;letter-spacing:.01em}
.nxt:hover{background:#2E2D28}
.nxt:active{transform:scale(.98)}
.nxt.show{display:inline-block}

/* INTRO */
.intro{padding:2rem 1.5rem}
.intro-kicker{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:.75rem}
.intro-title{font-family:'Lora',Georgia,serif;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1.2;color:var(--ink);margin-bottom:.75rem}
.intro-sub{font-size:15px;color:var(--ink2);line-height:1.6;margin-bottom:2rem}
.intro-stats{display:flex;gap:20px;margin-bottom:2.25rem;padding-bottom:2rem;border-bottom:1px solid var(--rule)}
.is-item{display:flex;flex-direction:column;gap:4px}
.is-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:var(--ink)}
.is-lbl{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.start-btn{padding:14px 32px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:500;cursor:pointer;transition:background .14s}
.start-btn:hover{background:#2E2D28}

/* FINAL SCREEN */
.final-screen{padding:2rem 1.5rem;text-align:center}
.final-kicker{font-size:13px;color:var(--ink3);margin-bottom:1.5rem}
.score-block{margin-bottom:1.5rem}
.score-num{font-family:'Lora',serif;font-size:64px;font-weight:600;line-height:1;color:var(--ink)}
.score-denom{font-size:16px;color:var(--ink3);margin-top:4px}
.bar-track{width:100%;height:8px;background:var(--surface3);border-radius:10px;margin:1.5rem 0;overflow:hidden}
.bar-fill{width:0;height:100%;background:#7AB33A;transition:width 1.2s cubic-bezier(0.2, 0.8, 0.2, 1)}
.final-band-row{margin-bottom:1.25rem}
.band{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em}
.band.expert{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
.band.solid{background:var(--blue-bg);color:var(--blue-tx);border:1px solid var(--blue-bd)}
.band.dev{background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}
.band.basic{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
.final-grade{font-family:'Lora',serif;font-size:22px;font-weight:600;margin-bottom:.75rem}
.final-body{font-size:15px;line-height:1.7;color:var(--ink2);margin-bottom:2rem;max-width:540px;margin-left:auto;margin-right:auto}
.tips-box{background:var(--surface2);padding:1.5rem;border-radius:var(--rs);text-align:left;margin-bottom:2rem}
.tips-label{font-size:13px;font-weight:600;margin-bottom:.75rem;color:var(--ink)}
.tips-text{font-size:14px;color:var(--ink2);line-height:1.6}
.vocab-section{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--rule);text-align:left}
.vocab-sec-label{font-size:13px;font-weight:600;margin-bottom:1.25rem;color:var(--ink)}
.vocab-grid{display:flex;flex-wrap:wrap;gap:8px}
.replay-btn{padding:12px 24px;background:var(--surface);border:1px solid var(--rule2);border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;transition:all .14s}
.replay-btn:hover{background:var(--surface2);border-color:var(--ink2)}

@media (max-width:480px){
  .shell{padding:1.5rem 1rem 3rem}
  .intro-stats{flex-direction:column;gap:15px}
  .masthead-sub{display:none}
}
</style>
</head>
<body>

<div class="shell">
  <header class="masthead">
    <div>
      <div class="masthead-title">NexCore Components Ltd.</div>
      <div class="masthead-sub">Interactive Professional English</div>
    </div>
    <div class="level-badge">LEVEL B2</div>
  </header>

  <main class="card" id="gc">
    </main>
</div>

<script>
/**
 * Fisher-Yates Shuffle
 * Ensures true mathematical randomness of array elements.
 */
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

const STEPS = {
  start: {
    time: "08:45 AM",
    title: "The Performance Review Prep",
    vocab: ["disciplinary", "appraisal", "KPIs"],
    scene: "You arrive at your desk. Your first task is to prepare for a <strong>disciplinary meeting</strong> with a junior technician whose performance has been dipping. You need to review their latest <strong>appraisal</strong> and check if they've met their <strong>KPIs</strong> (Key Performance Indicators) over the last quarter.",
    opts: [
      { t: "Review all documentation thoroughly and prepare specific examples of performance gaps.", pts: 3, fb: "<strong>Excellent.</strong> Entering a disciplinary meeting with clear, evidence-based examples is the most professional approach and ensures fairness.", type: "g" },
      { t: "Send a quick email to their manager asking for a summary of the issues.", pts: 2, fb: "<strong>Acceptable.</strong> While efficient, relying solely on a manager's summary might mean you miss important nuances in the official record.", type: "o" },
      { t: "Go into the meeting and 'wing it' based on general feedback you've heard.", pts: 0, fb: "<strong>Unprofessional.</strong> Disciplinary actions require a paper trail and specific facts to avoid legal risks and maintain employee trust.", type: "p" }
    ],
    next: "step1"
  },
  step1: {
    time: "10:15 AM",
    title: "The Recruitment Crisis",
    vocab: ["bottleneck", "headhunting", "onboarding"],
    scene: "The Head of Engineering bursts in. 'We have a massive <strong>bottleneck</strong> in production! We need three senior developers by next month.' He wants to use an expensive <strong>headhunting</strong> agency, but your budget for <strong>onboarding</strong> new staff is nearly empty.",
    opts: [
      { t: "Propose an internal referral scheme with a smaller bonus to find talent within existing networks.", pts: 3, fb: "<strong>Strategic.</strong> This saves on agency fees while leveraging the networks of your best current employees.", type: "g" },
      { t: "Approve the headhunter but insist on a heavily negotiated 'success-only' fee.", pts: 2, fb: "<strong>Pragmatic.</strong> You get the speed of an agency while attempting to protect the remaining budget.", type: "o" },
      { t: "Tell him it's impossible to hire right now and he'll have to wait until next quarter.", pts: 1, fb: "<strong>Obstructive.</strong> As HR, you should be a problem-solver. Simply saying 'no' to a critical business need creates friction.", type: "p" }
    ],
    next: "step2"
  },
  step2: {
    time: "11:30 AM",
    title: "Conflicting Personalities",
    vocab: ["grievance", "mediation", "tribunal"],
    scene: "Two team leads are in a heated dispute. One has filed a formal <strong>grievance</strong> claiming the other is undermining their authority. If this isn't resolved, it could lead to an employment <strong>tribunal</strong>. You need to arrange a <strong>mediation</strong> session.",
    opts: [
      { t: "Act as a neutral mediator, allowing both parties to speak without interruption to find common ground.", pts: 3, fb: "<strong>Effective.</strong> Neutrality and active listening are core to successful mediation and conflict resolution.", type: "g" },
      { t: "Listen to both separately and then dictate a solution that they both must follow.", pts: 2, fb: "<strong>Authoritarian.</strong> While it stops the fight, it doesn't resolve the underlying tension, which may resurface later.", type: "o" },
      { t: "Tell them to grow up and resolve it themselves before the end of the day.", pts: 0, fb: "<strong>Negligent.</strong> Ignoring a formal grievance is a serious failure that exposes the company to legal liability.", type: "p" }
    ],
    next: "step3"
  },
  step3: {
    time: "01:45 PM",
    title: "The Benefits Review",
    vocab: ["remuneration", "fringe benefits", "retention"],
    scene: "Employee <strong>retention</strong> is down. Management wants to look at the <strong>remuneration</strong> packages. They are considering adding <strong>fringe benefits</strong> like private healthcare or gym memberships rather than direct salary increases.",
    opts: [
      { t: "Conduct an anonymous employee survey to see which benefits are actually valued by the staff.", pts: 3, fb: "<strong>Data-driven.</strong> Spending money on benefits no one wants is wasteful. Asking the staff ensures a better return on investment.", type: "g" },
      { t: "Choose the cheapest healthcare plan and implement it immediately for everyone.", pts: 1, fb: "<strong>Short-sighted.</strong> A 'one-size-fits-all' approach without research often fails to improve morale or retention.", type: "p" },
      { t: "Recommend a moderate salary increase across the board instead of new perks.", pts: 2, fb: "<strong>Solid.</strong> Most employees prefer cash, though this doesn't help 'brand' the company as a caring employer.", type: "o" }
    ],
    next: "step4"
  },
  step4: {
    time: "03:15 PM",
    title: "The Confidential Leak",
    vocab: ["non-disclosure", "gross misconduct", "whistleblower"],
    scene: "An anonymous <strong>whistleblower</strong> claims a senior manager has shared sensitive company data with a competitor, violating their <strong>non-disclosure</strong> agreement. If true, this is <strong>gross misconduct</strong> and grounds for immediate dismissal.",
    opts: [
      { t: "Launch a discreet internal investigation to gather digital evidence before confronting the manager.", pts: 3, fb: "<strong>Correct.</strong> You must have proof before making such a serious accusation to avoid a wrongful dismissal claim.", type: "g" },
      { t: "Suspend the manager immediately without pay while you look for evidence.", pts: 1, fb: "<strong>Risky.</strong> Suspending without pay before an investigation is completed is legally dangerous in many jurisdictions.", type: "p" },
      { t: "Interview the manager immediately and ask them directly if the rumor is true.", pts: 2, fb: "<strong>Risky but direct.</strong> This gives the manager a chance to delete evidence, but it moves the process along quickly.", type: "o" }
    ],
    next: "step5"
  },
  step5: {
    time: "04:30 PM",
    title: "The Training Budget",
    vocab: ["upskilling", "outsource", "redundancy"],
    scene: "Due to automation, several roles in the warehouse are at risk of <strong>redundancy</strong>. You have a small budget left: you can either <strong>outsource</strong> the work or invest in <strong>upskilling</strong> the current staff for new technical roles.",
    opts: [
      { t: "Develop a retraining program to keep loyal staff and transition them into new technical departments.", pts: 3, fb: "<strong>Visionary.</strong> Retraining is often cheaper than redundancy pay and hiring new people, plus it maintains morale.", type: "g" },
      { t: "Proceed with the redundancies and use the savings to hire specialized contractors.", pts: 2, fb: "<strong>Financial focus.</strong> This is efficient for the balance sheet but damaging for the company's reputation as an employer.", type: "o" },
      { t: "Do nothing and hope the staff find other jobs on their own before the machines arrive.", pts: 0, fb: "<strong>Poor Leadership.</strong> Avoiding the inevitable causes long-term stress and productivity drops.", type: "p" }
    ],
    next: "step6"
  },
  step6: {
    time: "05:15 PM",
    title: "The Exit Interview",
    vocab: ["turnover", "notice period", "severance"],
    scene: "Your top salesperson is leaving. During the <strong>exit interview</strong>, they reveal they are leaving because of 'toxic management.' They are willing to work their full <strong>notice period</strong>, but the atmosphere is tense. No <strong>severance</strong> is required as they resigned.",
    opts: [
      { t: "Take the feedback seriously and schedule a meeting with the department head to discuss management style.", pts: 3, fb: "<strong>Constructive.</strong> Exit interviews are the best way to identify why your staff turnover is high and fix the root cause.", type: "g" },
      { t: "File the interview notes and wish the employee good luck in their next role.", pts: 1, fb: "<strong>Passive.</strong> If you don't act on feedback, you will continue to lose your best people for the same reasons.", type: "p" },
      { t: "Ask the employee if they would stay if you offered them a significant pay rise.", pts: 2, fb: "<strong>Reactive.</strong> Money rarely fixes a toxic culture; it's usually just a temporary band-aid.", type: "o" }
    ],
    next: "final"
  }
};

let s = 0;
let cp = "start";
const v = ["disciplinary", "appraisal", "KPIs", "bottleneck", "headhunting", "onboarding", "grievance", "mediation", "tribunal", "remuneration", "fringe benefits", "retention", "non-disclosure", "gross misconduct", "whistleblower", "upskilling", "outsource", "redundancy", "turnover", "notice period", "severance"];

function init() {
  document.getElementById('gc').innerHTML = `
    <div class="intro">
      <div class="intro-kicker">HR Manager Simulation</div>
      <h1 class="intro-title">A Busy Day in HR</h1>
      <p class="intro-sub">Navigate the complexities of human resources at NexCore Components Ltd. Manage recruitment, conflict, and strategy while maintaining professional B2-level communication.</p>
      <div class="intro-stats">
        <div class="is-item"><div class="is-val">7</div><div class="is-lbl">Scenarios</div></div>
        <div class="is-item"><div class="is-val">21</div><div class="is-lbl">Vocab terms</div></div>
        <div class="is-item"><div class="is-val">B2</div><div class="is-lbl">CEFR Level</div></div>
      </div>
      <button class="start-btn" onclick="renderStep()">Clock In & Begin</button>
    </div>`;
}

function renderStep() {
  const step = STEPS[cp];
  const keys = Object.keys(STEPS);
  const idx = keys.indexOf(cp);
  
  // Shuffle a copy of the options to prevent pattern recognition
  const shuffledOpts = shuffleArray([...step.opts]);

  document.getElementById('gc').innerHTML = `
    <div class="card-bar">
      <div>
        <div class="char-name">Alex Taylor</div>
        <div class="char-role">HR Manager</div>
      </div>
      <div class="bar-right">
        <div class="progress-track">
          ${keys.slice(0,-1).map((k, i) => `<div class="dot ${i < idx ? 'done' : (i === idx ? 'active' : '')}"></div>`).join('')}
        </div>
        <div class="score-chip">${s} pts</div>
      </div>
    </div>
    <div class="card-body">
      <div class="time-label">${step.time}</div>
      <h2 style="font-family:Lora,serif;font-size:22px;margin-bottom:1rem">${step.title}</h2>
      <div class="vocab-row">
        <span class="vocab-label">Key Terms:</span>
        ${step.vocab.map(v => `<span class="vpill">${v}</span>`).join('')}
      </div>
      <div class="scenario">${step.scene}</div>
      <div class="options" id="opts">
        ${shuffledOpts.map((o) => `
          <button class="opt" onclick='selectOpt(${JSON.stringify(o).replace(/'/g, "&apos;")}, this)'>
            <span class="opt-text">${o.t}</span>
            <span class="ptag pt${o.pts}">+${o.pts}</span>
          </button>
        `).join('')}
      </div>
      <div id="fb" class="fbox"></div>
      <div class="nxt-wrap">
        <button id="nxt" class="nxt" onclick="next()">Continue Task</button>
      </div>
    </div>`;
}

function selectOpt(o, btn) {
  // Use the passed choice object (o) to ensure points and feedback are correct
  s += o.pts;
  const fb = document.getElementById('fb');
  fb.innerHTML = o.fb;
  fb.className = `fbox show fb-${o.type}`;
  
  const all = document.querySelectorAll('.opt');
  all.forEach(b => {
    b.disabled = true;
    b.querySelector('.ptag').classList.add('vis');
  });
  
  btn.classList.add(`sel-${o.type}`);
  document.getElementById('nxt').classList.add('show');
}

function next() {
  cp = STEPS[cp].next;
  if (cp === "final") renderFinal();
  else renderStep();
}

function renderFinal() {
  const pct = (s / 21) * 100;
  let bLabel, bClass, grade, body, tips;

  if (s >= 18) {
    bLabel = "Strategic Leader"; bClass = "expert"; grade = "Exceptional HR Management";
    body = "You navigated the day with a perfect balance of legal compliance and human empathy. You've proven that you can handle high-pressure scenarios while keeping the company's best interests at heart.";
    tips = "Your understanding of professional nuance is excellent. To keep improving, focus on mentoring junior staff in these B2-level communication strategies.";
  } else if (s >= 13) {
    bLabel = "Competent Specialist"; bClass = "solid"; grade = "Solid Performance";
    body = "A very productive day. You made several strong decisions, particularly in conflict resolution. There were a few moments where a more data-driven approach might have saved time, but overall, the department is in good hands.";
    tips = "Review the 'recruitment crisis' and 'confidential leak' sections. In these areas, proactive investigation and internal networking are key to B2-level leadership.";
  } else if (s >= 8) {
    bLabel = "Developing Generalist"; bClass = "dev"; grade = "Room for Growth";
    body = "You managed to get through the day, but some of your decisions left the company exposed to risks. While you solved immediate problems, you often chose the path of least resistance rather than the most strategic one.";
    tips = "Focus on the vocabulary of conflict and discipline. In HR, being direct and evidence-based is more important than simply ending a dispute quickly.";
  } else {
    bLabel = "Junior Assistant"; bClass = "basic"; grade = "Basic Understanding";
    body = "This was a challenging day. Several of your choices could lead to legal issues or a drop in company morale. HR requires a careful balance of following rules while also being a strategic partner to the business.";
    tips = "Go back through the exercise and pay close attention to the 'Excellent' feedback. Look for patterns: successful HR managers usually prioritize evidence, employee feedback, and long-term retention.";
  }

  document.getElementById('gc').innerHTML = `
    <div class="final-screen">
      <div class="final-kicker">End of the day — NexCore Components Ltd.</div>
      <div class="score-block">
        <div class="score-num" id="snum">0</div>
        <div class="score-denom">out of 21</div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bfill"></div></div>
      <div class="final-band-row"><span class="band ${bClass}">${bLabel}</span></div>
      <div class="final-grade">${grade}</div>
      <div class="final-body">${body}</div>
      <div class="tips-box">
        <div class="tips-label">Study tips &amp; next steps</div>
        <div class="tips-text">${tips}</div>
      </div>
      <div class="vocab-section">
        <div class="vocab-sec-label">Vocabulary covered in this exercise</div>
        <div class="vocab-grid">${v.map(v=>`<span class="vpill">${v}</span>`).join('')}</div>
      </div>
      <button class="replay-btn" onclick="restartGame()">Play again — try a different path</button>
    </div>`;

  let cur = 0;
  const el = document.getElementById('snum'), step = Math.max(1, Math.ceil(s / 20));
  const t = setInterval(() => { 
    cur = Math.min(cur + step, s); 
    if (el) el.textContent = cur; 
    if (cur >= s) clearInterval(t); 
  }, 60);
  setTimeout(() => { 
    const b = document.getElementById('bfill'); 
    if (b) b.style.width = pct + '%'; 
  }, 200);
}

function restartGame() {
  s = 0;
  cp = "start";
  init();
}

init();
</script>
