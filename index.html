            margin: auto;
            background: white;
            padding: 20px;

        a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            text-decoration: none;
            background: #007acc;

            border-radius: 5px;
        }
        a:hover {
            background: #005f99;
