<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Village Stitch-Off</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Source+Sans+3:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --wool-purple: #6d4c7d;
            --soft-cream: #f9f7f2;
            --yarn-pink: #e9858b;
            --gold: #d4af37;
            --dark-yarn: #2c2c2c;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Source Sans 3', Arial, sans-serif;
            background-color: #d1ccc0;
            color: var(--dark-yarn);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 90%;
            max-width: 800px;
            background: var(--soft-cream);
            border: 8px double var(--wool-purple);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Cherry Bomb One', cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            text-align: center;
            color: var(--wool-purple);
            margin-top: 0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--wool-purple);
            color: white;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .question-box {
            background: #fff;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            border-left: 6px solid var(--yarn-pink);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        button {
            background: var(--wool-purple);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            font-size: 1rem;
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            background: var(--yarn-pink);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .feedback {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            background: #fdf2f2;
            border: 2px solid var(--gold);
            animation: fadeIn 0.4s;
        }

        .penalty { border-color: var(--danger); color: var(--danger); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #result-screen { display: none; text-align: center; }
        
        .score-formula {
            background: rgba(109, 76, 125, 0.1);
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 1.2rem;
        }

        .restart-btn {
            background: var(--yarn-pink);
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>THE GREAT VILLAGE STITCH-OFF</h1>
        <p style="text-align: center; font-size: 1.2rem;">Our town's knitting legacy is in your hands. You have a modest community budget and a hall full of expectations. Can you host the perfect International Knitting Festival?</p>
        <button style="width: 100%; font-size: 1.5rem; margin-top: 20px;" onclick="startGame()">OPEN THE WOOL BASKET</button>
    </div>

    <div id="game-play" style="display:none;">
        <div class="stats-bar">
            <span id="stat-path">Status: Novice Knitter</span>
            <span id="stat-score">Yarn Points: 0</span>
        </div>
        <div class="question-box" id="question"></div>
        <div class="options-grid" id="options"></div>
        
        <div class="feedback" id="feedback">
            <p id="feedback-text" style="line-height: 1.4;"></p>
            <button id="next-btn" style="width: 100%; background: var(--gold); color: black;" onclick="renderNode()">CONTINUE KNITTING</button>
        </div>
    </div>

    <div id="result-screen">
        <h1 id="res-title"></h1>
        <p id="res-desc" style="font-size: 1.2rem;"></p>
        <div class="score-formula" id="math-box"></div>
        <button class="restart-btn" onclick="location.reload()">START NEW PROJECT</button>
    </div>
</div>

<script>
const maze = {
    start: {
        q: "1. The Parish Council has approved the festival. What is the scope of our event?",
        options: [
            { t: "The County Heritage Stitch-Off", pts: 3, next: "venue", f: "A wonderful choice. It focuses on local patterns and brings in the neighbors.", path: "Heritage Guardian" },
            { t: "Youth 'Knit-a-Long' Weekend", pts: 3, next: "venue", f: "Brilliant! Teaching the next generation ensures our craft lives on.", path: "Pattern Mentor" },
            { t: "Global Celebrity Yarn Gala", pts: -1, next: "start", f: "UNSUSTAINABLE: The A-list designers want private jets and silk-lined rooms. Our community fund can't cover it! Try a local approach.", retry: true },
            { t: "Ultra-Fast Industrial Knitting Expo", pts: -1, next: "start", f: "REJECTED: The locals want handmade charm, not massive noisy machines. Stick to the craft!", retry: true }
        ]
    },
    venue: {
        q: "2. We need a place for the spinning wheels. Where shall we host it?",
        options: [
            { t: "The Village Memorial Hall", pts: 3, next: "access", f: "Perfect. It has character, a small kitchen for tea, and it's cheap to rent." },
            { t: "St. Jude’s Church Gardens", pts: 2, next: "access", f: "Beautiful, though we'll need to pray it doesn't rain on the alpaca wool!" },
            { t: "High-Tech City Convention Centre", pts: -1, next: "venue", f: "BUDGET CRISIS: The security deposit alone is more than our total savings. Let's find somewhere cozier.", retry: true },
            { t: "The Primary School Gym", pts: 3, next: "access", f: "Excellent. Plenty of light and the local kids can display their art too." }
        ]
    },
    access: {
        q: "3. How will we manage the entry for the workshops?",
        options: [
            { t: "Pensioners at the Door with Clipboards", pts: 3, next: "marketing", f: "Efficient and friendly. Everyone gets a warm welcome and a name tag." },
            { t: "Hand-Knitted Entry Wristbands", pts: 2, next: "marketing", f: "Very thematic! It took the committee weeks to knit them, but they look lovely." },
            { t: "Biometric Thumbprint Scanners", pts: -1, next: "access", f: "OVERKILL: The scanners cost a fortune and none of the grandmothers can get them to work with yarn-dusted hands!", retry: true },
            { t: "Pre-paid Paper Tickets", pts: 2, next: "marketing", f: "Sensible. The local library helped print them for a small fee." }
        ]
    },
    marketing: {
        q: "4. How are we spreading the word to other knitters?",
        options: [
            { t: "Flyers in the Local Wool Shop", pts: 3, next: "food", f: "Targeted marketing at its best. The shop owner even offered a discount to attendees!" },
            { t: "Town Facebook Group & Parish News", pts: 3, next: "food", f: "Word of mouth is spreading fast. We're expecting a full house!" },
            { t: "International Superbowl Ad", pts: -1, next: "marketing", f: "FINANCIAL RUIN: We spent the entire trophy budget on a 5-second slot that no one in the village saw.", retry: true },
            { t: "A Small Mention on Local Radio", pts: 2, next: "food", f: "Effective. A few people from the next county called to ask for directions." }
        ]
    },
    food: {
        q: "5. Knitters get hungry. What's for lunch?",
        options: [
            { t: "Homemade Scones and Tea", pts: 3, next: "light_crisis", f: "A triumph! The smell of baking is as good as the knitting itself." },
            { t: "Assorted Sandwiches from the Deli", pts: 2, next: "light_crisis", f: "Solid and reliable. It kept everyone's energy up for the afternoon purling." },
            { t: "Plain Wholemeal Buns & Tap Water", pts: -1, next: "food", f: "DISSATISFACTION: People are leaving early to find a biscuit. You can't knit on an empty stomach!", retry: true },
            { t: "Deconstructed Molecular Salad", pts: 1, next: "light_crisis", f: "Too fancy. Most of the knitters just wanted a pork pie and a sit-down." }
        ]
    },
    light_crisis: {
        q: "6. CRISIS: The old hall's windows are small and the clouds have rolled in. It’s too dark to see fine stitches!",
        options: [
            { t: "Bring in all the Floor Lamps from Home", pts: 3, next: "judging", f: "Cozy! The hall looks like a giant living room now. Everyone can see perfectly." },
            { t: "Pause for a 'Storytelling Hour' until it brightens", pts: 2, next: "judging", f: "A lovely break. The local librarian shared the history of Aran sweaters." },
            { t: "Pay the Janitor for Emergency Spotlights", pts: 1, next: "judging", f: "They're a bit harsh and make everyone sweat, but the knitting continues." },
            { t: "Knit in the dark (Memory only)", pts: -1, next: "light_crisis", f: "DISASTER: Everyone has dropped stitches and 'frogged' their work in frustration. Safety first!", retry: true }
        ]
    },
    judging: {
        q: "7. Who will judge the 'Best in Show' Blanket?",
        options: [
            { t: "The Head of the Women’s Institute", pts: 3, next: "end_legacy", f: "She has an eye for tension and a fair heart. No one disputes her word." },
            { t: "A Popular Vote by Attendees", pts: 2, next: "end_legacy", f: "Fair and democratic, though a few people clearly voted for their own cousins!" },
            { t: "AI-Powered Stitch Integrity Scanner", pts: -1, next: "judging", f: "TECHNICAL FAIL: The machine thinks a intentional 'lace hole' is a mistake. Technology just doesn't understand art!", retry: true },
            { t: "The Oldest Knitter in the County", pts: 3, next: "end_legacy", f: "At 98, she knows every trick in the book. A very respected choice." }
        ]
    },
    end_legacy: {
        q: "8. The event is over. What do we do with the surplus yarn and funds?",
        options: [
            { t: "Knit Hats for the Local Neonatal Unit", pts: 3, next: "end", f: "The most beautiful legacy possible. The community is so proud of you." },
            { t: "Fund a 'Yarn Bomb' for the High Street", pts: 2, next: "end", f: "The town is covered in colorful wool! It’s a tourist attraction already." },
            { t: "Buy yourself a Gold-Plated Needle Set", pts: -1, next: "end_legacy", f: "SCANDAL: The committee is furious that you used public funds for personal luxury. Return the needles!", retry: true },
            { t: "Save it for next year's Winter Fair", pts: 2, next: "end", f: "Sensible and organized. You've ensured the festival has a future." }
        ]
    }
};

let score = 0;
let currentNode = 'start';
let tournamentPath = "Novice";

/**
 * FISHER-YATES SHUFFLE
 * Ensures true mathematical randomness for option placement
 */
function shuffleOptions(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-play').style.display = 'block';
    renderNode();
}

function renderNode() {
    if (currentNode === 'end') {
        showResults();
        return;
    }

    const node = maze[currentNode];
    document.getElementById('question').textContent = node.q;
    document.getElementById('feedback').style.display = 'none';
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';

    // Create a shuffled copy of the options to maintain data integrity
    const shuffled = shuffleOptions([...node.options]);

    shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt.t;
        btn.onclick = (e) => handleChoice(opt, e);
        optionsDiv.appendChild(btn);
    });
}

function handleChoice(opt, event) {
    const buttons = document.querySelectorAll('.options-grid button');
    buttons.forEach(b => b.disabled = true);

    const feedbackDiv = document.getElementById('feedback');
    const feedbackText = document.getElementById('feedback-text');
    
    feedbackDiv.style.display = 'block';
    feedbackText.textContent = opt.f;

    if (opt.retry) {
        feedbackDiv.className = "feedback penalty";
        document.getElementById('next-btn').textContent = "UNRAVEL & TRY AGAIN";
        score += opt.pts; 
    } else {
        feedbackDiv.className = "feedback";
        score += opt.pts;
        if(opt.path) tournamentPath = opt.path;
        currentNode = opt.next;
        document.getElementById('next-btn').textContent = "NEXT ROW →";
    }
    
    document.getElementById('stat-score').textContent = `Yarn Points: ${score}`;
    document.getElementById('stat-path').textContent = `Status: ${tournamentPath}`;
}

function showResults() {
    document.getElementById('game-play').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    const resTitle = document.getElementById('res-title');
    const resDesc = document.getElementById('res-desc');
    const mathBox = document.getElementById('math-box');

    mathBox.innerHTML = `\\[ \\text{Final Yarn Rating} = \\sum_{i=1}^{8} p_i = ${score} \\]`;
    MathJax.typeset();

    if (score >= 20) {
        resTitle.textContent = "🥇 THE GOLDEN SKEIN";
        resDesc.textContent = "Masterful! You've organized a festival that will be spoken of in hushed, respectful tones at every knitting circle for years. Perfect tension, perfect community spirit.";
    } else if (score >= 12) {
        resTitle.textContent = "🥈 A STURDY SWEATER";
        resDesc.textContent = "Well done! The festival was a success. There were a few dropped stitches with the lighting and the sandwiches, but everyone went home happy with a full wool bag.";
    } else if (score >= 5) {
        resTitle.textContent = "🥉 THE MOTH-EATEN SCARF";
        resDesc.textContent = "It stayed together, but only just. The budget was tight and the atmosphere was a bit chilly. You might need to practice your planning before next year!";
    } else {
        resTitle.textContent = "❌ UNRAVELLED DISASTER";
        resDesc.textContent = "The festival fell apart completely. Between the high-tech failures and the lack of scones, the village has decided to stick to crochet next year.";
    }
}
</script>

</body>
</html>
