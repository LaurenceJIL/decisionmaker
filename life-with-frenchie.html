<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life with Marcel: The Frenchie Chronicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF8F3;--surface:#FFFFFF;--ink:#2D1810;--ink2:#6B4423;
  --accent:#D4A574;--danger:#C41E3A;--success:#8B6F47;--warn:#E8A87C;
  --r:16px;--shadow:0 10px 15px -3px rgba(0,0,0,0.1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:1rem;display:flex;flex-direction:column;align-items:center;min-height:100vh;margin:0;}
.shell{width:100%;max-width:650px;margin-top:2rem;margin-bottom:2rem;}
.hidden{display:none !important;}
.card{background:var(--surface);border-radius:var(--r);padding:2rem;box-shadow:var(--shadow);border:1px solid #E8DCC8;}
h1{font-size:28px;margin-bottom:0.5rem;text-align:center;font-weight:700;color:var(--ink);}
.day-label{display:block;text-align:center;color:var(--accent);font-weight:700;text-transform:uppercase;font-size:12px;margin-bottom:1.5rem;letter-spacing:1px;}
.ui-bar{display:flex;justify-content:space-between;margin-bottom:1rem;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink2);}
.options-list{display:grid;gap:12px;margin-top:1.5rem;}
.opt-btn{background:white;border:1px solid #D1C4B0;padding:14px;border-radius:10px;text-align:left;cursor:pointer;font-size:15px;transition:0.2s;color:var(--ink);width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:#FFF5ED;}
.opt-btn:disabled{opacity:0.6;cursor:default;}
.feedback{margin-top:1.5rem;padding:1.25rem;border-radius:10px;display:none;font-size:15px;border-left:5px solid transparent;}
.fb-1{background:#E8F5E9;color:#2E7D32;border-color:var(--success);}
.fb-0{background:#F5F5F5;color:var(--ink2);border-color:#D1C4B0;}
.fb-neg1{background:#FFF3E0;color:#E65100;border-color:var(--warn);}
.fb-fail{background:#FFEBEE;color:#B71C1C;border-color:var(--danger);animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.next-btn{margin-top:1.5rem;width:100%;background:var(--ink);color:white;border:none;padding:14px;border-radius:10px;font-weight:600;cursor:pointer;display:none;}
.emerg-tag{background:var(--danger);color:white;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:10px;}
.intro-text{color:var(--ink2);margin-bottom:1.5rem;font-size:16px;text-align:center;}
.score-tally{font-weight:bold;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<div class="shell" id="screen-intro">
  <div class="card">
    <h1>🐾 Life with Marcel 🐾</h1>
    <p class="intro-text">You are the proud owner of a French Bulldog, Marcel. Enjoy your week.</p>
    <button class="opt-btn" style="text-align:center; background:var(--accent); color:white; font-weight:700; border:none;" onclick="startGame()">Start the Week</button>
  </div>
</div>

<div class="shell hidden" id="screen-game">
  <div class="ui-bar">
    <div id="stat-progress">Scenario 1/20</div>
    <div id="stat-score">Sanity: 0 🐕</div>
  </div>
  <div class="card">
    <span class="day-label" id="ui-day-text">Day 1</span>
    <div id="ui-emerg-box"></div>
    <p id="ui-scenario-text" style="font-size:17px; font-weight:500;"></p>
    <div class="options-list" id="ui-options"></div>
    <div id="ui-feedback" class="feedback"></div>
    <button class="next-btn" id="ui-btn-next" onclick="handleNext()">Continue</button>
  </div>
</div>

<div class="shell hidden" id="screen-result">
  <div class="card" style="text-align:center;">
    <h1 id="res-title">Week's End Report</h1>
    <div id="res-score" style="font-size:48px; font-weight:700; color:var(--accent); margin:10px 0;"></div>
    <p id="res-msg" style="color:var(--ink2); margin-bottom:2rem; line-height:1.8; font-size:17px;"></p>
    <button class="opt-btn" style="text-align:center; background:var(--accent); color:white; font-weight:700; border:none;" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
const SCENARIOS = [
  // 1-4
  { t: "Marcel is swinging from the clothesline, his teeth firmly clamped onto your favorite silk shirt.", choices: [
    { text: "Distract him by opening a bag of treats in the kitchen, letting the shirt fall.", pts: 1, fb: "Bribery works. The shirt is ruined, but you avoided a tug-of-war you would lose." },
    { text: "Try to pull the shirt out of his mouth.", pts: 0, fb: "The shirt rips in half. Darling Wife says you shouldn't buy such 'flimsy fabric'." },
    { text: "Chase him around the yard while he drags the shirt through the mud.", pts: -1, fb: "He is faster than you. Darling Wife laughs at your 'cute game of tag'." },
    { text: "Peg the dog to the clothesline by his ears.", pts: -99, fb: "MONSTER: Darling Wife rescues her baby and you are permanently banned from doing laundry." }
  ]},
  { t: "The Frenchie has flattened your prize-winning petunias to create a personal, sun-warmed bed. He is snoring loudly.", choices: [
    { text: "Carefully plant new petunias around the sleeping dog, accepting this patch is now his domain.", pts: 1, fb: "Acceptance is key. The dog sleeps peacefully, and you manage to save three flowers." },
    { text: "Pick the dog up and move him to the grass.", pts: 0, fb: "He immediately runs back, flattens more flowers. Darling Wife says he 'prefers the aesthetics'." },
    { text: "Put a small fence around the flower bed.", pts: -1, fb: "The Frenchie bulldozes the fence in seconds. Darling Wife praises his 'incredible strength'." },
    { text: "Threaten to turn the dog into a pair of slippers.", pts: -99, fb: "EVICTION: Darling Wife heard you. Your bags are packed and waiting on the porch." }
  ]},
  { t: "You just finished building a beautiful brick barbecue. Marcel walks over, lifts his leg, and christens the fresh mortar.", choices: [
    { text: "Quietly wash the bricks with a sponge and pretend it never happened.", pts: 1, fb: "A wise choice. The barbecue is clean, and you avoid a lecture on 'natural canine instincts'." },
    { text: "Shout 'No!' and clap your hands loudly.", pts: 0, fb: "The dog barks back. Darling Wife yells from the window that you are 'ruining his self-esteem'." },
    { text: "Try to catch the urine in a bucket mid-stream.", pts: -1, fb: "You miss, get your shoes wet, and the dog looks at you with deep contempt." },
    { text: "Lock the dog inside the barbecue pit until the mortar dries.", pts: -99, fb: "ANIMAL CRUELTY: Darling Wife calls the police. You are now the one locked up." }
  ]},
  { t: "You wake up to find the newly laid irrigation system completely dug up. Marcel sits proudly next to a pile of chewed plastic pipes.", choices: [
    { text: "Calmly pick up the pipes, sigh deeply, and go to the hardware store for replacements.", pts: 1, fb: "The only safe option. You fix the pipes in silence while the dog watches, plotting its next move." },
    { text: "Yell at the dog and point at the destroyed pipes.", pts: 0, fb: "Darling Wife rushes out, hugging her 'little baby' and accusing you of traumatizing him." },
    { text: "Try to make the dog replant the pipes by pushing its paws into the dirt.", pts: -1, fb: "The dog thinks this is a game, bites your finger, and Darling Wife scolds you for playing too rough." },
    { text: "Spray the dog with the garden hose as punishment.", pts: -99, fb: "DIVORCE IMMINENT: Darling Wife sees you 'drowning her angel'. You are banished to the shed." }
  ]},
  // 5-8
  { t: "You discover a neat pile of three dead rats under your pillow. Marcel sits nearby, expecting praise.", choices: [
    { text: "Smile weakly, say 'Good boy,' and secretly dispose of the rats when he isn't looking.", pts: 1, fb: "You survived the horror. The dog feels appreciated, and your bed is mostly sanitary again." },
    { text: "Scream in terror and throw the pillow across the room.", pts: 0, fb: "Darling Wife rushes in, comforts the dog for being startled, and ignores the rats." },
    { text: "Try to explain to the dog that rats carry diseases.", pts: -1, fb: "He licks your face. Darling Wife says he is just 'providing for the family'." },
    { text: "Force the dog to eat the rats as a lesson.", pts: -99, fb: "VET EMERGENCY: The dog gets sick, the vet bill is $2000, and Darling Wife makes you pay it." }
  ]},
  { t: "Marcel is aggressively humping the head of your elderly, arthritic Golden Retriever.", choices: [
    { text: "Gently lure the Frenchie away with a squeaky toy, saving the Golden Retriever's dignity.", pts: 1, fb: "Crisis averted. The Golden Retriever gives you a look of profound gratitude." },
    { text: "Push the Frenchie off the Golden Retriever.", pts: 0, fb: "He immediately switches to humping your leg. Darling Wife calls it 'dominance play'." },
    { text: "Yell at the Golden Retriever to stand up for himself.", pts: -1, fb: "The Golden Retriever looks sad. Darling Wife scolds you for victim-blaming." },
    { text: "Spray them both with pepper spray to break it up.", pts: -99, fb: "BLINDNESS: Everyone is crying, including you. Darling Wife is calling a divorce lawyer." }
  ]},
  { t: "You come home to find the living room looks like it snowed. Marcel has exploded a feather cushion and is sleeping in the debris.", choices: [
    { text: "Silently get the vacuum cleaner and spend two hours cleaning up the feathers.", pts: 1, fb: "You accept your fate as the maid. The dog sleeps through the noise, dreaming of more cushions." },
    { text: "Wake the dog up and show him the destroyed cushion.", pts: 0, fb: "He yawns and goes back to sleep. Darling Wife says he was 'just nesting'." },
    { text: "Try to stuff the feathers back into the ruined casing.", pts: -1, fb: "It looks terrible. Darling Wife complains about your poor sewing skills." },
    { text: "Glue the feathers to the dog to make him look like a chicken.", pts: -99, fb: "HUMILIATION: Darling Wife is furious. You spend the night sleeping in the bathtub." }
  ]},
  { t: "You turn your back for one second, and Marcel swallows your entire steak whole off the dining table.", choices: [
    { text: "Sigh, make yourself a peanut butter sandwich, and watch him digest your expensive dinner.", pts: 1, fb: "A tragic but peaceful resolution. You are hungry, but the house is quiet." },
    { text: "Try to pry his mouth open to get the steak back.", pts: 0, fb: "It's gone. Darling Wife says you shouldn't have left it 'unattended'." },
    { text: "Demand the dog apologizes.", pts: -1, fb: "He burps loudly. Darling Wife thinks it's the cutest thing she's ever seen." },
    { text: "Hold the dog upside down and shake him until he coughs it up.", pts: -99, fb: "HEIMLICH HORROR: Darling Wife tackles you to the ground to save her 'choking baby'." }
  ]},
  // 9-12 (New Scenarios)
  { t: "Marcel has found your limited edition collector's trainers (worth $10K on eBay). He has chewed the tongues off and is currently shredding the soles.", choices: [
    { text: "Quietly place the remains in the bin and tell yourself they were just shoes.", pts: 1, fb: "The least worst outcome. You've lost $10K, but you've kept your peace. Marcel wags his tail at your 'gift'." },
    { text: "Try to glue the tongues back on.", pts: 0, fb: "The glue doesn't hold and the shoes look like Frankenstein's monster. Darling Wife says they look 'more unique' now." },
    { text: "Cry openly while holding the shredded leather.", pts: -1, fb: "Marcel thinks your tears are a game and tries to lick them off. Darling Wife tells you to 'stop being so materialistic'." },
    { text: "Try to sell the 'custom distressed' trainers on eBay anyway.", pts: -99, fb: "FRAUD: You get banned from eBay and Darling Wife is embarrassed by your 'lack of integrity'." }
  ]},
  { t: "The neighbor's cat has been 'harassed' by Marcel, resulting in a threatening 'cease and desist' letter from a lawyer.", choices: [
    { text: "Buy a giant hamper for the neighbor and promise to keep Marcel on a shorter lead.", pts: 1, fb: "Bribery works again. The neighbor drops the legal threat, though Marcel still glares at the cat." },
    { text: "Write a letter back explaining that Marcel was just 'playing'.", pts: 0, fb: "The neighbor sends a second, more aggressive letter. Darling Wife says you're 'escalating the situation'." },
    { text: "Try to train Marcel to love cats.", pts: -1, fb: "Marcel tries to hump the training manual. Darling Wife says his 'spirit cannot be tamed'." },
    { text: "Tell the neighbor to sue the dog directly.", pts: -99, fb: "LEGAL DISASTER: The neighbor actually does it. You are now in a high-profile 'Dog vs. Cat' court case." }
  ]},
  { t: "Marcel broke into the 'secure' storage area, consumed an entire 20kg bag of dry dog food, and is now experiencing 'explosive' digestive problems.", choices: [
    { text: "Don your hazmat suit and spend the night cleaning the laundry room in silence.", pts: 1, fb: "A grim but necessary task. Marcel looks 5kg heavier and very regretful, but the floor is eventually clean." },
    { text: "Try to put a diaper on him.", pts: 0, fb: "The diaper lasts three seconds before Marcel shreds it, spreading the 'problem' further. Darling Wife says he's 'expressing himself'." },
    { text: "Blame the smell on a gas leak.", pts: -1, fb: "The gas company arrives, finds nothing, and charges you a $200 call-out fee. The smell remains." },
    { text: "Make Marcel sleep in the neighbor's yard.", pts: -99, fb: "ANIMAL ABANDONMENT: The neighbor calls the RSPCA. Darling Wife is already filing for custody of the dog." }
  ]},
  { t: "You are having a very tense discussion with Darling Wife about Marcel's increasingly destructive behavior.", choices: [
    { text: "Nod, agree that he is a 'spirited angel', and suggest a very expensive dog whisperer.", pts: 1, fb: "The discussion ends peacefully. You've lost more money, but the marriage is safe for another day." },
    { text: "Present a PowerPoint presentation of all the things he has destroyed.", pts: 0, fb: "Darling Wife falls asleep during slide 4. Marcel chews the laptop charger. You've achieved nothing." },
    { text: "Suggest that maybe Marcel needs a 'trial separation' from the house.", pts: -1, fb: "Darling Wife suggests a trial separation from YOU. You quickly retract the statement." },
    { text: "Tell her it's 'the dog or me'.", pts: -99, fb: "ULTIMATUM FAIL: She chose the dog. Your bags are already on the sidewalk." }
  ]},
  // 13-16
  { t: "Marcel has dug a hole under the fence and is currently terrorizing the neighborhood mailman.", choices: [
    { text: "Run outside with a piece of cheese and trade it for the mailman's safety.", pts: 1, fb: "Cheese diplomacy works. The mailman lives to deliver another day." },
    { text: "Yell at the dog to come back immediately.", pts: 0, fb: "He ignores you completely. Darling Wife says he just 'wanted to say hello'." },
    { text: "Apologize to the mailman while the dog bites his ankles.", pts: -1, fb: "The mailman pepper-sprays you by mistake. The dog escapes unharmed." },
    { text: "Let the dog eat the mailman to teach the postal service a lesson.", pts: -99, fb: "FELONY: The FBI is involved. You are charged with using a biological weapon." }
  ]},
  { t: "Marcel returns from his escape covered in thick, black swamp mud and runs straight for the white carpets.", choices: [
    { text: "Dive tackle the dog in the hallway and carry him straight to the bathtub.", pts: 1, fb: "You ruin your own clothes, but the carpet is saved. A noble sacrifice." },
    { text: "Try to block his path with your body.", pts: 0, fb: "He dodges you with professional agility. The carpet is now 'abstract art'. Darling Wife loves the 'earthy tones'." },
    { text: "Try to vacuum the mud off him while he's running.", pts: -1, fb: "The vacuum explodes. Marcel is now muddy AND terrified of appliances." },
    { text: "Lock him outside in the freezing rain to wash off.", pts: -99, fb: "NEGLECT: Darling Wife wraps him in a heated blanket and locks YOU outside in the rain." }
  ]},
  { t: "At the vet, Marcel is screaming like a human child because another dog looked at him.", choices: [
    { text: "Feed him a continuous stream of treats until his mouth is too full to scream.", pts: 1, fb: "Expensive, but effective. The waiting room is finally quiet." },
    { text: "Try to shush him by putting your finger to your lips.", pts: 0, fb: "He screams louder. Darling Wife says he is 'expressing his trauma'." },
    { text: "Apologize loudly to everyone in the waiting room.", pts: -1, fb: "Nobody cares about your apology. They just want the noise to stop." },
    { text: "Put a muzzle on him made of duct tape.", pts: -99, fb: "ABUSE: The vet calls animal control. You are banned from the clinic forever." }
  ]},
  { t: "It is 3 AM. Marcel is running laps around the bedroom, bouncing off your face every time he passes the bed.", choices: [
    { text: "Pull the blanket over your head and wait for the storm to pass.", pts: 1, fb: "Survival mode activated. You get bruised, but you eventually fall back asleep." },
    { text: "Turn on the lights and try to catch him.", pts: 0, fb: "You trip over a shoe and break your toe. Darling Wife says you 'ruined his fun'." },
    { text: "Yell 'Go to sleep!' at the top of your lungs.", pts: -1, fb: "Darling Wife wakes up furious at YOU for shouting, while the dog continues running." },
    { text: "Throw the dog out the second-story window.", pts: -99, fb: "MURDER: You are going to prison for a very long time. Darling Wife testifies against you." }
  ]}
];

const EMERGENCIES = [
  { t: "EMERGENCY: Marcel has managed to open the pantry and eat an entire box of dark chocolate truffles!", choices: [
    { text: "Immediately rush him to the emergency vet for stomach pumping.", pts: 3, fb: "SAVED! The vet induces vomiting. The dog is fine, and Darling Wife calls you a hero." },
    { text: "Wait to see if he gets sick first.", pts: -100, fb: "TRAGEDY: Dark chocolate is highly toxic. The dog dies, and Darling Wife destroys your life." },
    { text: "Give him some milk to neutralize the chocolate.", pts: -100, fb: "FATAL ERROR: Milk doesn't cure poisoning. The dog goes into cardiac arrest." },
    { text: "Blame the other dogs for eating the chocolate.", pts: -100, fb: "COWARD: Marcel collapses while you are lying. Darling Wife never forgives you." }
  ]},
  { t: "EMERGENCY: Marcel swallowed a squeaker from a toy and is now choking and turning blue!", choices: [
    { text: "Perform the canine Heimlich maneuver immediately.", pts: 3, fb: "HEROIC! The squeaker flies out. The dog breathes again, and Darling Wife weeps with gratitude." },
    { text: "Try to pull it out with your bare fingers.", pts: -100, fb: "FATAL MISTAKE: You push the squeaker further down. The dog suffocates." },
    { text: "Call the vet and ask for advice over the phone.", pts: -100, fb: "TOO LATE: By the time the vet answers, the dog has stopped breathing." },
    { text: "Run away and pretend you didn't see anything.", pts: -100, fb: "MONSTER: Darling Wife finds the dog. She knows you were there. Your life is over." }
  ]},
  { t: "EMERGENCY: Marcel has dug 30cm into the ground to find a 'dead' barbecue ember, flicked it into dry leaves, and now the garden is smouldering at 2 AM!", choices: [
    { text: "Grab the garden hose and douse the entire area while calling the fire brigade.", pts: 3, fb: "CRISIS AVERTED! You saved the house. Darling Wife is impressed by your 'vigilance', even if Marcel is annoyed his 'fire' is out." },
    { text: "Try to stomp the fire out with your bare feet.", pts: -100, fb: "HOSPITALIZED: You have 3rd-degree burns and the house still catches fire. Marcel watches from the safety of the car." },
    { text: "Go back to sleep, thinking it's just the neighbor's fireplace.", pts: -100, fb: "DISASTER: The eucalyptus trees explode in flames. You lose everything. Marcel is the only one the firemen rescue." },
    { text: "Throw a bucket of sand on it and hope for the best.", pts: -100, fb: "INSUFFICIENT: The embers continue to smoulder underground. The house burns down by dawn." }
  ]},
  { t: "EMERGENCY: Marcel has cornered a large, angry brown snake in the garden and is preparing to 'play' with it!", choices: [
    { text: "Throw a heavy blanket over the snake and grab Marcel by the scruff.", pts: 3, fb: "CLOSE CALL! You managed to separate them. The snake slithers away and Marcel is safe. Darling Wife calls you her 'brave protector'." },
    { text: "Try to grab the snake's tail to pull it away.", pts: -100, fb: "BITE: The snake bites you. Then it bites Marcel. It's a double funeral. Darling Wife is the only survivor." },
    { text: "Cheer Marcel on, thinking he's a great hunter.", pts: -100, fb: "FATAL: Marcel gets bitten. He doesn't make it to the vet. Darling Wife's scream will haunt you forever." },
    { text: "Run inside to get a camera to film the 'cute' interaction.", pts: -100, fb: "NEGLIGENCE: By the time you return, Marcel is already foaming at the mouth. It's over." }
  ]}
];

let state = {
  score: 0,
  idx: 0,
  activeSet: [],
  gameOver: false
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  state.score = 0;
  state.idx = 0;
  state.gameOver = false;
  
  // Build the game sequence: 4 scenarios, 1 emergency, repeat 4 times
  state.activeSet = [];
  for (let i = 0; i < 4; i++) {
    // Add 4 scenarios
    for (let j = 0; j < 4; j++) {
      state.activeSet.push({...SCENARIOS[i * 4 + j], isEmerg: false});
    }
    // Add 1 emergency
    state.activeSet.push({...EMERGENCIES[i], isEmerg: true});
  }

  document.getElementById('screen-intro').classList.add('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  render();
}

function resetGame() {
  startGame();
}

function render() {
  const current = state.activeSet[state.idx];
  document.getElementById('stat-progress').innerText = `Progress: ${state.idx + 1}/20`;
  document.getElementById('stat-score').innerText = `Sanity: ${state.score} 🐕`;
  document.getElementById('ui-scenario-text').innerText = current.t;
  
  const dayNum = Math.floor(state.idx / 5) + 1;
  document.getElementById('ui-day-text').innerText = `Day ${dayNum}`;
  
  const emerg = document.getElementById('ui-emerg-box');
  emerg.innerHTML = current.isEmerg ? `<span class="emerg-tag">🚨 CRITICAL INCIDENT 🚨</span>` : "";

  const box = document.getElementById('ui-options');
  box.innerHTML = "";
  
  const opts = shuffle([...current.choices]);
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = "opt-btn";
    b.innerText = o.text;
    b.onclick = () => handleChoice(o);
    box.appendChild(b);
  });

  document.getElementById('ui-feedback').style.display = 'none';
  document.getElementById('ui-btn-next').style.display = 'none';
}

function handleChoice(o) {
  const fb = document.getElementById('ui-feedback');
  fb.innerText = o.fb;
  fb.style.display = 'block';

  if (o.pts === -100) {
    // Emergency Failure - Game Over
    fb.className = "feedback fb-fail";
    state.gameOver = true;
    document.getElementById('ui-btn-next').innerText = "View Final Report";
  } else if (o.pts === -99) {
    // Instant Fail Scenario - Don't advance, let them pick again
    fb.className = "feedback fb-fail";
    fb.innerText += " (Marcel wins again. Try a different approach to survive!)";
    return; 
  } else {
    state.score += o.pts;
    fb.className = `feedback fb-${o.pts === 1 ? '1' : (o.pts === 3 ? '1' : (o.pts === 0 ? '0' : 'neg1'))}`;
    document.getElementById('ui-btn-next').innerText = "Continue";
  }

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById('ui-btn-next').style.display = 'block';
}

function handleNext() {
  if (state.gameOver) {
    showResults(true);
    return;
  }
  
  state.idx++;
  if (state.idx < state.activeSet.length) {
    render();
  } else {
    showResults(false);
  }
}

function showResults(isFail) {
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  
  const title = document.getElementById('res-title');
  const msg = document.getElementById('res-msg');
  const score = document.getElementById('res-score');
  score.innerText = state.score;

  if (isFail) {
    title.innerText = "GAME OVER";
    msg.innerText = "Marcel's chaos finally caught up with you. One wrong move in a crisis and it's all over. Darling Wife has taken the dog and left. You are alone with your thoughts and a very quiet, very empty house.";
  } else {
    title.innerText = "Week's End Report";
    if (state.score >= 25) {
      msg.innerText = "🏆 SAINT OF MARCEL: You are a legend. You survived the trainers, the fire, the food explosion, and the 'tense discussion'. You have the patience of a monk and the reflexes of a ninja. Marcel respects you (slightly).";
    } else if (state.score >= 15) {
      msg.innerText = "🐕 BATTLE-HARDENED SURVIVOR: You made it! You're broke, tired, and your house smells like dog food, but you're still standing. You've accepted that Marcel is the true head of the household.";
    } else if (state.score >= 5) {
      msg.innerText = "😰 BARELY HANGING ON: You survived, but your marriage is on thin ice and your bank account is empty. Marcel is currently plotting his next move. Good luck next week.";
    } else {
      msg.innerText = "💔 TOTAL DEFEAT: You technically finished the week, but at what cost? You've lost your dignity, your shoes, and your sanity. Marcel is currently sleeping on your pillow.";
    }
  }
}
