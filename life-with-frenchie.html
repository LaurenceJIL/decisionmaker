<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life with Marcel, French Bulldog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF8F3;--surface:#FFFFFF;--ink:#2D1810;--ink2:#6B4423;
  --accent:#D4A574;--danger:#C41E3A;--success:#8B6F47;--warn:#E8A87C;
  --r:16px;--shadow:0 10px 15px -3px rgba(0,0,0,0.1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:1rem;display:flex;flex-direction:column;align-items:center;}
.shell{width:100%;max-width:650px;margin-top:2rem;}
.hidden{display:none !important;}
.card{background:var(--surface);border-radius:var(--r);padding:2rem;box-shadow:var(--shadow);border:1px solid #E8DCC8;}
h1{font-size:26px;margin-bottom:0.5rem;text-align:center;font-weight:700;color:var(--ink);}
.day-label{display:block;text-align:center;color:var(--accent);font-weight:700;text-transform:uppercase;font-size:12px;margin-bottom:1.5rem;letter-spacing:1px;}
.ui-bar{display:flex;justify-content:space-between;margin-bottom:1rem;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink2);}
.options-list{display:grid;gap:12px;margin-top:1.5rem;}
.opt-btn{background:white;border:1px solid #D1C4B0;padding:14px;border-radius:10px;text-align:left;cursor:pointer;font-size:15px;transition:0.2s;color:var(--ink);}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:#FFF5ED;}
.opt-btn:disabled{opacity:0.6;cursor:default;}
.feedback{margin-top:1.5rem;padding:1.25rem;border-radius:10px;display:none;font-size:15px;border-left:5px solid transparent;}
.fb-1{background:#E8F5E9;color:#2E7D32;border-color:var(--success);}
.fb-0{background:#F5F5F5;color:var(--ink2);border-color:#D1C4B0;}
.fb-neg{background:#FFEBEE;color:#B71C1C;border-color:var(--danger);animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.next-btn{margin-top:1.5rem;width:100%;background:var(--ink);color:white;border:none;padding:14px;border-radius:10px;font-weight:600;cursor:pointer;display:none;}
.emerg-tag{background:var(--danger);color:white;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:10px;}
.intro-text{color:var(--ink2);margin-bottom:1.5rem;font-size:15px;}
</style>
</head>
<body>

<div class="shell" id="screen-intro">
  <div class="card">
    <h1>🐾 Life with French Bulldog 🐾</h1>
    <p class="intro-text">Welcome to the world of Marcel. Can you survive the week?</p>
    <button class="opt-btn" style="width:100%; text-align:center; background:var(--accent); color:white; font-weight:700;" onclick="startGame()">Welcome Home (Help me...)</button>
  </div>
</div>

<div class="shell hidden" id="screen-game">
  <div class="ui-bar">
    <div id="stat-progress">Scenario 1/23</div>
    <div id="stat-score">Sanity: 0 🐕</div>
  </div>
  <div class="card">
    <span class="day-label" id="ui-day-text">Day 1</span>
    <div id="ui-emerg-box"></div>
    <p id="ui-scenario-text" style="font-size:17px;"></p>
    <div class="options-list" id="ui-options"></div>
    <div id="ui-feedback" class="feedback"></div>
    <button class="next-btn" id="ui-btn-next" onclick="handleNext()">Take a Deep Breath & Continue</button>
  </div>
</div>

<div class="shell hidden" id="screen-result">
  <div class="card" style="text-align:center;">
    <h1>Week's End Report</h1>
    <div id="res-score" style="font-size:48px; font-weight:700; color:var(--accent); margin:10px 0;"></div>
    <p id="res-msg" style="color:var(--ink2); margin-bottom:2rem; line-height:1.8;"></p>
    <button class="opt-btn" style="width:100%; text-align:center;" onclick="location.reload()">Live Another Week</button>
  </div>
</div>

<script>

      { text: "Scream in terror and throw the pillow across the room.", pts: -100, fb: "Darling Wife rushes in, comforts the dog for being startled, and ignores the rats." },

  [

      { text: "Yell at him for being greedy and try to make him throw up.", pts: -100, fb: "He just looks confused and then farts loudly. Darling Wife says you 'traumatized him'." },

      { text: "Blame Darling Wife for leaving the bag accessible.", pts: -100, fb: "DIVORCE IMMINENT: She reminds you it's 'your dog' and 'your garage'." }
    ]}
  ],
  // Slot 17: Post-Biscuit Diarrhea
  [

  ]},
  { t: "EMERGENCY: Marcel has gotten into the medicine cabinet and swallowed an entire bottle of your blood pressure medication!", isEmerg: true, choices: [
    { text: "Immediately call the vet and poison control with the medication details.", pts: 3, fb: "QUICK THINKING! The vet induces vomiting, and Marcel recovers. Darling Wife praises your composure." },
    { text: "Wait and see if he shows symptoms.", pts: -50, fb: "CRITICAL OVERDOSE: Marcel collapses. Emergency surgery costs $8,000, and he barely survives." },
    { text: "Give him activated charcoal from the kitchen.", pts: -50, fb: "WRONG DOSAGE: You make it worse. The vet says you should have called immediately." },
    { text: "Hide the empty bottle so Darling Wife doesn't find out.", pts: -50, fb: "COVERUP DISASTER: Marcel gets sicker, and when you finally confess, Darling Wife is furious." }
  ]}

let state = { score: 0, idx: 0, activeSet: [] };

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  state.score = 0;
  state.idx = 0;
  // Map scenarios (Scenario 1 & 2 are at Pool indices 4 & 5, which are positions 5 & 6)[cite: 1]
  state.activeSet = POOL.map(slot => slot[0]);   // Inject Emergencies at Pos 7, Pos 14, and Pos 23
  state.activeSet.splice(6, 0, EMERGENCIES[0]);
  state.activeSet.splice(13, 0, EMERGENCIES[1]);
  state.activeSet.splice(22, 0, EMERGENCIES[2]);

  document.getElementById('screen-intro').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  render();
}

function render() {
  const current = state.activeSet[state.idx];
  document.getElementById('stat-progress').innerText = `Scenario ${state.idx + 1}/23`;
  document.getElementById('stat-score').innerText = `Sanity: ${state.score} 🐕`;
  document.getElementById('ui-scenario-text').innerText = current.t;
  
  const dayNum = Math.floor(state.idx / 2) + 1;
  document.getElementById('ui-day-text').innerText = `Day ${dayNum}`;
  
  const emerg = document.getElementById('ui-emerg-box');
  emerg.innerHTML = current.isEmerg ? `<span class="emerg-tag">🚨 CRITICAL INCIDENT 🚨</span>` : "";

  const box = document.getElementById('ui-options');
  box.innerHTML = "";
  
  const opts = shuffle([...current.choices]);
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = "opt-btn";
    b.innerText = o.text;
    b.onclick = () => handleChoice(o);
    box.appendChild(b);
  });

  document.getElementById('ui-feedback').style.display = 'none';
  document.getElementById('ui-btn-next').style.display = 'none';
}

function handleChoice(o) {
  const fb = document.getElementById('ui-feedback');
  fb.innerText = o.fb;
  fb.style.display = 'block';

  if (o.pts <= -50) {
    fb.className = "feedback fb-neg";
    state.score += o.pts;
    document.getElementById('ui-btn-next').innerText = "View Final Report";
    state.idx = 99; 
  } else {
    state.score += o.pts;
    fb.className = `feedback fb-${o.pts === 1 || o.pts === 3 ? '1' : 'neg'}`;
  }

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById('ui-btn-next').style.display = 'block';
}

function handleNext() {
  if (state.idx === 99) {
    showResults();
    return;
  }
  state.idx++;
  if (state.idx < state.activeSet.length) {
    render();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  
  const msg = document.getElementById('res-msg');
  const score = document.getElementById('res-score');
  score.innerText = state.score;

  if (state.score >= 15) {
    msg.innerText = "🏆 SAINT OF PATIENCE: You survived with your sanity intact! Darling Wife of the house is genuinely impressed. Marcel has finally met his match.";
  } else if (state.score >= 5) {
    msg.innerText = "😰 BARELY BREATHING: You survived, but your pride is shattered. Darling Wife still loves her 'baby' more than you, and she's right.";
  } else if (state.score >= -50) {
    msg.innerText = "😱 HANGING BY A THREAD: One more incident and you're done. Darling Wife is considering couples therapy with Marcel.";
  } else {
    msg.innerText = "💔 TOTAL BREAKDOWN: The dog won. Your belongings are in the driveway. Time to move away. Marcel sends you a sympathy card.";
  }
}
</script>
