<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Calling: A Weekend Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --london-red: #d11243;
        --tube-blue: #0019a8;
        --river-grey: #f4f4f4;
        --success: #27ae60;
        --warning: #f39c12;
        --text: #333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Open Sans', sans-serif;
        background-color: var(--river-grey);
        color: var(--text);
        line-height: 1.6;
    }

    header {
        background: var(--tube-blue);
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 5px solid var(--london-red);
        position: sticky; top: 0; z-index: 1000;
    }

    .score-box {
        background: white;
        color: var(--tube-blue);
        padding: 0.5rem 1rem;
        border-radius: 5px;
        font-weight: 700;
    }

    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

    .card {
        background: white;
        padding: 2.5rem;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        display: none;
    }
    .card.active { display: block; animation: fadeIn 0.4s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    h1 { font-family: 'Montserrat', sans-serif; margin-bottom: 1rem; color: var(--tube-blue); }
    h2 { font-family: 'Montserrat', sans-serif; margin-bottom: 1rem; font-size: 1.2rem; }
    p { margin-bottom: 1.5rem; font-size: 1.1rem; }

    .choices-grid { display: grid; gap: 10px; margin: 1.5rem 0; }
    .choice-btn {
        background: #fff;
        border: 2px solid #ddd;
        padding: 1rem;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        text-align: left;
        transition: 0.2s;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--london-red); background: #fff5f7; }
    .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .feedback {
        margin-top: 1.5rem;
        padding: 1.5rem;
        border-radius: 8px;
        display: none;
        border-left: 8px solid;
    }
    .fb-excellent { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; }
    .fb-good { background: #fff3e0; border-color: #ef6c00; color: #e65100; }
    .fb-poor { background: #ffebee; border-color: #c62828; color: #b71c1c; }

    .badge { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 0.5rem; }

    .next-btn {
        margin-top: 1.5rem;
        background: var(--london-red);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 700;
        width: 100%;
        display: none;
    }

    .emergency {
        background: var(--london-red);
        color: white;
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 0.8rem;
        font-weight: bold;
        margin-bottom: 1rem;
        display: inline-block;
    }
</style>
</head>
<body>

<header>
    <h1>London Calling</h1>
    <div class="score-box">Points: <span id="score">0</span></div>
</header>

<div class="container">
    <div class="card active" id="screen-start">
        <h1>A Weekend in London</h1>
        <p>Welcome to the capital of the UK! You have 48 hours to explore, eat, and travel like a local.</p>
        <p>Your goal is to reach <strong>30 points</strong>. Be careful: if you choose a "poor" option (-1), you must choose again!</p>
        <button class="next-btn" style="display:block;" onclick="startGame()">Start My Journey</button>
    </div>

    <div class="card" id="screen-game">
        <div id="status-area"></div>
        <h2 id="step-title"></h2>
        <p id="step-desc"></p>
        <div class="choices-grid" id="choices-container"></div>
        
        <div class="feedback" id="feedback-box">
            <span class="badge" id="points-text"></span>
            <div id="feedback-content"></div>
        </div>
        
        <button class="next-btn" id="btn-next">Continue Voyage</button>
    </div>

    <div class="card" id="screen-final">
        <h1>Trip Finished!</h1>
        <div id="final-stats" style="font-size: 1.5rem; margin: 2rem 0; text-align: center;"></div>
        <div id="band-result" style="padding: 2rem; border-radius: 10px; text-align: center;"></div>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
const steps = {
    d1: {
        title: "Decision 1: Getting Around",
        desc: "You just arrived at Heathrow Airport. You need to get into the city center. What is your plan?",
        choices: [
            { text: "Take the 'Elizabeth Line' and pay with your contactless card.", pts: 3, type: "excellent", fb: "Perfect! It's fast, modern, and easy to pay. You look like a local." },
            { text: "Buy a paper single ticket from the machine for £15.", pts: 2, type: "good", fb: "It works, but it's more expensive than using a card or Oyster." },
            { text: "Walk out and try to find a black cab (taxi) to take you all the way.", pts: 1, type: "good", fb: "Very comfortable, but it will cost you a fortune in London traffic!" },
            { text: "Try to walk to the city center with your suitcases.", pts: -1, type: "poor", fb: "London is huge! It's over 20 miles. You will be exhausted. Choose again." }
        ],
        next: "d2"
    },
    d2: {
        title: "Decision 2: The English Weather",
        desc: "You look at the sky. It is grey and starting to drizzle (light rain). Your plan was to walk in the park.",
        choices: [
            { text: "Buy a cheap 'brolly' (umbrella) and continue your walk. English rain is normal!", pts: 3, type: "excellent", fb: "That's the spirit! You've officially adapted to the British climate." },
            { text: "Go to a museum instead to stay dry until the sun comes back.", pts: 2, type: "good", fb: "A smart choice. London museums are world-class and mostly free." },
            { text: "Go to a hotel and take a nap until it stops raining.", pts: 1, type: "good", fb: "A bit of a waste of time, but you'll be well-rested!" },
            { text: "Stand under a tree and wait for the sun. It will be out in 5 minutes.", pts: -1, type: "poor", fb: "In London, it might rain for three days straight. Don't waste your day! Choose again." }
        ],
        next: "d3"
    },
    d3: {
        title: "Decision 3: The Afternoon Choice",
        desc: "You have a free afternoon. Do you want 'Old History' or 'Modern Vibes'?",
        choices: [
            { text: "Old History: Head to the Tower of London to see the crown jewels.", pts: 3, type: "excellent", path: "pathHistory", fb: "Great! You are heading into the heart of British history." },
            { text: "Modern Vibes: Go to Camden Market for street food and shopping.", pts: 3, type: "excellent", path: "pathModern", fb: "Cool! You'll see the alternative and creative side of London." },
            { text: "I can't decide, I'll just sit in a cafe for four hours.", pts: 1, type: "good", next: "e1", fb: "Relaxing, but you're missing the sights! (Merging paths)." },
            { text: "Go to a big shopping mall that looks like the ones in my country.", pts: -1, type: "poor", fb: "You came to London for something different! Try a local spot. Choose again." }
        ]
    },
    pathHistory: {
        title: "Decision 4: The Beefeater Tour",
        desc: "At the Tower of London, a 'Beefeater' (guard) is giving a talk. He is very funny but speaks quickly.",
        choices: [
            { text: "Listen carefully and ask a polite question at the end.", pts: 3, type: "excellent", fb: "Well done! Engaging with locals is the best way to practice English." },
            { text: "Just take a selfie with him and walk away while he's talking.", pts: 1, type: "poor", fb: "A bit rude! He's a historian, not just a statue. Try to listen." },
            { text: "Smile and nod even if you don't understand every word.", pts: 2, type: "good", fb: "A classic strategy for language learners. You got the general idea!" }
        ],
        next: "e1"
    },
    pathModern: {
        title: "Decision 4: Street Food Savvy",
        desc: "In Camden, there are 50 different food stalls. You are hungry but have a budget.",
        choices: [
            { text: "Try a 'Pie and Mash' stall for a traditional London taste.", pts: 3, type: "excellent", fb: "Excellent! Authentic, filling, and very 'East End'." },
            { text: "Buy a burger from a global fast-food chain.", pts: 1, type: "good", fb: "Safe, but you can get that anywhere. You're in Camden!" },
            { text: "Ask a local vendor what their favorite dish is.", pts: 2, type: "good", fb: "Good communication! You'll probably get the best food this way." }
        ],
        next: "e1"
    },
    e1: {
        title: "EMERGENCY: Lost on the Underground",
        isEmergency: true,
        desc: "Your phone battery died! You are at a busy station and don't know which train to take.",
        choices: [
            { text: "Find a staff member in a uniform and say: 'Excuse me, could you help me?'", pts: 0, type: "excellent", next: "d5", fb: "Good Choice! Polite and direct. They will help you." },
            { text: "Look at the big 'Spider Map' on the wall and find your current color.", pts: 0, type: "excellent", next: "d5", fb: "Good Choice! London's maps are very well-designed for visitors." },
            { text: "Follow a random group of people and hope they are going to the center.", pts: 0, type: "poor", gameOver: true, fb: "GAME OVER. You ended up in a suburb at the end of the line. Your night is over." }
        ]
    },
    d5: {
        title: "Decision 5: Tea Etiquette",
        desc: "You go for Afternoon Tea. You have a scone, jam, and cream. How do you eat it?",
        choices: [
            { text: "Break the scone with your hands, then add cream and jam.", pts: 3, type: "excellent", fb: "Spot on! You eat like a true Brit. Very sophisticated." },
            { text: "Cut it with a knife like a sandwich and eat it whole.", pts: 2, type: "good", fb: "Acceptable, but a bit messy. The 'break' method is the local way." },
            { text: "Ask for a side of ketchup to put on your scone.", pts: -1, type: "poor", fb: "That's a crime in England! Jam and cream only. Choose again." }
        ],
        next: "d6"
    },
    d6: {
        title: "Decision 6: Theatre Night",
        desc: "You want to see a musical in the West End tonight, but tickets are £100.",
        choices: [
            { text: "Go to the 'TKTS' booth in Leicester Square for half-price tickets.", pts: 3, type: "excellent", fb: "Savvy traveler! You saved money and get to see a great show." },
            { text: "Buy a 'standing ticket' for £10 to save money.", pts: 2, type: "good", fb: "Good for the budget, but your legs will be very tired after 3 hours!" },
            { text: "Pay the full £100 because 'you only live once'.", pts: 1, type: "good", fb: "Expensive, but at least you have a great seat." },
            { text: "Buy a ticket from a guy on the street corner with no shop.", pts: -1, type: "poor", fb: "Total scam! That ticket is likely fake. Choose again." }
        ],
        next: "d7"
    },
    d7: {
        title: "Decision 7: The Pub Social",
        desc: "You are in a crowded pub. You want to order a drink, but it's busy at the bar.",
        choices: [
            { text: "Wait your turn and catch the bartender's eye with a small nod.", pts: 3, type: "excellent", fb: "The 'unwritten rule' of the British pub! No queuing, but everyone knows who is next." },
            { text: "Shout 'OI! SERVICE PLEASE!' and wave your money.", pts: 1, type: "poor", fb: "Very rude. The bartender will probably make you wait longer now." },
            { text: "Try to find a table and wait for someone to come take your order.", pts: 2, type: "good", fb: "In most pubs, you have to go to the bar. You'll be waiting a long time!" }
        ],
        next: "e2"
    },
    e2: {
        title: "EMERGENCY: Tube Strike!",
        isEmergency: true,
        desc: "There is a 'Tube Strike'. No underground trains are running today.",
        choices: [
            { text: "Check the 'Citymapper' app and take a red double-decker bus instead.", pts: 0, type: "excellent", next: "d8", fb: "Good Choice! Buses are cheaper and you see the city from the window." },
            { text: "Rent a 'Santander Cycle' (Boris Bike) and ride through the parks.", pts: 0, type: "excellent", next: "d8", fb: "Good Choice! Active and fun, just watch out for the traffic." },
            { text: "Sit on the pavement and cry.", pts: 0, type: "poor", gameOver: true, fb: "GAME OVER. You missed your whole day because you didn't look for an alternative." }
        ]
    },
    d8: {
        title: "Decision 8: Sunday Roast",
        desc: "It's Sunday. You want to eat the most traditional British meal. What is it?",
        choices: [
            { text: "The Sunday Roast: Meat, potatoes, vegetables, and Yorkshire pudding.", pts: 3, type: "excellent", fb: "Perfect choice. It's the highlight of the British week." },
            { text: "Fish and Chips with mushy peas.", pts: 2, type: "good", fb: "A great British classic, though it's popular every day, not just Sunday." },
            { text: "A cold ham sandwich and a bag of crisps.", pts: 1, type: "good", fb: "Functional, but where is the magic? Go for the Roast!" },
            { text: "Tacos.", pts: -1, type: "poor", fb: "Tacos are great, but not a traditional British Sunday meal! Choose again." }
        ],
        next: "d9"
    },
    d9: {
        title: "Decision 9: The Souvenir",
        desc: "You want to bring something home. What do you buy?",
        choices: [
            { text: "A box of high-quality English Breakfast tea from a local shop.", pts: 3, type: "excellent", fb: "A classic and useful gift. Everyone loves tea!" },
            { text: "A plastic Union Jack hat that says 'I Love London'.", pts: 1, type: "good", fb: "A bit 'touristy', but it's a fun memory." },
            { text: "A postcard and some beautiful stamps from the Post Office.", pts: 2, type: "good", fb: "Very sweet and traditional. People love getting mail." },
            { text: "A bag of dirt from Hyde Park.", pts: -1, type: "poor", fb: "That's illegal and very strange. Choose again." }
        ],
        next: "d10"
    },
    d10: {
        title: "Decision 10: Heading Home",
        desc: "Your flight is at 5 PM. How do you handle your final hours?",
        choices: [
            { text: "Arrive at the airport 3 hours early to enjoy the duty-free shops.", pts: 3, type: "excellent", fb: "Smart. London airports are busy; you removed all the stress." },
            { text: "Leave the city center exactly 1 hour before the flight.", pts: -1, type: "poor", fb: "Impossible! You will miss your flight. Traffic and security take time. Choose again." },
            { text: "Check your flight status on your phone before leaving the hotel.", pts: 2, type: "good", fb: "Very wise. Delays happen often!" }
        ],
        next: "final"
    }
};

const bands = [
    { min: -10, max: 15, title: "The Confused Tourist 🎒", color: "#e67e22", text: "You survived! But you spent a lot of money and got a bit lost. Next time, try to 'act local' more." },
    { min: 16, max: 26, title: "The Savvy Traveler 🚇", color: "#2980b9", text: "Well done! You managed the tube, the weather, and the tea like a pro." },
    { min: 27, max: 30, title: "The London Local 👑", color: "#27ae60", text: "Fantastic! You are basically British now. You know all the secrets of the city." }
];

let score = 0;
let currentStepId = "d1";

/**
 * FISHER-YATES SHUFFLE ALGORITHM
 * Ensures true mathematical randomness for choice placement.
 */
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    score = 0;
    currentStepId = "d1";
    updateScore();
    showScreen("game");
    renderStep();
}

function updateScore() { document.getElementById('score').innerText = score; }

function showScreen(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

function renderStep() {
    const data = steps[currentStepId];
    const container = document.getElementById('choices-container');
    const status = document.getElementById('status-area');
    document.getElementById('step-title').innerText = data.title;
    document.getElementById('step-desc').innerText = data.desc;
    status.innerHTML = data.isEmergency ? `<div class="emergency">🚨 EMERGENCY</div>` : "";
    container.innerHTML = "";
    document.getElementById('feedback-box').style.display = "none";
    document.getElementById('btn-next').style.display = "none";

    // Update: Shuffle choices to prevent pattern recognition
    const shuffledChoices = shuffleArray([...data.choices]);

    shuffledChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = "choice-btn";
        btn.innerText = choice.text;
        btn.onclick = () => handleChoice(choice, btn);
        container.appendChild(btn);
    });
}

function handleChoice(choice, btn) {
    const ptText = document.getElementById('points-text');
    const data = steps[currentStepId];

    if (data.isEmergency) {
        ptText.innerText = choice.type === "poor" ? "FAILED" : "GOOD CHOICE";
    } else {
        ptText.innerText = choice.pts >= 0 ? `+${choice.pts} Points` : `${choice.pts} Point`;
    }

    document.getElementById('feedback-content').innerText = choice.fb;
    document.getElementById('feedback-box').className = "feedback fb-" + choice.type;
    document.getElementById('feedback-box').style.display = "block";

    if (choice.gameOver) {
        setTimeout(() => { alert("TRIP ENDED: " + choice.fb); location.reload(); }, 3000);
        return;
    }

    score += choice.pts;
    updateScore();

    if (choice.pts === -1) {
        btn.disabled = true;
        btn.style.opacity = "0.3";
        return;
    }

    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    btn.style.borderColor = "var(--london-red)";
    const nextBtn = document.getElementById('btn-next');
    nextBtn.style.display = "block";
    nextBtn.onclick = () => {
        currentStepId = choice.path || choice.next || steps[currentStepId].next;
        if (currentStepId === "final") showFinal(); else renderStep();
    };
}

function showFinal() {
    showScreen("final");
    document.getElementById('final-stats').innerHTML = `Final Score: ${score} / 30`;
    const band = bands.find(b => score >= b.min && score <= b.max) || bands[0];
    const bc = document.getElementById('band-result');
    bc.style.backgroundColor = band.color + "20";
    bc.style.border = "2px solid " + band.color;
    bc.innerHTML = `<h2 style="color:${band.color}">${band.title}</h2><p>${band.text}</p>`;
}
</script>
</body>
</html>
