<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Expedition: The Ultimate Urban Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ny-yellow: #fbc02d;
    --ny-blue: #0d47a1;
    --ny-grey: #37474f;
    --danger: #c0392b;
    --success: #27ae60;
    --text: #2c3e50;
    --bg: #f0f2f5;
  }

  body { font-family: 'Lato', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
  .header { background: var(--ny-grey); color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; border-bottom: 5px solid var(--ny-yellow); }
  
  .stats-bar { display: flex; justify-content: space-around; background: #fff; width: 100%; padding: 10px 0; border-bottom: 2px solid #ddd; font-weight: bold; position: sticky; top: 70px; z-index: 9; }
  .stat-item { display: flex; align-items: center; gap: 5px; }

  .progress-bar { width: 100%; height: 8px; background: #ddd; position: sticky; top: 110px; z-index: 9; }
  .progress-fill { height: 100%; background: var(--ny-yellow); width: 0%; transition: 0.5s; }

  .game-container { max-width: 850px; width: 95%; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 450px; }
  .choice-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

  .choice-btn { 
    padding: 18px; border: 2px solid #eee; border-radius: 8px; background: white; 
    cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s;
    display: flex; justify-content: space-between; align-items: center; line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--ny-yellow); background: #fffde7; transform: translateX(5px); }
  .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; grayscale: 1; }
  
  .price-tag { padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; margin-left: 10px; min-width: 60px; text-align: center; }
  .cost-tag { background: #eee; color: #333; }
  .gain-tag { background: var(--success); color: white; }

  .feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; border-left: 5px solid var(--ny-yellow); font-size: 1.05rem; animation: fadeIn 0.4s; }
  .feedback.error { border-left-color: var(--danger); background-color: #fdf2f2; }
  .feedback.bonus { border-left-color: var(--success); background-color: #f2fdf5; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .btn-next { display: none; margin-top: 20px; padding: 15px 30px; background: var(--ny-grey); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }

  #landingPage { position: fixed; inset: 0; z-index: 100; background: var(--ny-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; color: white; text-align: center; }
  .landing-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--ny-yellow); margin-bottom: 10px; }
  .landing-btn { padding: 17px 48px; background: var(--ny-yellow); color: #000; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-size: 1.1rem; }
</style>
</head>

    <p>Success requires street smarts and a steady budget. Can you become an Urban Legend?</p>
    <button class="landing-btn" onclick="startGame()">Start Your Journey →</button>
</div>

</div>

</div>

      { text: "Send postcards from a local stationery shop.", cost: 10, pts: 12, fb: "<b>Thoughtful.</b> You write to your friends about your adventures. It’s a classy way to end a legendary trip." }
    ]
  }
];

function startGame() {
  document.getElementById("landingPage").style.display = "none";
  loadStep();
}

function loadStep() {
  const step = gameData[currentIdx];
  document.getElementById("stepTitle").innerText = step.title;
  document.getElementById("stepDesc").innerHTML = step.desc;
  
  const list = document.getElementById("choiceList");
  list.innerHTML = "";
  
  step.choices.forEach((c) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const canAfford = budget >= c.cost;
    const isSpecial = (c.type === "expulsion" || c.type === "neutral" || c.type === "money");

    if (!canAfford && !isSpecial && c.type !== "poor") btn.disabled = true;

    let priceDisplay = "";
    if (c.cost > 0) priceDisplay = `<span class="price-tag cost-tag">$${c.cost}</span>`;
    else if (c.cost === 0 && !isSpecial) priceDisplay = `<span class="price-tag cost-tag">FREE</span>`;

    btn.innerHTML = `<span>${c.text} ${(!canAfford && !isSpecial) ? '<br><small style="color:red"><b>(Insufficient Funds)</b></small>' : ''}</span>${priceDisplay}`;
    btn.onclick = () => selectChoice(c);
    list.appendChild(btn);
  });

  document.getElementById("feedbackBox").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}

function selectChoice(choice) {
  const fb = document.getElementById("feedbackBox");
  
  if (choice.type === "expulsion") {
    fb.innerHTML = choice.fb;
    fb.className = "feedback error";
    fb.style.display = "block";
    endGame("⚖️ DEPORTED & BANNED", "Your journey ended in a legal nightmare. The city chewed you up and spat you out.");
    return;
  }

  if (choice.type === "poor") {
    budget -= choice.cost;
    document.getElementById("budgetDisplay").innerText = "$" + budget;
    fb.innerHTML = choice.fb;
    fb.className = "feedback error";
    fb.style.display = "block";
    if (budget < 0) endGame("💸 BANKRUPT", "You've been scammed out of your last dollar. You're currently busking for subway fare.");
    return;
  }

  budget -= choice.cost;
  score += choice.pts;
  document.getElementById("scoreDisplay").innerText = score;
  document.getElementById("budgetDisplay").innerText = "$" + budget;
  
  fb.innerHTML = choice.fb;
  fb.className = choice.type === "money" ? "feedback bonus" : "feedback";
  fb.style.display = "block";
  
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("progressFill").style.width = ((currentIdx + 1) / gameData.length) * 100 + "%";
}

function nextStep() {
  currentIdx++;
  if (currentIdx < gameData.length) loadStep();
  else renderFinalScreen();
}

function endGame(title, msg) {
    document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
    document.getElementById("nextBtn").innerText = "Restart Expedition ↩";
    document.getElementById("nextBtn").onclick = () => location.reload();
    document.getElementById("nextBtn").style.display = "block";
    document.getElementById("stepTitle").innerText = title;
    document.getElementById("stepDesc").innerText = msg;
}

function renderFinalScreen() {
  let title = score >= 280 ? "🥇 Ultimate Urban Legend" : score >= 180 ? "🥈 Savvy New Yorker" : "🥉 Exhausted Tourist";
  let message = score >= 280 ? "You navigated New York like a pro! You balanced budget, culture, and street smarts perfectly." : "Well done! You balanced cost and culture and made it home in one piece.";
  document.getElementById("gameWindow").innerHTML = `<h2>${title}</h2><p>${message}</p><hr><p>Total Satisfaction: <b>${score} Points</b></p><p>Cash Remaining: <b>$${budget}</b></p><button class="btn-next" style="display:block" onclick="location.reload()">Begin a New Journey</button>`;
}
</script>
</body>
</html>
