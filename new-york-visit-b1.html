<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Expedition: The Ultimate Urban Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ny-yellow: #fbc02d;
    --ny-blue: #0d47a1;
    --ny-grey: #37474f;
    --danger: #c0392b;
    --success: #27ae60;
    --text: #2c3e50;
    --bg: #f0f2f5;
  }

  body { font-family: 'Lato', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
  .header { background: var(--ny-grey); color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; border-bottom: 5px solid var(--ny-yellow); }
  
  .stats-bar { display: flex; justify-content: space-around; background: #fff; width: 100%; padding: 10px 0; border-bottom: 2px solid #ddd; font-weight: bold; position: sticky; top: 70px; z-index: 9; }
  .stat-item { display: flex; align-items: center; gap: 5px; }

  .progress-bar { width: 100%; height: 8px; background: #ddd; position: sticky; top: 110px; z-index: 9; }
  .progress-fill { height: 100%; background: var(--ny-yellow); width: 0%; transition: 0.5s; }

  .game-container { max-width: 850px; width: 95%; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 450px; }
  .choice-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

  .choice-btn { 
    padding: 18px; border: 2px solid #eee; border-radius: 8px; background: white; 
    cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s;
    display: flex; justify-content: space-between; align-items: center; line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--ny-yellow); background: #fffde7; transform: translateX(5px); }
  .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; grayscale: 1; }
  
  .price-tag { padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; margin-left: 10px; min-width: 60px; text-align: center; }
  .cost-tag { background: #eee; color: #333; }
  .gain-tag { background: var(--success); color: white; }

  .feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; border-left: 5px solid var(--ny-yellow); font-size: 1.05rem; animation: fadeIn 0.4s; }
  .feedback.error { border-left-color: var(--danger); background-color: #fdf2f2; }
  .feedback.bonus { border-left-color: var(--success); background-color: #f2fdf5; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .btn-next { display: none; margin-top: 20px; padding: 15px 30px; background: var(--ny-grey); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }

  .vocab-section { margin-top: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; text-align: left; border-top: 4px solid var(--ny-yellow); }
  .vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
  .vocab-item { font-size: 0.9rem; line-height: 1.4; }

  #landingPage { position: fixed; inset: 0; z-index: 100; background: var(--ny-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; color: white; text-align: center; }
  .landing-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--ny-yellow); margin-bottom: 10px; }
  .landing-btn { padding: 17px 48px; background: var(--ny-yellow); color: #000; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-size: 1.1rem; }
</style>
</head>
<body>

<div id="landingPage">
    <h1 class="landing-title">NYC Expedition</h1>
    <p>Welcome to the cultural capital of the world. You have <strong>$100</strong> and 16 decisions to make.</p>
    <p>Manage your funds, seek thrills, and <b>avoid legal trouble</b> at all costs.</p>
    <button class="landing-btn" onclick="startGame()">Start Your Journey →</button>
</div>

<div class="header"><h1>🗽 New York City: The Grand Tour</h1></div>

<div class="stats-bar">
  <div class="stat-item">⭐ Satisfaction: <span id="scoreDisplay">0</span></div>
  <div class="stat-item">💰 Budget: <span id="budgetDisplay">$100</span></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="game-container" id="gameWindow">
  <h2 id="stepTitle"></h2>
  <p id="stepDesc"></p>
  <div class="choice-list" id="choiceList"></div>
  <div class="feedback" id="feedbackBox"></div>
  <button class="btn-next" id="nextBtn" onclick="nextStep()">Proceed →</button>
</div>

<script>
let currentIdx = 0;
let score = 0;
let budget = 100;

const gameData = [
  {
    title: "Phase 1: Arrival at JFK",
    desc: "You've just landed. The air is crisp and the city beckons. How will you reach Manhattan?",
    choices: [
      { text: "Take the AirTrain and Subway. It's the authentic 'local' experience.", cost: 11, pts: 10, fb: "<b>Smart and economical!</b> You avoid the legendary Van Wyck Expressway traffic. You arrive at Penn Station feeling like a true New Yorker." },
      { text: "Book a private rideshare for maximum comfort and door-to-door service.", cost: 75, pts: 15, fb: "<b>Luxurious but pricey.</b> You enjoy the skyline view from the backseat, but your budget takes a massive hit before you've even had breakfast." },
      { text: "Walk from JFK to Manhattan to save money.", cost: 0, pts: 0, type: "poor", fb: "<b>Physically impossible!</b> That is over 15 miles through heavy industrial zones. You waste hours and start the day exhausted. Try again!" }
    ]
  },
  {
    title: "Phase 2: The Breakfast Dilemma",
    desc: "You're in Midtown and the smell of roasting coffee is everywhere. What's your morning fuel?",
    choices: [
      { text: "A 'Bacon, Egg, and Cheese' (BEC) from a corner bodega.", cost: 6, pts: 12, fb: "<b>Classic!</b> The vendor wraps it in silver foil and hands it to you with a 'regular' coffee. It's the most efficient way to start your day." },
      { text: "Sit-down brunch at a trendy 'Instagrammable' cafe in Chelsea.", cost: 35, pts: 18, fb: "<b>Delicious but slow.</b> The avocado toast is a work of art, but you spend 90 minutes waiting for a table. At least the photos look great!" },
      { text: "Skip breakfast to save money for later.", cost: 0, pts: -5, fb: "<b>Poor planning!</b> By 11:00 AM, your energy levels have plummeted. You feel irritable while looking at the sights." }
    ]
  },
  {
    title: "Phase 3: Morning Landmark",
    desc: "The sun is hitting the skyscrapers. Which icon do you visit first?",
    choices: [
      { text: "The High Line: A stroll through an elevated park built on old rail tracks.", cost: 0, pts: 15, fb: "<b>Serene!</b> You walk amongst wildflowers and modern architecture while floating above the city streets. An incredible free experience." },
      { text: "Summit One Vanderbilt: An immersive, glass-floor observation deck.", cost: 48, pts: 25, fb: "<b>Breathtaking!</b> You stand on a transparent floor 1,000 feet above the street. It's expensive, but the sense of scale is unparalleled." },
      { text: "Follow a 'free' tour guide who approached you in Times Square.", cost: 20, pts: 5, fb: "<b>Tourist trap!</b> The guide takes you to overpriced souvenir shops where they get a commission. You feel more like a customer than a traveler." }
    ]
  },
  {
    title: "Phase 4: Cultural Immersion",
    desc: "It's time for some world-class art. Where are you heading?",
    choices: [
      { text: "The MET: Explore 5,000 years of history in a massive labyrinth.", cost: 30, pts: 20, fb: "<b>Magnificent!</b> From Egyptian temples to European masters, you are overwhelmed by the sheer volume of beauty. You could spend a week here." },
      { text: "MoMA: Contemplate modern masterpieces like 'The Starry Night'.", cost: 25, pts: 18, fb: "<b>Sophisticated!</b> The sleek galleries provide a calm space to admire Warhol and Picasso. You leave feeling intellectually stimulated." },
      { text: "Draw graffiti on a historical monument to show your 'artistic side'.", cost: 0, pts: 0, type: "poor", fb: "<b>Vandalism!</b> That is a quick way to get a heavy fine or a night in a cell. Respect the city! Choose a legal activity." }
    ]
  },
  {
    title: "Phase 5: The Lunch Rush",
    desc: "The midtown sidewalks are packed. You need a quick, delicious bite.",
    choices: [
      { text: "A $1.86 (+tax) 'Dollar Slice' from a hole-in-the-wall pizzeria.", cost: 2, pts: 10, fb: "<b>Legendary value!</b> It’s hot, greasy, and perfect. You eat it while walking, successfully mimicking the fast-paced New York lifestyle." },
      { text: "A pastrami sandwich from a famous street cart.", cost: 10, pts: 15, fb: "<b>Flavor explosion!</b> The rye bread, mustard and pickles combo is addictive. You find a nearby bench and enjoy a hearty meal that keeps you full for hours." },
      { text: "Attempt to catch a fish in the Hudson River for a free meal.", cost: 0, pts: 0, type: "poor", fb: "<b>Unsanitary and illegal!</b> The river quality isn't suitable for fishing your lunch, and you lack a permit. Don't be absurd!" }
    ]
  },
  {
    title: "🚨 EMERGENCY: The Found Designer Wallet",
    desc: "While walking through SoHo, you spot a luxury designer wallet on the ground. It contains $100 in cash but also a business card with a phone number.",
    choices: [
      { text: "Call the number on the card and return the wallet to its owner.", cost: 0, pts: 25, type: "neutral", fb: "<b>Integrity pays off!</b> The owner is a grateful local executive who is deeply moved by your honesty. You've made a positive impact and gained a great story." },
      { text: "Leave the wallet where it is. It's not your business.", cost: 0, pts: 5, type: "neutral", fb: "<b>Neutral Ground.</b> You avoid potential trouble, but you also miss an opportunity to help. You continue your walk undisturbed." },
      { text: "Take the cash and attempt to sell the designer wallet to a street vendor.", cost: 0, pts: 0, type: "expulsion", fb: "<b>ARRESTED!</b> The street vendor was actually an undercover officer targeting 'fencing' operations. You are charged with grand larceny, your visa is revoked, and you are deported immediately. GAME OVER." }
    ]
  },
  {
    title: "Phase 7: Afternoon Shopping",
    desc: "You find yourself in the shopping mecca of the world. How do you handle your wallet?",
    choices: [
      { text: "Go 'Thrifting' in the East Village for unique vintage finds.", cost: 15, pts: 12, fb: "<b>Stylish!</b> You find a unique 90s leather jacket for a fraction of its original price. You look like a local now." },
      { text: "Window shop on 5th Avenue and just enjoy the atmosphere.", cost: 0, pts: 10, fb: "<b>Disciplined!</b> You admire the opulent displays at Tiffany's and Saks without spending a cent. You've saved your budget for the evening." },
      { text: "Max out your credit card on a designer bag you can't afford.", cost: 90, pts: 5, fb: "<b>Financial ruin!</b> You now own a beautiful bag, but you literally cannot afford dinner or a ride back to your hotel." }
    ]
  },
  {
    title: "Phase 8: Central Park Relaxation",
    desc: "The urban noise is getting loud. You need a green escape.",
    choices: [
      { text: "Rent a rowing boat on the Central Park Lake.", cost: 25, pts: 20, fb: "<b>Cinematic!</b> You paddle under Bow Bridge while the skyscrapers peek over the trees. It’s like being in a movie." },
      { text: "Find a quiet spot on Sheep Meadow and people-watch.", cost: 0, pts: 15, fb: "<b>Peaceful.</b> You lay on the grass and watch hundreds of New Yorkers play frisbee and tan. It's the lungs of the city." },
      { text: "Try to climb the statues in the park for a better view.", cost: 0, pts: 0, type: "poor", fb: "<b>Disrespectful!</b> Park security quickly asks you to descend. You're lucky you didn't get a summons (a ticket)." }
    ]
  },
  {
    title: "Phase 9: The Coffee Break",
    desc: "The 3:00 PM slump hits. You need a caffeine boost.",
    choices: [
      { text: "Visit a 'Speakeasy' style coffee shop hidden in a basement.", cost: 8, pts: 12, fb: "<b>Exclusive vibes!</b> The barista takes coffee very seriously. You enjoy a pour-over that tastes like blueberries and chocolate." },
      { text: "Grab a quick burnt coffee from a street-side donut cart.", cost: 2, pts: 5, fb: "<b>Utilitarian.</b> It's hot and bitter, but it gets the job done. You're back on your feet in five minutes." },
      { text: "Enter a high-end hotel lobby and pretend you're a guest to get free coffee.", cost: 0, pts: 0, type: "poor", fb: "<b>Awkward!</b> Security notices your confused look and asks for your room number. You are escorted out feeling embarrassed." }
    ]
  },
  {
    title: "Phase 10: Crossing the Bridge",
    desc: "You want to see the skyline from a different perspective. Brooklyn is calling.",
    choices: [
      { text: "Walk across the Brooklyn Bridge at sunset.", cost: 0, pts: 25, fb: "<b>Iconic!</b> The wooden planks, the steel cables, and the orange glow of the sun hitting the One World Trade Center... it's a core memory." },
      { text: "Take the NYC Ferry across the East River.", cost: 4, pts: 18, fb: "<b>Refreshing!</b> For the price of a subway ride, you get a boat tour with incredible views of the DUMBO waterfront." },
      { text: "Pay a 'toll' to a stranger who says they own the bridge.", cost: 15, pts: -10, fb: "<b>Sucker!</b> The Brooklyn Bridge is public property. You just gave $15 to a con artist. Welcome to New York, tourist!" }
    ]
  },
  {
    title: "Phase 11: Neighborhood Exploration",
    desc: "Each neighborhood has a soul. Where do you get lost?",
    choices: [
      { text: "Chinatown & Little Italy: A feast for the senses.", cost: 12, pts: 15, fb: "<b>Vibrant!</b> You buy some exotic dragon fruit and a cannoli. The overlapping cultures are fascinating to witness." },
      { text: "Greenwich Village: The heart of the 60s counter-culture.", cost: 5, pts: 12, fb: "<b>Charming.</b> You walk past the 'Friends' apartment and narrow cobblestone streets. It feels much more intimate than Midtown." },
      { text: "Walk into a random residential building to 'see how they live'.", cost: 0, pts: 0, type: "poor", fb: "<b>Trespassing!</b> Residents don't appreciate strangers in their hallways. You are quickly told to leave by a grumpy super." }
    ]
  },
  {
    title: "Phase 12: Dinner Decisions",
    desc: "The city lights are twinkling. Hunger returns. What’s the plan?",
    choices: [
      { text: "A classic New York Steakhouse dinner.", cost: 85, pts: 25, fb: "<b>Indulgent!</b> The service is impeccable and the steak is perfectly seared. It's a huge expense, but a true NYC bucket-list item." },
      { text: "Authentic Ramen in a cozy East Village shop.", cost: 22, pts: 15, fb: "<b>Soul-warming.</b> The rich broth and handmade noodles are the perfect antidote to a long day of walking." },
      { text: "Eat a 'hot dog' from a vendor who doesn't have a visible price list.", cost: 15, pts: 5, fb: "<b>Overcharged!</b> He saw you coming and charged you $15 for a $3 dog. Always check the prices first!" }
    ]
  },
  {
    title: "Phase 13: Evening Entertainment",
    desc: "New York never sleeps, and neither do you. What's the show?",
    choices: [
      { text: "Last-minute Broadway tickets from the TKTS booth.", cost: 70, pts: 30, fb: "<b>Spectacular!</b> You score a discounted seat for a major musical. The talent on stage leaves you speechless." },
      { text: "A late-night set at a historic Jazz Club in the Village.", cost: 35, pts: 22, fb: "<b>Cool and moody.</b> You sip a drink while world-class musicians improvise in a dimly lit basement. Pure atmosphere." },
      { text: "Try to sneak into a private rooftop party by following a group.", cost: 0, pts: 0, type: "poor", fb: "<b>Rejected!</b> The bouncer sees right through you. You spend 20 minutes being ignored in a line. Choose a real activity!" }
    ]
  },
  {
    title: "🚨 EMERGENCY: The Shady 'Tour' Offer",
    desc: "A man in a dark alley near Times Square offers to show you a 'secret underground gambling den' where you can double your money instantly, no risk.",
    choices: [
      { text: "Politely decline and walk quickly toward a well-lit area.", cost: 0, pts: 10, type: "neutral", fb: "<b>Street Smart!</b> You recognized a dangerous situation and removed yourself from it. You continue your night safely." },
      { text: "Tell a nearby police officer about the suspicious activity.", cost: 0, pts: 15, type: "neutral", fb: "<b>Civic Duty!</b> The officer thanks you for the tip. Your report helps the precinct keep the neighborhood safe for other travelers." },
      { text: "Agree to go with him. You want to see the 'real' New York.", cost: 0, pts: 0, type: "expulsion", fb: "<b>CRITICAL FAILURE.</b> It was a setup. You are caught in a massive police raid. Because you were participating in illegal gambling, your passport is seized. You are deported and banned from the USA for 10 years. GAME OVER." }
    ]
  },
  {
    title: "Phase 15: The Late Night Vibe",
    desc: "It's 11:30 PM. The neon is glowing. One last thing?",
    choices: [
      { text: "Times Square: Embrace the 'Center of the Universe'.", cost: 0, pts: 15, fb: "<b>Dazzling!</b> It's crowded and touristy, but the sheer amount of light and energy is something everyone should see once." },
      { text: "A late-night comedy set at the Comedy Cellar.", cost: 25, pts: 20, fb: "<b>Hilarious!</b> A famous comedian makes a surprise appearance. Your stomach hurts from laughing so hard." },
      { text: "Take a nap on a subway station floor while waiting for the train.", cost: 0, pts: 0, type: "poor", fb: "<b>Dangerous!</b> This is not a safe place to sleep. You're a target for theft and it's quite unhygienic. Stay awake!" }
    ]
  },
  {
    title: "Phase 16: The Final Farewell",
    desc: "Your 24 hours are up. How do you feel about your expedition?",
    choices: [
      { text: "Take a quiet walk to the waterfront to reflect.", cost: 0, pts: 10, fb: "<b>Poetic.</b> You look at the skyline one last time, realizing that this city is a beast you managed to tame—at least for a day." },
      { text: "Buy a final 'I Love NY' shirt and head to the airport.", cost: 15, pts: 8, fb: "<b>Classic.</b> It's a cliché, but now you actually mean it. You've earned the right to wear the shirt." },
      { text: "Try to hide in the park so you never have to leave.", cost: 0, pts: 0, type: "poor", fb: "<b>Illegal!</b> Overstaying your visit isn't the romantic gesture you think it is. Go home and plan your next trip!" }
    ]
  }
];

const vocabulary = [
  { word: "Opulent", def: "Ostentatiously costly and luxurious; wealthy." },
  { word: "Antidote", def: "Something that counteracts an unpleasant feeling or situation." },
  { word: "Speakeasy", def: "Historically an illegal bar; now refers to hidden, retro-style lounges." },
  { word: "Larceny", def: "Theft of personal property (a serious legal term)." },
  { word: "Unparalleled", def: "Having no equal; exceptional." },
  { word: "Summons", def: "An official order to appear in a court of law." }
];

function startGame() {
  document.getElementById("landingPage").style.display = "none";
  loadStep();
}

function loadStep() {
  const step = gameData[currentIdx];
  document.getElementById("stepTitle").innerText = step.title;
  document.getElementById("stepDesc").innerHTML = step.desc;
  
  const list = document.getElementById("choiceList");
  list.innerHTML = "";
  
  step.choices.forEach((c) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    
    const canAfford = budget >= c.cost;
    const isSpecial = (c.type === "expulsion" || c.type === "neutral");

    if (!canAfford && !isSpecial && c.type !== "poor") {
        btn.disabled = true;
    }

    let priceDisplay = "";
    if (c.cost > 0) {
        priceDisplay = `<span class="price-tag cost-tag">$${c.cost}</span>`;
    } else if (c.cost === 0 && !isSpecial) {
        priceDisplay = `<span class="price-tag cost-tag">FREE</span>`;
    }

    btn.innerHTML = `<span>${c.text} ${(!canAfford && !isSpecial && c.type !== "poor") ? '<br><small style="color:red"><b>(Insufficient Funds)</b></small>' : ''}</span>
      ${priceDisplay}`;
    
    btn.onclick = () => selectChoice(c);
    list.appendChild(btn);
  });

  document.getElementById("feedbackBox").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}

function selectChoice(choice) {
  const fb = document.getElementById("feedbackBox");
  
  if (choice.type === "expulsion") {
    fb.innerHTML = choice.fb;
    fb.className = "feedback error";
    fb.style.display = "block";
    endGame("⚖️ DEPORTED & BANNED", "Your journey ended in a legal nightmare. You have been expelled from the country immediately.");
    return;
  }

  if (choice.type === "poor") {
    fb.innerHTML = choice.fb;
    fb.className = "feedback error";
    fb.style.display = "block";
    return;
  }

  budget -= choice.cost;
  score += choice.pts;
  
  document.getElementById("scoreDisplay").innerText = score;
  document.getElementById("budgetDisplay").innerText = "$" + budget;
  
  fb.innerHTML = choice.fb;
  fb.className = "feedback";
  fb.style.display = "block";
  
  const btns = document.querySelectorAll(".choice-btn");
  btns.forEach(b => b.disabled = true);

  document.getElementById("nextBtn").style.display = "block";
  
  const progress = ((currentIdx + 1) / gameData.length) * 100;
  document.getElementById("progressFill").style.width = progress + "%";
}

function nextStep() {
  currentIdx++;
  if (currentIdx < gameData.length) {
    loadStep();
  } else {
    renderFinalScreen();
  }
}

function endGame(title, msg) {
    const btns = document.querySelectorAll(".choice-btn");
    btns.forEach(b => b.disabled = true);
    document.getElementById("nextBtn").innerText = "Restart Expedition ↩";
    document.getElementById("nextBtn").onclick = () => location.reload();
    document.getElementById("nextBtn").style.display = "block";
    
    document.getElementById("stepTitle").innerText = title;
    document.getElementById("stepDesc").innerText = msg;
}

function renderFinalScreen() {
  let title, message;
  
  if (score >= 250) {
    title = "🥇 Ultimate Urban Legend";
    message = "Incredible! You navigated New York like a seasoned pro, seeing all the sights while keeping your dignity and wallet intact.";
  } else if (score >= 150) {
    title = "🥈 Savvy New Yorker";
    message = "Well done! You balanced cost and culture perfectly. You've experienced the true essence of the city.";
  } else {
    title = "🥉 Exhausted Tourist";
    message = "You survived the city! It was a hectic 24 hours, but you've learned valuable lessons for your next visit.";
  }

  let vocabHTML = `<div class="vocab-section"><h3>Glossary of Sophisticated Terms:</h3><div class="vocab-grid">`;
  vocabulary.forEach(v => { vocabHTML += `<div class="vocab-item"><b>${v.word}:</b> ${v.def}</div>`; });
  vocabHTML += `</div></div>`;

  document.getElementById("gameWindow").innerHTML = `
    <h2 style="color:var(--ny-blue)">${title}</h2>
    <p>${message}</p>
    <hr>
    <div style="font-size: 1.2rem; margin: 20px 0;">
      <p>Total Satisfaction: <b>${score} Points</b></p>
      <p>Cash Remaining: <b>$${budget}</b></p>
    </div>
    ${vocabHTML}
    <button class="btn-next" style="display:block" onclick="location.reload()">Begin a New Journey</button>
  `;
}
</script>
</body>
</html>
