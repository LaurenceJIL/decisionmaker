<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Put Your Town on the Map! — B1 English Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1018;--bg2:#161a28;--bg3:#1e2438;
  --gold:#e8b84b;--gold2:#f5d07a;--gold3:#fbecc0;
  --teal:#2ec4b6;--teal2:#6ee0d8;
  --coral:#e05c3a;--coral2:#f09070;
  --green:#3cb371;--green2:#90ee90;
  --red:#cc3333;--red2:#ffaaaa;
  --white:#ffffff;--txt:#d1d5db;
  --font-serif:'Playfair Display',serif;--font-sans:'Source Sans 3',sans-serif;
  --r:12px;--shadow:0 10px 30px rgba(0,0,0,0.5);
}
body{background:var(--bg);color:var(--txt);font-family:var(--font-sans);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow-x:hidden}

.card{background:var(--bg2);width:100%;max-width:800px;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,0.05);display:none;animation:fadeIn 0.4s ease forwards}
.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

header{background:var(--bg3);padding:25px;border-bottom:3px solid var(--gold);text-align:center}
h1{font-family:var(--font-serif);color:var(--gold);font-size:1.8rem;letter-spacing:0.5px}
.subtitle{font-size:0.9rem;text-transform:uppercase;letter-spacing:2px;color:var(--gold3);opacity:0.8;margin-top:5px}

.content{padding:30px}
.story-text{font-size:1.1rem;line-height:1.6;margin-bottom:20px;color:var(--white)}

.grid-choice{display:grid;grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));gap:15px;margin-bottom:30px}
.fest-opt{background:var(--bg3);border:2px solid transparent;border-radius:var(--r);padding:20px;cursor:pointer;transition:0.3s;text-align:center}
.fest-opt:hover{border-color:var(--teal);transform:translateY(-3px)}
.fest-opt .icon{font-size:2.5rem;margin-bottom:8px;display:block}
.fest-opt h3{color:var(--white);margin-bottom:5px;font-size:1.2rem}

.options-stack{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--bg3);border:1px solid var(--bg3);padding:15px;border-radius:var(--r);color:var(--white);font-size:1rem;cursor:pointer;text-align:left;transition:0.2s;display:flex;align-items:center}
.opt-btn:hover{background:var(--bg2);border-color:var(--teal)}
.opt-btn span{margin-right:12px;background:var(--bg);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--gold);font-weight:bold;flex-shrink:0;font-size:0.9rem}

.feedback{margin-top:20px;padding:20px;border-radius:var(--r);display:none;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fb-good{background:rgba(60,179,113,0.1);border:1px solid var(--green);color:var(--green2)}
.fb-bad{background:rgba(204,51,51,0.1);border:1px solid var(--red);color:var(--red2)}
.fb-retry{background:rgba(232,184,75,0.1);border:1px solid var(--gold);color:var(--gold2)}

.btn-next{width:100%;margin-top:15px;padding:16px;background:var(--gold);border:none;border-radius:var(--r);color:var(--bg);font-weight:900;font-size:1rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:0.3s}
.btn-next:hover{background:var(--white)}

.stats-bar{display:flex;justify-content:space-between;padding:12px 25px;background:rgba(0,0,0,0.2);font-weight:bold;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.05)}
.stat-item .val{color:var(--gold); font-size: 1.2rem; letter-spacing: 2px;}

.emergency-mode header{background:var(--red); border-bottom-color: var(--white);}
.emergency-mode h1{color:white;}
</style>
</head>
<body>

<div class="card active" id="fest-screen">
  <header>
    <h1>PUT YOUR TOWN ON THE MAP</h1>
    <div class="subtitle">Tourism & Event Management Sim</div>
  </header>
  <div class="content">
    <p class="story-text">The Mayor has challenged you to organize a world-class event. Choose your specialty and build our town's reputation!</p>
    <div class="grid-choice" id="fest-choices"></div>
  </div>
</div>

<div class="card" id="game-screen">
  <div class="stats-bar">
    <div class="stat-item">STORY <span class="val" id="cur-step">1/12</span></div>
    <div class="stat-item" id="tally-label">REVENUE: <span class="val" id="cur-score"></span></div>
  </div>
  <header id="game-header">
    <h1 id="q-title">Stage 1</h1>
  </header>
  <div class="content">
    <p class="story-text" id="q-desc"></p>
    <div class="options-stack" id="options-cont"></div>
    <div class="feedback" id="fb-box">
      <p id="fb-text"></p>
      <button class="btn-next" onclick="nextStep()" id="next-btn-el">Move Forward</button>
      <button class="btn-next" style="display:none; background:var(--red); color:white" id="gameover-btn-el" onclick="restartGame()">Try Again</button>
    </div>
  </div>
</div>

<div class="card" id="win-screen">
  <header>
    <h1>THE FINAL EVALUATION</h1>
    <div class="subtitle" id="fest-title-final">Festival Name</div>
  </header>
  <div class="content" style="text-align:center">
    <div style="font-size:4rem; margin-bottom:20px" id="final-emoji-display">🏆</div>
    <h2 id="w-title">Performance Review</h2>
    <p class="story-text" id="w-desc" style="margin-top:20px"></p>
    <button class="btn-next" onclick="restartGame()">Start a Different Festival</button>
  </div>
</div>

let state = {
  fest: null,
  score: 0,
  step: 0,
  activeOptions: [],
  answered: false
};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startWith(f) {
  state.fest = f;
  document.getElementById('fest-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  updateTally();
  loadStep();
}

function updateTally() {
  const el = document.getElementById('cur-score');
  el.innerHTML = `${state.score} ${state.fest.emoji}`;
}

function loadStep() {
  state.answered = false;
  document.getElementById('fb-box').style.display = 'none';
  document.getElementById('gameover-btn-el').style.display = 'none';
  document.getElementById('next-btn-el').style.display = 'block';
  
  let data;
  const emg = GAME_DATA[state.fest.id].emergencies[state.step];
  
  if (emg) {
    data = emg;
    document.body.classList.add('emergency-mode');
  } else {
    data = GAME_DATA[state.fest.id].scenarios[state.step];
    document.body.classList.remove('emergency-mode');
    document.getElementById('cur-step').textContent = `${state.step + 1}/12`;
  }

  document.getElementById('q-title').textContent = data.q;
  document.getElementById('q-desc').textContent = data.d;
  
  state.activeOptions = [...data.opts];
  renderOptions();
}

function renderOptions() {
  const cont = document.getElementById('options-cont');
  cont.innerHTML = '';
  const shuffled = shuffle([...state.activeOptions]);

  shuffled.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span>${String.fromCharCode(65 + i)}</span> ${o.t}`;
    b.onclick = () => handleChoice(o, b);
    cont.appendChild(b);
  });
}

function handleChoice(o, btn) {
  if (state.answered) return;
  const fbBox = document.getElementById('fb-box');
  const fbText = document.getElementById('fb-text');

  if (o.pts === -1) {
    state.score = Math.max(0, state.score - 1);
    updateTally();
    fbBox.style.display = 'block';
    fbBox.className = 'feedback fb-retry';
    fbText.textContent = o.fb;
    state.activeOptions = state.activeOptions.filter(opt => opt !== o);
    renderOptions();
    return;
  }

  state.answered = true;
  if (o.fail) {
    fbBox.style.display = 'block';
    fbBox.className = 'feedback fb-bad';
    fbText.textContent = o.fb;
    document.getElementById('next-btn-el').style.display = 'none';
    document.getElementById('gameover-btn-el').style.display = 'block';
  } else {
    state.score += (o.pts || 0);
    updateTally();
    fbBox.style.display = 'block';
    fbBox.className = 'feedback fb-good';
    fbText.textContent = o.fb;
  }
  
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
}

function nextStep() {
  state.step++;
  if (state.step >= 12) {
    showWin();
  } else {
    loadStep();
  }
}

function showWin() {
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('win-screen').classList.add('active');
  document.getElementById('fest-title-final').textContent = state.fest.title;
  
  const desc = document.getElementById('w-desc');
  const title = document.getElementById('w-title');
  const emoji = document.getElementById('final-emoji-display');

  if (state.score >= 30) {
    emoji.textContent = "🏆";
    title.textContent = "A Global Success!";
    desc.textContent = "Your festival was a masterpiece of planning and execution! By choosing high-quality, sustainable options, you have secured the town's financial future for the next decade. The Mayor is delighted, and tourists are already booking their flights for next year's event.";
  } else if (state.score >= 15) {
    emoji.textContent = "🌟";
    title.textContent = "A Solid Community Event";
    desc.textContent = "Great job! The festival was well-received by the locals and provided a significant boost to the town's image. While a few decisions were a bit safe, you managed the emergencies with grace and kept everyone safe. With a bigger budget next year, you could go global!";
  } else {
    emoji.textContent = "📈";
    title.textContent = "Room for Improvement";
    desc.textContent = "The festival finished without a total disaster, but the town's reputation hasn't grown much. Several low-quality choices left the visitors feeling underwhelmed. Take some time to study event management principles and try again with a different theme next season.";
  }
}

function restartGame() {
  state = { fest: null, score: 0, step: 0, activeOptions: [], answered: false };
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('fest-screen').classList.add('active');
}

function init() {
  const cont = document.getElementById('fest-choices');
  FESTIVALS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'fest-opt';
    div.innerHTML = `<span class="icon">${f.icon}</span><h3>${f.title}</h3>`;
    div.onclick = () => startWith(f);
    cont.appendChild(div);
  });
}

window.onload = init;
