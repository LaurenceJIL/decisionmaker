<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trainer's Torment: A Week in ELT</title>
    <style>
        /* Base Palette & Legibility Improvements[cite: 2] */
        :root {
            --bg-main: #f1f5f9;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --primary: #4f46e5; /* Friendly Indigo */
            --primary-hover: #4338ca;
            --accent-blue: #2563eb;
            --success-bg: #f0fdf4;
            --success-text: #166534;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --emergency: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 1rem;
        }

        .container { max-width: 700px; margin: 2rem auto; }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* High-Contrast Header[cite: 2] */
        .card-header {
            background: var(--primary);
            color: white;
            padding: 1.75rem;
            text-align: center;
        }

        /* Dedicated Score Area for Legibility[cite: 2] */
        .score-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 0.75rem;
            margin-top: 1rem;
            display: inline-block;
            min-width: 200px;
        }

        .score-display { 
            font-weight: 800; 
            color: #fbbf24; /* Golden yellow for visibility */
            font-size: 1.3rem;
            display: block;
        }

        .emoji-tally { 
            font-size: 1.4rem; 
            margin-top: 0.25rem; 
            letter-spacing: 3px;
            display: block;
        }

        .card-content { padding: 2rem; }

        .scenario-text {
            font-style: italic;
            background: #f8fafc;
            color: var(--text-muted);
            padding: 1.5rem;
            border-left: 5px solid var(--accent-blue);
            border-radius: 4px;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .choices { display: flex; flex-direction: column; gap: 0.75rem; }

        .choice-btn {
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 1rem;
        }

        .choice-btn:hover:not(:disabled) { 
            border-color: var(--primary); 
            background: #eef2ff; 
            transform: translateY(-1px);
        }

        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }

        .good { background: var(--success-bg); color: var(--success-text); border: 1px solid #bbf7d0; }
        .poor { background: var(--error-bg); color: var(--error-text); border: 1px solid #fecaca; }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .online-tag { background: #dbeafe; color: #1e40af; }
        .emergency-tag { 
            background: #fee2e2; 
            color: #b91c1c; 
            border: 1px solid #fca5a5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        .btn-action {
            margin-top: 1.5rem;
            background: var(--text-dark);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .btn-action:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div id="game" class="card">
            <div class="card-header">
                <h1>The Trainer's Torment</h1>
            </div>
            <div class="card-content" style="text-align: center;">
                <p style="margin-bottom: 2rem; color: var(--text-muted);">
                    It's Monday morning. Another busy week ahead, the coffee is weak and luke warm, and you're feeling ready for the challenge. Sort of.
                </p>
                <button class="btn-action" onclick="startGame()">Trainers! Start your lessons!</button>
            </div>
        </div>
    </div>

    <script>
        const SCENARIOS = [
            { title: "The Human Dictionary", type: "In-Person", desc: "Marco refuses to move until he knows the etymology of every word in the instructions.", choices: [
                { text: "Use pictures to get him moving and lower the affective filter.", points: 3, feedback: "Pedagogical victory!" },
                { text: "Spend 15 minutes defining every preposition until everyone is crying.", points: 2, feedback: "You've created a monster. He expects a lecture on 'at' now." },
                { text: "Tell Marco to 'just feel the vibe' and ignore him.", points: 1, feedback: "Rapport: Zero." },
                { text: "Scream 'It's a function word, Marco!' and throw the book.", points: -1, feedback: "Unprofessional. Try again." }
            ]},
            { title: "The Zoom Ghost", type: "Online", desc: "Yuki claims she 'knows' the Present Perfect, then makes three errors in her next sentence.", choices: [
                { text: "Show her a quick diagnostic task to gently prove the need for review.", points: 3, feedback: "Data doesn't lie. She's back to reality." },
                { text: "Let her skip it and scroll on her phone in peace.", points: 2, feedback: "Path of least resistance, but no learning occurred." },
                { text: "Force her to turn her camera on to watch her ignore you.", points: 1, feedback: "The tension is now high. Awkward." },
                { text: "Mute her permanently and claim she was disconnected.", points: -1, feedback: "A bit dishonest, don't you think? Try again." }
            ]},
            { title: "The Ghost of Trainers Past", type: "In-Person", desc: "Philippe misses Sarah, who let them 'just chat about wine' for the whole hour.", choices: [
                { text: "Acknowledge Sarah was great, but firmly redirect to the grammar task.", points: 3, feedback: "Professional and firm." },
                { text: "Spend the hour gossiping about Sarah to win his love.", points: 2, feedback: "You are now his favorite friend, but his English is still terrible." },
                { text: "Tell him Sarah was fired for being too fun.", points: 1, feedback: "Lies and drama. A classic recipe for HR meetings." },
                { text: "Burst into tears and ask why you're not good enough.", points: -1, feedback: "Too much emotion for a Tuesday. Try again." }
            ]},
            { title: "The Executive Hostage", type: "Online", desc: "Amara (VP) is in a moving taxi and only wants to learn how to fire people in English.", choices: [
                { text: "Validate the frustration and pivot to 'English for Firing'—at least it's relevant.", points: 3, feedback: "Found the intrinsic motivation!" },
                { text: "Lecture her on the beauty of Shakespeare for 20 minutes.", points: 2, feedback: "She has muted you. You are talking to yourself." },
                { text: "Tell her if she doesn't like it, she can leave the taxi.", points: 1, feedback: "She will literally fire you. Bold move." },
                { text: "Ask her to fire you right now so you can go home.", points: -1, feedback: "A tempting thought, but keep working. Try again." }
            ]},
            { title: "EMERGENCY: The Blackout", type: "Online", isEmergency: true, desc: "Your internet dies. You rejoin via a shaky 4G hotspot. You look like an 8-bit character from 1992.", choices: [
                { text: "Pivot to a listening-only task. Turn off camera to save data and lead a debate.", points: 4, feedback: "Crisis managed! You're a pro who doesn't need pixels to teach." },
                { text: "Keep trying to screen-share a 4K video until your phone explodes.", points: 0, feedback: "That was... ambitious. Perhaps a touch optimistic regarding physics." },
                { text: "Cry silently and hope they don't notice you're gone.", points: 0, gameOver: true, feedback: "The Director of Studies called. They've decided to 'explore other options.' GAME OVER." }
            ]},
            { title: "The Pen-Thrower", type: "In-Person", desc: "Dmitri makes a mistake with the Third conditional and shouts 'I am but a fool!' in the quiet office.", choices: [
                { text: "Normalize the meltdown. Explain it's a sign of a brain growing.", points: 3, feedback: "Growth mindset coaching!" },
                { text: "Give him a piece of chocolate and hope he stops shouting.", points: 2, feedback: "Behavior management at its simplest." },
                { text: "Tell him he's right and maybe try a lower level.", points: 1, feedback: "You just crushed a man's soul." },
                { text: "Throw your own pen at him to establish dominance.", points: -1, feedback: "Assault is generally discouraged. Try again." }
            ]},
            { title: "The Philosophical Skeptic", type: "Online", desc: "Chen is ranting in Zoom chat about why 'read' and 'read' are spelled the same.", choices: [
                { text: "Acknowledge the chaos, then show a pattern that actually works.", points: 3, feedback: "Steered him away from the abyss." },
                { text: "Try to explain the history of the Great Vowel Shift.", points: 2, feedback: "Everyone else has disconnected. History won." },
                { text: "Tell him to write a letter to the King.", points: 1, feedback: "Cathartic, but not helpful." },
                { text: "Agree and start spelling everything phonetically like a rebel.", points: -1, feedback: "We are paid to teach standard English. Try again." }
            ]},
            { title: "The L1 Conspiracy", type: "In-Person", desc: "Jean and Luc have been whispering in French for ten minutes during an English task.", choices: [
                { text: "Explain that immersion is a choice they make, not a prison you manage.", points: 3, feedback: "Accountability shifted!" },
                { text: "Start a 'fine' system where they pay 1€ for every French word.", points: 2, feedback: "You're 20€ richer, but they hate you." },
                { text: "Apologize and promise to hover over them like a hawk.", points: 1, feedback: "You are now a nanny, not a trainer." },
                { text: "Pretend you don't notice while you browse Reddit.", points: -1, feedback: "They are paying for this, you know. Try again." }
            ]},
            { title: "The Gotcha King", type: "In-Person", desc: "Laurent asks if 'shall' can be used with a plural gerund in the subjunctive. He is smirking.", choices: [
                { text: "Admit it's a great question, promise to check a corpus, and move on.", points: 3, feedback: "Intellectual humility is your shield." },
                { text: "Tell him that rule died with the British Empire.", points: 2, feedback: "Witty, but slightly aggressive." },
                { text: "Make up a fake rule and hope he doesn't have Google.", points: 1, feedback: "He has Google. You are now 'The Trainer Who Lies'." },
                { text: "Challenge him to a bare-knuckle boxing match in the lobby.", points: -1, feedback: "HR is watching. Try again." }
            ]},
            { title: "The B2 Mirage", type: "In-Person", desc: "The file says 'Upper Intermediate'. They can barely say 'Hello'.", choices: [
                { text: "Stop, pivot to basic diagnostic tasks, and simplify everything.", points: 3, feedback: "Agile teaching. Saved the day." },
                { text: "Blame HR loudly in front of the students.", points: 2, feedback: "Honest, but messy." },
                { text: "Push through. 'They'll catch up!' you lie to yourself.", points: 1, feedback: "They didn't catch up. They just stopped blinking." },
                { text: "Teach them the lyrics to 'Yellow Submarine' and call it a day.", points: -1, feedback: "Laziness is not a teaching method. Try again." }
            ]},
            { title: "The Digital Tardy", type: "Online", desc: "Raj joins 20 minutes late and asks to start from the beginning. Five others are waiting.", choices: [
                { text: "Politely decline, offer the recording, and keep the group moving.", points: 3, feedback: "You protected the time of those who showed up." },
                { text: "Tell Raj he's been a 'bad boy' and mute him.", points: 2, feedback: "A bit weird, but the lesson continued." },
                { text: "Restart the whole lesson for Raj.", points: 1, feedback: "The other five are now playing Wordle." },
                { text: "Unleash a 10-minute rant about the importance of punctuality.", points: -1, feedback: "Now you're also wasting everyone's time. Try again." }
            ]},
            { title: "The 'Practical' Crisis", type: "In-Person", desc: "A manager complains your lessons are 'too theoretical'. The student complaining never does homework.", choices: [
                { text: "Provide engagement data and offer a new 'practical' needs analysis.", points: 3, feedback: "Stellar stakeholder management." },
                { text: "Apologize and promise to only watch Netflix clips.", points: 2, feedback: "You've surrendered. You're now a glorified algorithm." },
                { text: "Tell the manager the student is a liar.", points: 1, feedback: "Direct, but likely to end your contract." },
                { text: "Write the manager a 5,000-word essay on the theory of learning.", points: -1, feedback: "You just proved their point. Try again." }
            ]},
            { title: "The Commuter Lesson", type: "Online", desc: "Isabelle is in a noisy airport lounge eating a sandwich. 'I'm listening!' she screams.", choices: [
                { text: "Ask her to use the chat only today to avoid distracting the group.", points: 3, feedback: "Sanity preserved." },
                { text: "Kick her out of the meeting.", points: 2, feedback: "Harsh, but peaceful." },
                { text: "Try to teach through the noise of the Boeing 747 engines.", points: 1, feedback: "Everyone has a headache now." },
                { text: "Ask her what kind of sandwich it is and start a 20-minute debate on bread.", points: -1, feedback: "This is not a food blog. Try again." }
            ]},
            { title: "EMERGENCY: The Blow-up", type: "In-Person", isEmergency: true, desc: "Two trainees start a genuine shouting match over an ethics debate. One slams the door and leaves.", choices: [
                { text: "Take a 5-minute break. Debrief the emotion when they return, then reset.", points: 4, feedback: "Masterful emotional intelligence. You turned a disaster into a lesson." },
                { text: "Pretend nothing happened and ask: 'So, any more thoughts on the gerund?'", points: 0, feedback: "One does admire your commitment to the curriculum in the face of total social collapse." },
                { text: "Join the argument and tell the one who stayed that they are 'totally right'.", points: 0, gameOver: true, feedback: "The client company has canceled your contract for unprofessional conduct. GAME OVER." }
            ]},
            { title: "The Grammar Stickler", type: "In-Person", desc: "A student finds a tiny typo on slide 14. They stop the lesson to point it out and won't let it go.", choices: [
                { text: "Thank them for the proofreading and turn it into a 'Spot the Error' game.", points: 3, feedback: "Great redirection!" },
                { text: "Fix it silently and stare at them until they feel awkward.", points: 2, feedback: "Power move. Effective, if chilly." },
                { text: "Explain that it was an 'intentional test' of their focus.", points: 1, feedback: "They don't believe you, but the lesson moved on." },
                { text: "Tell them their shoes are ugly so you're even.", points: -1, feedback: "Petty. So very petty. Try again." }
            ]},
            { title: "The Friday Reflection", type: "Online", desc: "It's Friday 4 PM. You've been too 'nice' and no one learned anything. What's the plan?", choices: [
                { text: "Set firmer boundaries and higher standards for next week.", points: 3, feedback: "Growth requires friction. Well done." },
                { text: "Quit and become a goat farmer.", points: 2, feedback: "A valid career path in ELT." },
                { text: "Double down on being 'The Fun Trainer' for good reviews.", points: 1, feedback: "You're a clown, not a coach." },
                { text: "Just don't show up on Monday.", points: -1, feedback: "That's ghosting, not teaching. Try again." }
            ]}
        ];

        let currentStep = 0;
        let score = 0;
        let teacherGender = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getEmojiRoman(num) {
            if (num <= 0) return "🖊️";
            let res = ""; let val = num; teacherGender = 0;
            const map = [{v: 50, s: "🏫"}, {v: 40, s: "ALT🏫"}, {v: 10, s: "ALT"}, {v: 9, s: "🖊️ALT"}, {v: 5, s: "📖"}, {v: 4, s: "🖊️📖"}, {v: 1, s: "🖊️"}];
            for (let i = 0; i < map.length; i++) {
                while (val >= map[i].v) {
                    if (map[i].s.includes("ALT")) {
                        let t = teacherGender % 2 === 0 ? "👨‍🏫" : "👩‍🏫";
                        res += map[i].s.replace("ALT", t); teacherGender++;
                    } else res += map[i].s;
                    val -= map[i].v;
                }
            }
            return res;
        }

        function startGame() { currentStep = 0; score = 0; render(); }

        function render() {
            const gameEl = document.getElementById('game');
            if (currentStep >= SCENARIOS.length) { renderFinal(); return; }
            const s = SCENARIOS[currentStep];
            const shuffledChoices = shuffle([...s.choices]);

            gameEl.innerHTML = `
                <div class="card-header">
                    <h1>${s.title}</h1>
                    <div class="score-container">
                        <span class="score-display">Score: ${score}</span>
                        <span class="emoji-tally">${getEmojiRoman(score)}</span>
                    </div>
                </div>
                <div class="card-content">
                    ${s.isEmergency ? '<span class="tag emergency-tag">EMERGENCY SITUATION</span>' : `<span class="tag online-tag">${s.type}</span>`}
                    <div class="scenario-text">${s.desc}</div>
                    <div class="choices" id="choices"></div>
                    <div id="feedback" class="feedback"></div>
                    <button id="next-btn" class="btn-action" style="display:none" onclick="next()">Next Scenario →</button>
                </div>
            `;
            shuffledChoices.forEach((c) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn'; btn.innerText = c.text;
                btn.onclick = () => handleChoice(c, btn);
                document.getElementById('choices').appendChild(btn);
            });
        }

        function handleChoice(choice, btn) {
            const fb = document.getElementById('feedback');
            if (choice.gameOver) { renderGameOver(choice.feedback); return; }
            if (choice.points === -1) {
                score += choice.points;
                fb.innerHTML = `<strong>Attention:</strong> ${choice.feedback} <br><em>-1 point</em>`;
                fb.className = "feedback poor"; fb.style.display = 'block';
                btn.disabled = true;
                updateDisplays();
                return;
            }
            score += choice.points;
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            fb.innerHTML = `<strong>Result:</strong> ${choice.feedback} <br><br> <em>+${choice.points} points</em>`;
            fb.className = "feedback good"; fb.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            updateDisplays();
        }

        function updateDisplays() {
            document.querySelector('.score-display').innerText = `Score: ${score}`;
            document.querySelector('.emoji-tally').innerText = getEmojiRoman(score);
        }

        function next() { currentStep++; render(); }
        function renderGameOver(msg) {
            document.getElementById('game').innerHTML = `<div class="card-header" style="background:#991b1b"><h1>GAME OVER</h1></div>
            <div class="card-content" style="text-align:center"><p style="font-size:1.2rem; margin-bottom:2rem">${msg}</p><button class="btn-action" onclick="location.reload()">Try Again</button></div>`;
        }
        function renderFinal() {
            let rank = score > 40 ? "ELT Legend" : score > 25 ? "Competent Professional" : "Substitute Teacher";
            document.getElementById('game').innerHTML = `<div class="card-header"><h1>Week Complete!</h1></div>
            <div class="card-content" style="text-align:center"><h2>Final Score: ${score}</h2><div class="emoji-tally" style="margin:1rem 0">${getEmojiRoman(score)}</div>
            <p style="font-size:1.1rem">Rank: <strong>${rank}</strong></p><button class="btn-action" onclick="location.reload()">Start New Week</button></div>`;
        }
    </script>
</body>
</html>
